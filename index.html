<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EUDES MEDIA | Enterprise ERP</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        :root { --primary: #003366; --accent: #D4A017; --bg: #f8fafc; --white: #ffffff; --danger: #e11d48; --success: #10b981; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
        body { background: var(--bg); display: flex; height: 100vh; overflow: hidden; }
        
        /* --- DIRECT LOGIN --- */
        .login-gate { position: fixed; inset: 0; background: linear-gradient(135deg, #001a33 0%, #003366 100%); z-index: 10000; display: flex; align-items: center; justify-content: center; }
        .login-card { background: white; padding: 40px; border-radius: 30px; width: 400px; text-align: center; box-shadow: 0 20px 50px rgba(0,0,0,0.5); }

        /* --- SIDEBAR --- */
        .sidebar { width: 280px; background: var(--primary); color: white; display: flex; flex-direction: column; padding: 25px; flex-shrink: 0; }
        .sidebar h1 { font-size: 20px; color: var(--accent); border-bottom: 2px solid rgba(212,160,23,0.3); padding-bottom: 15px; margin-bottom: 25px; text-align: center; }
        .nav-item { padding: 12px 15px; cursor: pointer; border-radius: 12px; margin-bottom: 8px; display: flex; align-items: center; gap: 12px; font-size: 14px; transition: 0.3s; }
        .nav-item:hover, .nav-item.active { background: var(--accent); color: var(--primary); font-weight: 700; }

        /* --- CONTENT --- */
        .wrapper { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
        .top-bar { background: white; padding: 15px 30px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #e2e8f0; }
        .content { padding: 30px; overflow-y: auto; flex: 1; }
        .tab-view { display: none; }
        .tab-view.active { display: block; }

        /* --- UI ELEMENTS --- */
        .stat-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 20px; margin-bottom: 30px; }
        .stat-card { background: white; padding: 20px; border-radius: 20px; border-left: 5px solid var(--accent); box-shadow: 0 4px 6px rgba(0,0,0,0.05); }
        .stat-card div:last-child { font-size: 24px; font-weight: 700; color: var(--primary); margin-top: 5px; }
        
        table { width: 100%; border-collapse: collapse; background: white; border-radius: 20px; overflow: hidden; box-shadow: 0 4px 6px rgba(0,0,0,0.05); }
        th { text-align: left; background: #f8fafc; padding: 15px; font-size: 11px; color: #64748b; text-transform: uppercase; }
        td { padding: 15px; border-bottom: 1px solid #f1f5f9; font-size: 14px; }
        .stu-photo { width: 40px; height: 40px; border-radius: 50%; object-fit: cover; background: #eee; }

        .btn { padding: 12px 24px; border-radius: 10px; border: none; cursor: pointer; font-weight: 600; font-size: 14px; transition: 0.2s; display: inline-flex; align-items: center; gap: 8px; }
        .btn-p { background: var(--primary); color: white; }
        input, select, textarea { padding: 12px; border: 1px solid #cbd5e1; border-radius: 10px; width: 100%; margin-bottom: 15px; }

        /* --- MODAL --- */
        .modal { position: fixed; inset: 0; background: rgba(0,0,0,0.6); z-index: 11000; display: none; align-items: center; justify-content: center; }
        .modal-inner { background: white; padding: 30px; border-radius: 24px; width: 100%; max-width: 550px; }
    </style>
</head>
<body>

    <div id="login-gate" class="login-gate">
        <div class="login-card">
            <h1 style="color:var(--primary); margin-bottom:10px;">EUDES MEDIA</h1>
            <p style="color:#64748b; margin-bottom:30px;">School Management Portal</p>
            <input type="text" id="school-entry" placeholder="Type School ID (e.g. PROGRESSIVE)">
            <button class="btn btn-p" style="width:100%; justify-content:center; padding:16px;" onclick="directLogin()">ACCESS DASHBOARD</button>
            <p style="margin-top:20px; font-size:11px; color:#94a3b8;">Type "SUPER" for All Schools</p>
        </div>
    </div>

    <div class="sidebar">
        <h1>EUDES MEDIA</h1>
        <div class="nav-item active" onclick="showTab('dash')"><i class="fas fa-th-large"></i> Dashboard</div>
        <div class="nav-item" onclick="showTab('students')"><i class="fas fa-users"></i> Student Registry</div>
        <div class="nav-item" onclick="showTab('grading')"><i class="fas fa-graduation-cap"></i> Exam Grading</div>
        <div class="nav-item" onclick="showTab('idgen')"><i class="fas fa-id-card"></i> ID Cards</div>
        <div style="margin-top:auto; text-align:center; font-size:11px; opacity:0.6;">Support: +256762992440</div>
    </div>

    <div class="wrapper">
        <div class="top-bar">
            <h3 id="v-title">Dashboard</h3>
            <div id="school-name-tag" style="font-weight:700; color:var(--primary)">---</div>
        </div>

        <div class="content">
            <div id="dash" class="tab-view active">
                <div class="stat-grid">
                    <div class="stat-card"><div>Total Learners</div><div id="s-total">0</div></div>
                    <div class="stat-card"><div>Fees Paid</div><div id="s-paid">0</div></div>
                    <div class="stat-card"><div>Debt Owed</div><div id="s-debt" style="color:red">0</div></div>
                    <div class="stat-card"><div>Attendance</div><div id="s-att">0%</div></div>
                </div>
            </div>

            <div id="students" class="tab-view">
                <div style="display:flex; justify-content:space-between; margin-bottom:20px;">
                    <h2>Registry</h2>
                    <button class="btn btn-p" onclick="openModal('regModal')">+ Add Student</button>
                </div>
                <table>
                    <thead><tr><th>Photo</th><th>LIN</th><th>Name</th><th>Class</th><th>Debt</th><th>Action</th></tr></thead>
                    <tbody id="student-list"></tbody>
                </table>
            </div>
        </div>
    </div>

    <div id="regModal" class="modal">
        <div class="modal-inner">
            <h2 style="margin-bottom:20px;">Add Learner</h2>
            <form id="addForm">
                <input type="text" id="stu-name" placeholder="Full Name" required>
                <div style="display:grid; grid-template-columns:1fr 1fr; gap:10px;">
                    <input type="text" id="stu-class" placeholder="Class" required>
                    <input type="text" id="stu-whatsapp" placeholder="WhatsApp (256...)">
                </div>
                <input type="number" id="stu-total" placeholder="Total Fees (UGX)" required>
                <input type="file" id="stu-file" accept="image/*">
                <button type="submit" class="btn btn-p" style="width:100%; justify-content:center;">SAVE TO DATABASE</button>
                <button type="button" class="btn" style="width:100%; margin-top:10px; background:#eee;" onclick="closeModal('regModal')">CANCEL</button>
            </form>
        </div>
    </div>

<script>
    const SB_URL = 'https://qtvkasgnrftajqrrcgsg.supabase.co';
    const SB_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InF0dmthc2ducmZ0YWpxcnJjZ3NnIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzczMTM5ODksImV4cCI6MjA5Mjg4OTk4OX0.gw1-WKC2ccGRXl1O74v1TaHu2DzwSlVTCaQHv6bsYcg';
    const supabase = supabase.createClient(SB_URL, SB_KEY);

    let currentSchool = "";
    let data = [];

    async function directLogin() {
        const val = document.getElementById('school-entry').value.trim().toUpperCase();
        if(!val) return alert("Enter School ID");
        currentSchool = val;
        document.getElementById('login-gate').style.display = 'none';
        document.getElementById('school-name-tag').innerText = currentSchool;
        sync();
    }

    async function sync() {
        let q = supabase.from('students').select('*').order('name');
        if(currentSchool !== 'SUPER') q = q.eq('school_id', currentSchool);
        
        const { data: res } = await q;
        data = res || [];
        render();
    }

    function render() {
        const list = document.getElementById('student-list');
        list.innerHTML = "";
        let paid = 0, debt = 0;

        data.forEach(s => {
            const d = (s.total_fees || 0) - (s.fees_paid || 0);
            paid += (s.fees_paid || 0);
            debt += d;
            list.innerHTML += `<tr>
                <td><img src="${s.photo_url || 'https://via.placeholder.com/40'}" class="stu-photo"></td>
                <td style="color:var(--accent); font-weight:700;">${s.lin}</td>
                <td><b>${s.name.toUpperCase()}</b></td>
                <td>${s.class}</td>
                <td style="color:red; font-weight:600;">${d.toLocaleString()}</td>
                <td><button class="btn" style="padding:5px 10px; background:red; color:white;" onclick="delStu('${s.id}')"><i class="fas fa-trash"></i></button></td>
            </tr>`;
        });

        document.getElementById('s-total').innerText = data.length;
        document.getElementById('s-paid').innerText = paid.toLocaleString();
        document.getElementById('s-debt').innerText = debt.toLocaleString();
    }

    document.getElementById('addForm').onsubmit = async (e) => {
        e.preventDefault();
        const file = document.getElementById('stu-file').files[0];
        let photoUrl = "";

        if(file) {
            const path = `photos/${Date.now()}_${file.name}`;
            const { data: upload } = await supabase.storage.from('student-photos').upload(path, file);
            if(upload) {
                const { data: pub } = supabase.storage.from('student-photos').getPublicUrl(path);
                photoUrl = pub.publicUrl;
            }
        }

        const payload = {
            name: document.getElementById('stu-name').value,
            class: document.getElementById('stu-class').value,
            parent_whatsapp: document.getElementById('stu-whatsapp').value,
            total_fees: parseInt(document.getElementById('stu-total').value),
            school_id: currentSchool === 'SUPER' ? 'EUDES_MEDIA' : currentSchool,
            lin: "LIN-" + Math.floor(1000 + Math.random() * 9000),
            photo_url: photoUrl,
            fees_paid: 0
        };

        await supabase.from('students').insert([payload]);
        closeModal('regModal');
        sync();
    };

    async function delStu(id) {
        if(confirm("Delete student?")) {
            await supabase.from('students').delete().eq('id', id);
            sync();
        }
    }

    function showTab(id) {
        document.querySelectorAll('.tab-view').forEach(t => t.classList.remove('active'));
        document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        event.currentTarget.classList.add('active');
    }
    function openModal(id) { document.getElementById(id).style.display = 'flex'; }
    function closeModal(id) { document.getElementById(id).style.display = 'none'; }
</script>
</body>
</html>
