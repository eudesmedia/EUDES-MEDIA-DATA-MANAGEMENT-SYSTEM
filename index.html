<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EUDES MEDIA SCHOOL SYSTEM</title>
    <style>
        :root { --primary: #003366; --secondary: #f0f4f8; --accent: #e11d48; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--secondary); margin: 0; padding: 20px; }
        .container { max-width: 1100px; margin: auto; background: white; padding: 30px; border-radius: 15px; box-shadow: 0 5px 20px rgba(0,0,0,0.1); }
        .header { background: var(--primary); color: white; padding: 25px; border-radius: 10px; text-align: center; margin-bottom: 25px; }
        .action-bar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        table { width: 100%; border-collapse: collapse; background: white; border-radius: 8px; overflow: hidden; }
        th { background: #1e293b; color: white; padding: 15px; text-align: left; }
        td { padding: 15px; border-bottom: 1px solid #e2e8f0; vertical-align: middle; }
        .btn { background: var(--primary); color: white; border: none; padding: 10px 20px; border-radius: 6px; cursor: pointer; font-weight: bold; }
        .btn-pay { background: #16a34a; font-size: 12px; }
        .debt-text { font-weight: bold; color: var(--accent); }
        .status-badge { padding: 5px 10px; border-radius: 20px; font-size: 11px; font-weight: bold; background: #dcfce7; color: #166534; }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <h1 style="margin:0; letter-spacing: 1px;">EUDES MEDIA SCHOOL SYSTEM</h1>
        <p style="margin:8px 0 0 0; opacity:0.8;">Student Finance & Enrollment Portal</p>
    </div>

    <div class="action-bar">
        <button class="btn" onclick="addStudent()">+ REGISTER NEW STUDENT</button>
        <div id="summary" style="font-weight: bold; color: var(--primary);">Loading...</div>
    </div>

    <table>
        <thead>
            <tr>
                <th>LIN</th>
                <th>STUDENT NAME</th>
                <th>CLASS</th>
                <th>DEBT (UGX)</th>
                <th>STATUS</th>
                <th>ACTION</th>
            </tr>
        </thead>
        <tbody id="studentTable"></tbody>
    </table>
</div>

<script>
    const API_URL = 'https://qtvkasgnrftajqrrcgsg.supabase.co/rest/v1/students';
    const API_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InF0dmthc2ducmZ0YWpxcnJjZ3NnIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzczMTM5ODksImV4cCI6MjA5Mjg4OTk4OX0.gw1-WKC2ccGRXl1O74v1TaHu2DzwSlVTCaQHv6bsYcg';
    const HEADERS = { 'apikey': API_KEY, 'Authorization': `Bearer ${API_KEY}`, 'Content-Type': 'application/json' };

    async function fetchRecords() {
        const res = await fetch(`${API_URL}?select=*&order=name.asc`, { headers: HEADERS });
        const students = await res.json();
        const table = document.getElementById('studentTable');
        table.innerHTML = "";

        students.forEach(s => {
            const debt = (s.total_fees || 0) - (s.fees_paid || 0);
            table.innerHTML += `
                <tr>
                    <td>${s.lin}</td>
                    <td><strong>${s.name.toUpperCase()}</strong></td>
                    <td>${s.class || 'N/A'}</td>
                    <td class="debt-text">${debt.toLocaleString()} UGX</td>
                    <td><span class="status-badge">ACTIVE</span></td>
                    <td><button class="btn btn-pay" onclick="recordPayment('${s.id}', '${s.name}', ${s.fees_paid || 0})">💸 PAY</button></td>
                </tr>`;
        });
        document.getElementById('summary').innerText = `Total Enrolled: ${students.length}`;
    }

    async function addStudent() {
        const name = prompt("Enter Student Name:");
        if (!name) return;
        const cls = prompt("Class:");
        const fees = prompt("Total Term Fees (UGX):", "500000");

        await fetch(API_URL, {
            method: 'POST',
            headers: { ...HEADERS, 'Prefer': 'return=minimal' },
            body: JSON.stringify({ 
                name, class: cls, total_fees: parseInt(fees), fees_paid: 0,
                lin: "LIN-" + Math.floor(1000 + Math.random() * 9000)
            })
        });
        fetchRecords();
    }

    async function recordPayment(id, name, currentPaid) {
        const amount = prompt(`How much did ${name} pay? (UGX)`);
        if (!amount || isNaN(amount)) return;

        await fetch(`${API_URL}?id=eq.${id}`, {
            method: 'PATCH',
            headers: { ...HEADERS, 'Prefer': 'return=minimal' },
            body: JSON.stringify({ fees_paid: currentPaid + parseInt(amount) })
        });
        alert("Payment Recorded!");
        fetchRecords();
    }

    fetchRecords();
</script>
</body>
</html>
