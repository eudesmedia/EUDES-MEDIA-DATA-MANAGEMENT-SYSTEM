        function compressImage(file, callback) {
            const reader = new FileReader();
            reader.onload = function(e) {
                const img = new Image();
                img.onload = function() {
                    const canvas = document.createElement('canvas');
                    let width = img.width, height = img.height;
                    const maxSize = 200;
                    if(width>height){ if(width>maxSize){ height = (height*maxSize)/width; width = maxSize; } }
                    else { if(height>maxSize){ width = (width*maxSize)/height; height = maxSize; } }
                    canvas.width=width; canvas.height=height;
                    const ctx = canvas.getContext('2d');
                    ctx.drawImage(img,0,0,width,height);
                    canvas.toBlob(callback,'image/jpeg',0.7);
                };
                img.src = e.target.result;
            };
            reader.readAsDataURL(file);
        }

        async function generateCumulativeReport(studentId, term, examType) {
            const student = students.find(s=>s.id===studentId);
            if(!student) return null;
            let exams = [];
            if(examType==='Beginning of Term') exams=['Beginning of Term'];
            else if(examType==='Mid Term') exams=['Beginning of Term','Mid Term'];
            else exams=['Beginning of Term','Mid Term','End of Term'];
            const studentMarks = marks.filter(m=>m.student_id===studentId && m.term===term);
            let rows='', totals={}, points={};
            for(let sub of CORE_SUBJECTS){
                rows+=`<tr><td class="p-2 font-bold">${sub}</td>`;
                for(let ex of exams){
                    const m = studentMarks.find(m=>m.subject===sub && m.exam_type===ex);
                    const score = m?m.score:'-';
                    const grade = m?m.grade:'-';
                    rows+=`<td class="p-2 text-center">${score}<br><small>${grade}</small></td>`;
                    if(m){
                        totals[ex] = (totals[ex]||0)+m.score;
                        (points[ex]=points[ex]||[]).push(gradePoints(m.grade));
                    }
                }
                rows+=`</tr>`;
            }
            let summary = `<tr class="bg-gray-100"><td class="p-2 font-bold">Total / Aggregate</td>`;
            for(let ex of exams){
                const total = totals[ex]||0;
                let agg=0;
                if(points[ex]){ points[ex].sort((a,b)=>a-b); agg = points[ex].slice(0,8).reduce((s,p)=>s+p,0); }
                summary+=`<td class="p-2 text-center">${total}/400<br><small>Agg: ${agg}</small></td>`;
            }
            summary+=`</tr><tr class="bg-gray-50"><td class="p-2 font-bold">Division</td>`;
            for(let ex of exams){
                let agg=0;
                if(points[ex]){ points[ex].sort((a,b)=>a-b); agg = points[ex].slice(0,8).reduce((s,p)=>s+p,0); }
                summary+=`<td class="p-2 text-center">${getDivision(agg)}</td>`;
            }
            summary+=`</tr>`;
            const photo = student.photo_url?`<img src="${student.photo_url}" style="width:80px;height:80px;border-radius:50%;">`:'<div style="width:80px;height:80px;background:#eef2ff;border-radius:50%;display:flex;align-items:center;justify-content:center;">📷</div>';
            return { student, photo, exams, rows, summary };
        }

                await refreshAllAndRender();
            };
            const expDiv = document.getElementById('expenseList'); if(expDiv) expDiv.innerHTML = expenses.map(e=>`<div class="flex justify-between border-b py-1">${e.expense_date} ${e.category}: ${formatMoney(e.amount)} <button class="text-red-600" onclick="window.deleteExpense('${e.id}')">Delete</button></div>`).join('');
        }
        window.deleteExpense = async (id) => { if(confirm('Delete expense?')){ await restDelete('expenses', id); await refreshAllAndRender(); } };

        // Reports (chart)
        async function renderReports() {
            const container = document.getElementById('tabContent');
            const counts = ['D1','D2','C3','C4','C5','C6','P7','P8','F9'].map(g=>marks.filter(m=>m.grade===g).length);
            container.innerHTML = `<div class="bg-white p-4 rounded-xl shadow"><canvas id="gradeChart"></canvas></div>`;
            const ctx = document.getElementById('gradeChart')?.getContext('2d');
            if(window.chart) window.chart.destroy();
            if(ctx) window.chart = new Chart(ctx, { type:'bar', data:{ labels:['D1','D2','C3','C4','C5','C6','P7','P8','F9'], datasets:[{ label:'Grade Distribution', data:counts, backgroundColor:'#3b82f6' }] } });
        }

        // ID Cards (downloadable)
        async function renderIdCards() {
            const container = document.getElementById('tabContent');
            container.innerHTML = `<div class="bg-white rounded-xl p-4 shadow"><h3>ID Card</h3><select id="idStudentSelect" class="w-full mb-3">${students.map(s=>`<option value="${s.id}">${s.first_name} ${s.last_name}</option>`).join('')}</select><button class="btn" id="previewIdBtn">Preview</button><button class="btn btn-gold" id="downloadIdBtn"><i class="fas fa-download"></i> Download PDF</button><div id="idPreview"></div></div>`;
            document.getElementById('previewIdBtn').onclick = () => {
                const s = students.find(st=>st.id===document.getElementById('idStudentSelect').value);
                if(s){
                    const photo = s.photo_url?`<img src="${s.photo_url}" style="width:80px;height:80px;border-radius:50%;">`:'<div style="width:80px;height:80px;background:#eef2ff;border-radius:50%;display:flex;align-items:center;justify-content:center;">📷</div>';
                    document.getElementById('idPreview').innerHTML = `<div id="printableId" class="id-card"><div class="id-card-header">${escapeHtml(currentSchool.name)}</div><div class="flex justify-center mt-3">${photo}</div><div class="font-bold text-center mt-2">${s.first_name} ${s.last_name}</div><div>LIN: ${s.lin}</div><div>Class: ${s.class}</div><div>Parent: ${s.parent_name||'N/A'}</div><div class="text-center text-xs mt-2">${SCHOOL_CONTACTS.join(', ')}</div><button class="btn btn-gold mt-3" onclick="window.print()">Print ID</button></div>`;
                }
            };
            document.getElementById('downloadIdBtn').onclick = () => {
                const idDiv = document.getElementById('idPreview');
                if(!idDiv.innerHTML) return alert('Preview ID card first');
                const win = window.open('', '_blank');
                win.document.write(idDiv.innerHTML);
                win.document.close();
                win.print();
            };
        }

        // Branches & Fee Structure (admin only)
        async function renderBranches() {
            const container = document.getElementById('tabContent');
            container.innerHTML = `<div class="bg-white rounded-xl p-4 shadow"><h3>Branches</h3><div class="flex gap-2 mb-3"><input id="newBranchName" placeholder="Branch name"><button class="btn" id="addBranchBtn">Add</button></div><ul id="branchList"></ul></div>`;
            const renderList = () => { const ul = document.getElementById('branchList'); if(ul) ul.innerHTML = branches.map(b=>`<li class="flex justify-between border-b py-2">${escapeHtml(b.name)} <button class="text-red-600" onclick="window.deleteBranch('${b.id}')">Delete</button></li>`).join(''); };
            renderList();
            document.getElementById('addBranchBtn').onclick = async () => { const name = document.getElementById('newBranchName').value.trim(); if(name){ await restInsert('branches', { school_id: SCHOOL_ID, name }); await refreshAllAndRender(); } };
            window.deleteBranch = async (id) => { if(confirm('Delete?')){ await restDelete('branches', id); await refreshAllAndRender(); } };
        }
        async function renderFeeStructure() {
            const container = document.getElementById('tabContent');
            container.innerHTML = `<div class="bg-white rounded-xl p-4 shadow"><h3>Fee Structure</h3><div class="flex flex-wrap gap-2 mb-4"><select id="feeClass">${CLASS_ORDER.map(c=>`<option>${c}</option>`).join('')}</select><input type="number" id="feeAmount" placeholder="Amount"><select id="feeTerm">${TERMS.map(t=>`<option>${t}</option>`).join('')}</select><select id="feeYear">${ACADEMIC_YEARS.map(y=>`<option>${y}</option>`).join('')}</select><button class="btn" id="addFeeStructBtn">Add</button></div><div class="overflow-x-auto"><table class="w-full"><thead><tr><th>Class</th><th>Term</th><th>Year</th><th>Amount</th><th>Action</th></tr></thead><tbody id="feeStructBody"></tbody></table></div></div>`;
            const render = () => { const tbody = document.getElementById('feeStructBody'); if(tbody) tbody.innerHTML = feeStructures.map(f=>`<tr><td class="p-2">${f.class}</td><td class="p-2">${f.term}</td><td class="p-2">${f.academic_year}</td><td class="p-2">${formatMoney(f.amount)}</td><td class="p-2"><button class="text-red-600" onclick="window.deleteFeeStructure('${f.id}')">Delete</button></td></tr>`).join(''); };
            render();
            document.getElementById('addFeeStructBtn').onclick = async () => { const className = document.getElementById('feeClass').value, amount = parseFloat(document.getElementById('feeAmount').value), term = document.getElementById('feeTerm').value, year = document.getElementById('feeYear').value; if(!className || isNaN(amount)) return; await restInsert('fee_structures', { school_id: SCHOOL_ID, class: className, term, amount, academic_year: year }); await refreshAllAndRender(); };
            window.deleteFeeStructure = async (id) => { if(confirm('Delete?')){ await restDelete('fee_structures', id); await refreshAllAndRender(); } };
        }

        // Student CRUD helpers (abridged)
        window.showAddStudentModal = () => { if(!canManageStudents()) return; const modal = document.createElement('div'); modal.className='modal'; modal.style.display='flex'; modal.innerHTML=`<div class="modal-content"><h3>Add Student</h3><input id="newFirstName" placeholder="First Name"><input id="newLastName" placeholder="Last Name"><input id="newAdm" placeholder="Admission Number"><select id="newClass">${CLASS_ORDER.map(c=>`<option>${c}</option>`).join('')}</select><input id="newParent" placeholder="Parent WhatsApp"><input id="newParentName" placeholder="Parent Name"><input id="newTotal" type="number" placeholder="Total Fees"><input id="newLin" placeholder="LIN"><div><label>Photo</label><input type="file" id="newPhoto" accept="image/*"></div><div class="flex justify-end gap-2 mt-4"><button class="btn" onclick="window.saveNewStudent()">Save</button><button class="btn-gold" onclick="this.closest('.modal').remove()">Cancel</button></div></div>`; document.body.appendChild(modal); };
        window.saveNewStudent = async () => { if(!canManageStudents()) return; const first = document.getElementById('newFirstName').value.trim(), last = document.getElementById('newLastName').value.trim(); if(!first||!last) return alert('Required'); const classVal = document.getElementById('newClass').value, whatsapp = document.getElementById('newParent').value, parentName = document.getElementById('newParentName').value; const total = parseFloat(document.getElementById('newTotal').value)||0; const lin = document.getElementById('newLin').value.trim()||`PM${Math.random().toString(36).substring(2,6).toUpperCase()}`; const adm = document.getElementById('newAdm').value.trim()||`PM${Date.now()}`; const studentId = crypto.randomUUID?.()||'s'+Date.now(); const photoFile = document.getElementById('newPhoto').files[0]; const finish = async (url)=>{ await restInsert('students',{ id:studentId, school_id:SCHOOL_ID, admission_number:adm, first_name:first, last_name:last, class:classVal, parent_whatsapp:whatsapp, parent_name:parentName, total_fees:total, lin:lin, photo_url:url, fees_paid:0 }); showToast('Added'); document.querySelector('.modal')?.remove(); await refreshAllAndRender(); }; if(photoFile) compressImage(photoFile, async blob=>{ try{ const url = await uploadPhoto(studentId, blob); await finish(url); }catch(e){ await finish(null); } }); else await finish(null); };
        window.editStudent = async (id) => { if(!canEditStudent()) return; const s = students.find(st=>st.id===id); const modal = document.createElement('div'); modal.className='modal'; modal.style.display='flex'; modal.innerHTML=`<div class="modal-content"><h3>Edit</h3><input id="editFirst" value="${escapeHtml(s.first_name)}"><input id="editLast" value="${escapeHtml(s.last_name)}"><input id="editAdm" value="${escapeHtml(s.admission_number)}"><select id="editClass">${CLASS_ORDER.map(c=>`<option ${s.class===c?'selected':''}>${c}</option>`).join('')}</select><input id="editParent" value="${escapeHtml(s.parent_whatsapp)}"><input id="editParentName" value="${escapeHtml(s.parent_name||'')}"><input id="editTotal" type="number" value="${s.total_fees}"><input id="editLin" value="${escapeHtml(s.lin)}"><div><label>New Photo</label><input type="file" id="editPhoto"></div><div class="flex justify-end gap-2 mt-4"><button class="btn" onclick="window.updateStudent('${id}')">Update</button><button class="btn-gold" onclick="this.closest('.modal').remove()">Cancel</button></div></div>`; document.body.appendChild(modal); };
        window.updateStudent = async (id) => { if(!canEditStudent()) return; const updates = { first_name: document.getElementById('editFirst').value, last_name: document.getElementById('editLast').value, admission_number: document.getElementById('editAdm').value, class: document.getElementById('editClass').value, parent_whatsapp: document.getElementById('editParent').value, parent_name: document.getElementById('editParentName').value, total_fees: parseFloat(document.getElementById('editTotal').value)||0, lin: document.getElementById('editLin').value }; const photoFile = document.getElementById('editPhoto').files[0]; const finish = async (url)=>{ if(url) updates.photo_url = url; await restUpdate('students', id, updates); showToast('Updated'); document.querySelector('.modal')?.remove(); await refreshAllAndRender(); }; if(photoFile) compressImage(photoFile, async blob=>{ try{ const url = await uploadPhoto(id, blob); await finish(url); }catch(e){ await finish(null); } }); else await finish(null); };
        window.deleteStudent = async (id) => { if(!canDeleteStudent()) return showToast('Only admin',true); if(confirm('Delete?')){ await restDelete('students', id); await refreshAllAndRender(); } };
        window.showFeeModal = (studentId) => { if(!canManageFees()) return; const student = students.find(s=>s.id===studentId); const modal = document.createElement('div'); modal.className='modal'; modal.style.display='flex'; modal.innerHTML=`<div class="modal-content"><h3>Payment for ${student.first_name} ${student.last_name}</h3><p>Paid: ${formatMoney(student.fees_paid)} | Owing: ${formatMoney((student.total_fees||0)-(student.fees_paid||0))}</p><input type="number" id="modalFeeAmount" placeholder="Amount"><input type="text" id="modalPaymentCode" placeholder="Code"><input type="date" id="modalPaymentDate" value="${new Date().toISOString().slice(0,10)}"><select id="modalAcademicYear">${ACADEMIC_YEARS.map(y=>`<option>${y}</option>`).join('')}</select><select id="modalTerm">${TERMS.map(t=>`<option>${t}</option>`).join('')}</select><div class="flex justify-end gap-2 mt-4"><button class="btn" onclick="window.recordFeePayment('${studentId}')">Record</button><button class="btn-gold" onclick="this.closest('.modal').remove()">Cancel</button></div></div>`; document.body.appendChild(modal); };
        window.recordFeePayment = async (studentId) => { if(!canManageFees()) return; const amount = parseFloat(document.getElementById('modalFeeAmount').value); if(isNaN(amount)) return alert('Valid amount'); const code = document.getElementById('modalPaymentCode').value.trim()||'MANUAL', date = document.getElementById('modalPaymentDate').value, year = document.getElementById('modalAcademicYear').value, term = document.getElementById('modalTerm').value; const student = students.find(s=>s.id===studentId); const newPaid = (student.fees_paid||0)+amount; await restUpdate('students', studentId, { fees_paid: newPaid }); const receipt = 'RCP'+Date.now(); await restInsert('payments', { school_id: SCHOOL_ID, student_id: studentId, amount, payment_date: date, receipt_number: receipt, payment_code: code }); await restInsert('transactions', { school_id: SCHOOL_ID, student_id: studentId, amount, payment_date: date, receipt, payment_code: code, academic_year: year, term }); showToast('Payment recorded'); document.querySelector('.modal')?.remove(); await refreshAllAndRender(); if(student.parent_whatsapp) sendWhatsApp(student.parent_whatsapp, `Payment of ${formatMoney(amount)} received for ${student.first_name}. Receipt: ${receipt}. Thank you.`); };
        window.exportStudentsExcel = () => { if(!canManageStudents()) return; const ws = XLSX.utils.json_to_sheet(students.map(s=>({ 'Admission Number':s.admission_number, 'First Name':s.first_name, 'Last Name':s.last_name, 'Class':s.class, 'LIN':s.lin, 'Parent WhatsApp':s.parent_whatsapp, 'Total Fees':s.total_fees }))); const wb = XLSX.utils.book_new(); XLSX.utils.book_append_sheet(wb, ws, 'Students'); XLSX.writeFile(wb, `students_${SCHOOL_ID}.xlsx`); };
        window.importStudentsExcel = async (file) => { if(!canManageStudents()) return showToast('Only admin',true); const reader = new FileReader(); reader.onload = async (e)=>{ const data = new Uint8Array(e.target.result); const workbook = XLSX.read(data,{type:'array'}); const sheet = workbook.Sheets[workbook.SheetNames[0]]; const rows = XLSX.utils.sheet_to_json(sheet); for(let row of rows){ const first = row['First Name']||row['firstName']; const last = row['Last Name']||row['lastName']; if(!first||!last) continue; const lin = row['LIN']||`PM${Math.random().toString(36).substring(2,6).toUpperCase()}`; await restInsert('students',{ school_id:SCHOOL_ID, admission_number:row['Admission Number']||`PM${Date.now()}`, first_name:first, last_name:last, class:row['Class']||'', parent_whatsapp:row['Parent WhatsApp']||'', total_fees:parseFloat(row['Total Fees'])||0, lin:lin, fees_paid:0 }); } showToast('Imported'); await refreshAllAndRender(); }; reader.readAsArrayBuffer(file); };

        // Main render
        function getAvailableTabs() {
            if(currentUser?.role==='admin') return ['students','attendance','absences','marks','fees','reports','idcards','branches','fee_structure'];
            if(currentUser?.role==='teacher') return ['attendance','marks'];
            if(currentUser?.role==='finance') return ['fees'];
            return [];
        }
        async function renderMainApp() {
            await loadAll();
            const now = new Date();
            const totalCollected = payments.reduce((s,p)=>s+p.amount,0);
            const totalExpected = students.reduce((s,st)=>s+st.total_fees,0);
            const today = new Date().toISOString().slice(0,10);
            const absentToday = attendance.filter(a=>a.date===today && a.status==='absent').length;
            const app = document.getElementById('app');
            if(!currentSchool){
                await restInsert('schools',{ id:SCHOOL_ID, name:'Progressive Mothers School', address:'Gayaza-Kijabijjo', phone:'0779585035' });
                currentSchool = { name:'Progressive Mothers School', address:'Gayaza-Kijabijjo', phone:'0779585035' };
            }
            const availableTabs = getAvailableTabs();
            if(!availableTabs.includes(activeTab)) activeTab = availableTabs[0];
            const showStats = canViewStats();
            app.innerHTML = `
                <div style="position:fixed;top:10px;right:10px;z-index:1000;"><span class="role-badge">${currentUser.role.toUpperCase()} (${currentUser.username})</span><button class="btn logout-btn" onclick="window.logout()">Logout</button></div>
                <div class="app-container">
                    <div class="school-header">
                        <div class="school-name">${escapeHtml(currentSchool.name)}</div>
                        <div class="school-address">${escapeHtml(currentSchool.address)} | 📞 ${SCHOOL_CONTACTS.join(', ')}</div>
                        <div class="datetime-row">
                            <span>📅 ${now.toLocaleDateString('en-US',{ weekday:'long', day:'numeric', month:'long', year:'numeric' })}</span>
                            <span>⏰ ${now.toLocaleTimeString()}</span>
                            <div class="global-search"><i class="fas fa-search"></i><input type="text" id="globalSearchInput" placeholder="Search by name, LIN or class..."></div>
                        </div>
                    </div>
                    ${showStats?`<div class="stats-grid"><div class="stat-card"><div class="stat-number">${students.length}</div><div class="stat-label">STUDENTS</div></div><div class="stat-card"><div class="stat-number">${formatMoney(totalCollected)}</div><div class="stat-label">COLLECTED</div></div><div class="stat-card"><div class="stat-number">${formatMoney(totalExpected-totalCollected)}</div><div class="stat-label">OUTSTANDING</div></div><div class="stat-card" data-stat-tab="absences"><div class="stat-number">${absentToday}</div><div class="stat-label">ABSENT TODAY</div></div></div>`:''}
                    <div class="action-buttons">
                        ${availableTabs.map(tab=>`<button class="action-btn ${activeTab===tab?'active':''}" data-tab="${tab}"><i class="fas ${tab==='students'?'fa-user-graduate':tab==='attendance'?'fa-calendar-check':tab==='absences'?'fa-user-slash':tab==='marks'?'fa-chart-line':tab==='fees'?'fa-money-bill-wave':tab==='reports'?'fa-file-alt':tab==='idcards'?'fa-id-card':tab==='branches'?'fa-building':'fa-cog'}"></i> ${tab.charAt(0).toUpperCase()+tab.slice(1)}</button>`).join('')}
                    </div>
                    <div id="tabContent"></div>
                </div>
                <div class="support-badge" onclick="window.showSupportWhatsApp()">
                    <i class="fab fa-whatsapp"></i> <span>📞 Eudes Media Support: ${SUPPORT_CONTACTS.map(c=>c.whatsapp).join(' / ')}</span>
                    <i class="fas fa-headset"></i>
                </div>
            `;
            const searchInput = document.getElementById('globalSearchInput');
            if(searchInput){ searchInput.value = globalSearchTerm; searchInput.addEventListener('input',(e)=>{ globalSearchTerm = e.target.value; renderMainApp(); }); }
            document.querySelectorAll('.action-btn').forEach(btn=>{ btn.onclick = ()=>{ activeTab = btn.dataset.tab; renderMainApp(); }; });
            if(showStats) document.querySelectorAll('.stat-card[data-stat-tab="absences"]').forEach(card=>{ card.onclick = ()=>{ activeTab='absences'; renderMainApp(); }; });
            if(activeTab==='students' && canManageStudents()) await renderStudents();
            else if(activeTab==='attendance' && canManageAttendance()) await renderAttendance();
            else if(activeTab==='absences' && canManageAbsencesTab()) await renderAbsencesTab();
            else if(activeTab==='marks' && canManageMarks()) await renderMarks();
            else if(activeTab==='fees' && canManageFees()) await renderFees();
            else if(activeTab==='reports' && canManageReports()) await renderReports();
            else if(activeTab==='idcards' && canManageIdCards()) await renderIdCards();
            else if(activeTab==='branches' && canManageBranches()) await renderBranches();
            else if(activeTab==='fee_structure' && canManageFeeStructure()) await renderFeeStructure();
        }
        window.showSupportWhatsApp = () => {
            let msg = `Hello, I need support for ${currentSchool?.name || 'Progressive Mothers School'}. Please assist.`;
            SUPPORT_CONTACTS.forEach(c => sendWhatsApp(c.whatsapp, msg));
        };
        function renderLogin() {
            const app = document.getElementById('app');
            app.innerHTML = `<div class="login-container"><h2><i class="fas fa-school"></i> School Management System</h2><form id="loginForm"><input type="text" id="username" placeholder="Username" required><input type="password" id="password" placeholder="Password" required><button type="submit" class="btn w-full">Login</button></form><div style="margin-top:20px;font-size:12px;color:#666;text-align:center;"><p>Demo accounts:</p><p><strong>admin</strong> / admin123 (full access)</p><p><strong>teacher</strong> / teacher123 (attendance & marks only)</p><p><strong>finance</strong> / finance123 (fees only)</p></div></div>`;
            document.getElementById('loginForm').onsubmit = (e)=>{ e.preventDefault(); const username = document.getElementById('username').value; const password = document.getElementById('password').value; if(login(username,password)) init(); else alert('Invalid'); };
        }
        async function init() {
            if(!checkAuth()){ renderLogin(); return; }
            try{
                let schools = await restFetch('schools',`id=eq.${SCHOOL_ID}`).catch(e=>[]);
                if(!schools.length){ await restInsert('schools',{ id:SCHOOL_ID, name:'Progressive Mothers School', address:'Gayaza-Kijabijjo', phone:'0779585035' }); schools = await restFetch('schools',`id=eq.${SCHOOL_ID}`); }
                currentSchool = schools[0];
                await renderMainApp();
            }catch(e){ document.getElementById('app').innerHTML = `<div class="bg-red-100 p-4 rounded-xl">Error: ${e.message}</div>`; }
        }
        window.logout = ()=>{ logout(); };
        init();
    })();
</script>
</body>
</html>
