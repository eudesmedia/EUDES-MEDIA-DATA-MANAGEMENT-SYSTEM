<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EUDES MEDIA | School Management</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        :root { --primary: #003366; --accent: #D4A017; --bg: #f8fafc; --white: #ffffff; --danger: #e11d48; --success: #10b981; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
        body { background: var(--bg); display: flex; height: 100vh; overflow: hidden; }
        
        /* --- LOGIN SCREEN --- */
        .login-overlay { position: fixed; inset: 0; background: linear-gradient(135deg, #001a33 0%, #003366 100%); z-index: 10000; display: flex; align-items: center; justify-content: center; }
        .login-card { background: white; padding: 40px; border-radius: 32px; width: 400px; text-align: center; box-shadow: 0 25px 50px rgba(0,0,0,0.4); }

        /* --- LAYOUT --- */
        .sidebar { width: 280px; background: var(--primary); color: white; display: flex; flex-direction: column; padding: 25px; flex-shrink: 0; }
        .sidebar h1 { font-size: 20px; color: var(--accent); border-bottom: 2px solid rgba(212,160,23,0.2); padding-bottom: 15px; margin-bottom: 25px; text-align: center; }
        .nav-item { padding: 12px 15px; cursor: pointer; border-radius: 12px; margin-bottom: 8px; display: flex; align-items: center; gap: 12px; font-size: 14px; transition: 0.3s; }
        .nav-item:hover, .nav-item.active { background: var(--accent); color: var(--primary); font-weight: 700; }
        
        .wrapper { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
        .top-nav { background: white; padding: 15px 30px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #e2e8f0; }
        .content { padding: 30px; overflow-y: auto; flex: 1; }
        .tab-view { display: none; }
        .tab-view.active { display: block; }

        /* --- CARDS --- */
        .stats-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; margin-bottom: 30px; }
        .stat-card { background: white; padding: 20px; border-radius: 20px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); border-left: 5px solid var(--accent); }
        .stat-card div:first-child { font-size: 11px; font-weight: 700; color: #64748b; text-transform: uppercase; }
        .stat-card div:last-child { font-size: 22px; font-weight: 700; color: var(--primary); margin-top: 5px; }

        .btn { padding: 10px 20px; border-radius: 10px; border: none; cursor: pointer; font-weight: 600; font-size: 14px; transition: 0.2s; }
        .btn-primary { background: var(--primary); color: white; }
        input { padding: 12px; border: 1px solid #cbd5e1; border-radius: 12px; width: 100%; margin-bottom: 15px; }
    </style>
</head>
<body>

    <div id="login-screen" class="login-overlay">
        <div class="login-card">
            <h1 style="color:var(--primary); margin-bottom:10px;">EUDES MEDIA</h1>
            <p style="color:#64748b; margin-bottom:30px;">Enter School Name to Start</p>
            <input type="text" id="school-input" placeholder="e.g. PROGRESSIVE or SUPER">
            <button class="btn btn-primary" style="width:100%; padding:15px;" onclick="handleLogin()">ENTER SYSTEM</button>
        </div>
    </div>

    <div class="sidebar">
        <h1>EUDES MEDIA</h1>
        <div class="nav-item active" onclick="showTab('dash')"><i class="fas fa-th-large"></i> Dashboard</div>
        <div class="nav-item" onclick="showTab('students')"><i class="fas fa-user-graduate"></i> Students</div>
        <div style="margin-top:auto; text-align:center; font-size:11px; opacity:0.6;">+256762992440</div>
    </div>

    <div class="wrapper">
        <div class="top-nav">
            <h3 id="view-title">Dashboard</h3>
            <div id="school-tag" style="font-weight:600; color:var(--primary)">---</div>
        </div>

        <div class="content">
            <div id="dash" class="tab-view active">
                <div class="stats-grid">
                    <div class="stat-card"><div>Total Students</div><div id="stat-total">0</div></div>
                    <div class="stat-card"><div>Fees Collected</div><div id="stat-paid">0</div></div>
                    <div class="stat-card"><div>Total Debt</div><div id="stat-debt" style="color:red">0</div></div>
                </div>
                <p id="msg" style="color:#64748b">Please wait, loading data...</p>
            </div>

            <div id="students" class="tab-view">
                <div style="background:white; padding:25px; border-radius:20px;">
                    <table style="width:100%; border-collapse:collapse;">
                        <thead style="text-align:left; color:#64748b; font-size:12px;">
                            <tr><th>LIN</th><th>NAME</th><th>CLASS</th><th>DEBT</th></tr>
                        </thead>
                        <tbody id="student-list"></tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

<script>
    const SB_URL = 'https://qtvkasgnrftajqrrcgsg.supabase.co/rest/v1/students';
    const SB_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InF0dmthc2ducmZ0YWpxcnJjZ3NnIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzczMTM5ODksImV4cCI6MjA5Mjg4OTk4OX0.gw1-WKC2ccGRXl1O74v1TaHu2DzwSlVTCaQHv6bsYcg';
    
    let schoolID = "";
    let data = [];

    // --- LOGIN WITHOUT PASSWORD ---
    function handleLogin() {
        const input = document.getElementById('school-input').value.trim().toUpperCase();
        if(!input) return alert("Enter a School Name");
        
        schoolID = input;
        document.getElementById('login-screen').style.display = 'none';
        document.getElementById('school-tag').innerText = schoolID;
        fetchData();
    }

    async function fetchData() {
        let url = SB_URL + "?order=name";
        // Filter by school unless it's SUPER mode
        if(schoolID !== 'SUPER') {
            url += `&school_id=eq.${schoolID}`;
        }

        const res = await fetch(url, {
            headers: { 'apikey': SB_KEY, 'Authorization': `Bearer ${SB_KEY}` }
        });
        data = await res.json();
        render();
    }

    function render() {
        let paid = 0, debt = 0;
        const tbody = document.getElementById('student-list');
        tbody.innerHTML = "";

        data.forEach(s => {
            const sDebt = (s.total_fees || 0) - (s.fees_paid || 0);
            paid += (s.fees_paid || 0);
            debt += sDebt;
            
            tbody.innerHTML += `
                <tr style="border-bottom:1px solid #f1f5f9;">
                    <td style="padding:15px; color:var(--accent); font-weight:700;">${s.lin}</td>
                    <td style="padding:15px;"><b>${s.name}</b></td>
                    <td style="padding:15px;">${s.class}</td>
                    <td style="padding:15px; color:red;">${sDebt.toLocaleString()}</td>
                </tr>`;
        });

        document.getElementById('stat-total').innerText = data.length;
        document.getElementById('stat-paid').innerText = paid.toLocaleString() + " UGX";
        document.getElementById('stat-debt').innerText = debt.toLocaleString() + " UGX";
        document.getElementById('msg').innerText = `Viewing ${data.length} records for ${schoolID}`;
    }

    function showTab(id) {
        document.querySelectorAll('.tab-view').forEach(t => t.classList.remove('active'));
        document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        event.currentTarget.classList.add('active');
    }
</script>
</body>
</html>
