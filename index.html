<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>EUDES MEDIA SCHOOL SYSTEM</title>
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <style>
        body { font-family: 'Segoe UI', Arial, sans-serif; background: #003366; color: white; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
        .card { background: white; color: #333; padding: 40px; border-radius: 15px; text-align: center; width: 350px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        h1 { color: #003366; margin: 0; }
        .status { padding: 15px; margin: 20px 0; border-radius: 8px; font-weight: bold; background: #eee; border: 1px solid #ccc; }
        .btn { background: #003366; color: white; border: none; padding: 15px; border-radius: 8px; cursor: pointer; width: 100%; font-weight: bold; font-size: 16px; }
        .btn:disabled { background: #ccc; cursor: not-allowed; }
    </style>
</head>
<body>

<div class="card" id="mainCard">
    <h1>EUDES MEDIA</h1>
    <p>Data Management Portal</p>
    
    <div id="status" class="status">🔌 Starting Engine...</div>
    
    <button class="btn" id="regBtn" onclick="register()" disabled>+ REGISTER STUDENT</button>

    <p style="font-size: 11px; margin-top: 20px; color: #888;">Support: +256762992440</p>
</div>

<script>
    const S_URL = 'https://qtvkasgnrftajqrrcgsg.supabase.co';
    const S_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InF0dmthc2ducmZ0YWpxcnJjZ3NnIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzczMTM5ODksImV4cCI6MjA5Mjg4OTk4OX0.gw1-WKC2ccGRXl1O74v1TaHu2DzwSlVTCaQHv6bsYcg';
    
    let supabase;

    window.onload = function() {
        const stat = document.getElementById('status');
        const btn = document.getElementById('regBtn');

        try {
            // Check if library exists
            if (typeof window.supabase === 'undefined') {
                throw new Error("Library not loaded. Check Internet.");
            }

            supabase = window.supabase.createClient(S_URL, S_KEY);
            stat.innerHTML = "✅ SYSTEM ONLINE";
            stat.style.color = "green";
            btn.disabled = false; // Enable button
            console.log("Supabase initialized successfully.");

        } catch (err) {
            stat.innerHTML = "❌ SYSTEM OFFLINE";
            stat.style.background = "#fee2e2";
            stat.style.color = "red";
            alert("SYSTEM ERROR: " + err.message);
        }
    };

    async function register() {
        const name = prompt("Student Full Name:");
        if (!name) return;

        const stat = document.getElementById('status');
        stat.innerText = "⏳ Saving...";

        try {
            const { error } = await supabase.from('students').insert([
                { name: name, lin: "LIN-" + Math.floor(1000 + Math.random() * 8999) }
            ]);

            if (error) throw error;

            alert("SUCCESS! " + name + " saved.");
            stat.innerText = "✅ SYSTEM ONLINE";

        } catch (e) {
            alert("SAVE FAILED: " + e.message);
            stat.innerText = "❌ ERROR";
        }
    }
</script>

</body>
</html>
