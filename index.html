// Supabase API
async function fetchDB(table, filter = '', retries = 3) {
    for (let i = 0; i < retries; i++) {
        try {
            let res = await fetch(`${SUPABASE_URL}/rest/v1/${table}?select=*${filter}`, {
                headers: { 'apikey': SUPABASE_KEY, 'Authorization': `Bearer ${SUPABASE_KEY}` }
            });
            if (!res.ok) {
                console.warn(`Fetch ${table} attempt ${i+1} failed:`, res.status);
                if (i === retries - 1) return [];
                await new Promise(r => setTimeout(r, 500 * (i + 1)));
                continue;
            }
            let text = await res.text();
            let data = text ? JSON.parse(text) : [];
            supabaseConnected = true;
            return data;
        } catch (e) {
            console.warn(`Fetch ${table} attempt ${i+1} error:`, e);
            if (i === retries - 1) return [];
            await new Promise(r => setTimeout(r, 500 * (i + 1)));
        }
    }
    return [];
}

async function insertDB(table, data) {

            body: JSON.stringify(data)

        if (!res.ok) {
            let errorText = await res.text();
            console.error('Insert error:', errorText);

            return null;
        }
        let text = await res.text();
        return text ? JSON.parse(text) : true;
    } catch (e) { showToast(`Error: ${e.message}`, true); return null; }
}

function fileToBase64(file) {
    return new Promise((resolve, reject) => {
        const reader = new FileReader();
        reader.readAsDataURL(file);
        reader.onload = () => resolve(reader.result);
        reader.onerror = error => reject(error);
    });
}

function renderClassSummary() {
    let container = document.getElementById('classSummaryContainer');
    if (!container) return;
    let students = getStudents(), payments = getPayments();
    let term = document.getElementById('classSummaryTerm')?.value || filterTerm;
    let year = document.getElementById('classSummaryYear')?.value || filterYear;
    let classData = {};
    for (let s of students) {
        if (!classData[s.class]) classData[s.class] = { expected: 0, paid: 0, count: 0 };
        let paid = payments.filter(p => p.student_id === s.id && p.term === term && p.academic_year === year).reduce((a, b) => a + (b.amount || 0), 0);
        classData[s.class].expected += s.total_fees || 0;
        classData[s.class].paid += paid;
        classData[s.class].count++;
    }
    let html = '', grandE = 0, grandP = 0;
    for (let cls of CLASS_ORDER) {
        if (!classData[cls]) continue;
        let d = classData[cls];
        let bal = d.expected - d.paid;
        grandE += d.expected; grandP += d.paid;
        html += `<div class="class-summary-card"><div style="display:flex;justify-content:space-between;flex-wrap:wrap;"><strong>${cls}</strong><span style="font-size:0.7rem;background:#e2e8f0;padding:0 10px;border-radius:20px;">${d.count} students</span></div>
        <div class="stat-row"><span><strong>Expected:</strong> ${formatMoney(d.expected)}</span><span><strong>Paid:</strong> <span class="paid">${formatMoney(d.paid)}</span></span><span><strong>Balance:</strong> <span class="${bal > 0 ? 'debt' : ''}">${formatMoney(bal)}</span></span><span><strong>Rate:</strong> ${d.expected > 0 ? Math.round((d.paid/d.expected)*100) : 0}%</span></div></div>`;
    }
    let totalBal = grandE - grandP;
    html += `<div class="class-summary-card" style="background:#fef3c7;border-left-color:#D4A017;"><strong>📊 SCHOOL TOTALS</strong><div class="stat-row">
        <span><strong>Expected:</strong> ${formatMoney(grandE)}</span><span><strong>Paid:</strong> <span class="paid">${formatMoney(grandP)}</span></span><span><strong>Balance:</strong> <span class="${totalBal > 0 ? 'debt' : ''}">${formatMoney(totalBal)}</span></span><span><strong>Rate:</strong> ${grandE > 0 ? Math.round((grandP/grandE)*100) : 0}%</span>
    </div></div>`;
    container.innerHTML = html;
}

function renderFinancialHistory() {
    let container = document.getElementById('historyBody');
    if (!container) return;
    let students = getStudents(), payments = getPayments();
    let term = document.getElementById('historyTermFilter')?.value || filterTerm;
    let year = document.getElementById('historyYearFilter')?.value || filterYear;
    let studentFilter = document.getElementById('historyStudentFilter')?.value || 'all';
    let methodFilter = document.getElementById('historyMethodFilter')?.value || 'all';
    let filtered = [...payments].filter(p => p.term === term && p.academic_year === year);
    if (studentFilter !== 'all') filtered = filtered.filter(p => p.student_id === studentFilter);
    if (methodFilter !== 'all') filtered = filtered.filter(p => p.payment_method === methodFilter);
    filtered.sort((a, b) => new Date(b.payment_date) - new Date(a.payment_date));
    if (filtered.length === 0) {
        container.innerHTML = '<tr><td colspan="9" style="text-align:center;padding:16px;color:#666;">No records found</td></tr>';
        return;
    }
    let html = '';
    for (let p of filtered) {
        let s = students.find(st => st.id === p.student_id);
        if (!s) continue;
        html += `<tr><td>${formatUgandaDateTime(p.payment_date)}</td><td><strong>${s.first_name} ${s.last_name}</strong></td><td>${s.lin}</td><td>${s.class}</td><td class="paid">${formatMoney(p.amount)}</td><td>${getPaymentMethodBadge(p.payment_method)}</td><td>${p.receipt_number || 'N/A'}</td><td>${p.term || 'Term I'}</td><td>${p.academic_year || CURRENT_ACADEMIC_YEAR}</td></tr>`;
    }
    container.innerHTML = html;
}

function printDebtorsList() {

window.deleteStudent = async (id) => {
    if (confirm('Delete this student?')) {
        let marks = getMarks(), attendance = getAttendance(), payments = getPayments();
        let studentMarks = marks.filter(m => m.student_id === id);
        for (let m of studentMarks) await deleteDB('marks', m.id);
        let studentAttendance = attendance.filter(a => a.student_id === id);
        for (let a of studentAttendance) await deleteDB('attendance', a.id);
        let studentPayments = payments.filter(p => p.student_id === id);
        for (let p of studentPayments) await deleteDB('payments', p.id);
        await deleteDB('students', id);
        cache.students = cache.students.filter(s => s.id !== id);
        cache.marks = cache.marks.filter(m => m.student_id !== id);
        cache.attendance = cache.attendance.filter(a => a.student_id !== id);
        cache.payments = cache.payments.filter(p => p.student_id !== id);
        renderStudents();
        showToast('Deleted');
    }
};

async function loadPromoteList() {
    let students = getStudents();
    let search = document.getElementById('promoteSearch')?.value || '';
    let filtered = students.filter(s => !search || `${s.first_name} ${s.last_name}`.toLowerCase().includes(search.toLowerCase()) || s.lin.toLowerCase().includes(search.toLowerCase()));
    let container = document.getElementById('promoteStudentsList');

    document.getElementById('promoteAll')?.addEventListener('change', function() { document.querySelectorAll('.promote-check').forEach(c => c.checked = this.checked); });
    document.getElementById('promoteSearch')?.addEventListener('input', () => debounce('promoteSearch', loadPromoteList, 150));
}

window.executePromotion = async () => {
    let selected = document.querySelectorAll('.promote-check:checked');
    if (selected.length === 0) { showToast('Select students', true); return; }
    let newClass = document.getElementById('promoteToClass').value;
    let count = 0;
    for (let cb of selected) {
        let id = cb.dataset.id;
        let result = await updateDB('students', id, { class: newClass });
        if (result) {
            updateCacheStudent({ id, class: newClass });
            count++;
        }
    }
    renderStudents();
    document.querySelector('.modal')?.remove();
    showToast(`${count} promoted to ${newClass}`);
};

async function loadAttendance() {
    let students = getStudents();
    let cls = document.getElementById('attClass').value;
    let date = document.getElementById('attDate').value;
    let classStd = students.filter(s => s.class === cls);
    if (attSearch) {
        const term = attSearch.toLowerCase();
        classStd = classStd.filter(s => `${s.first_name} ${s.last_name}`.toLowerCase().includes(term) || s.lin.toLowerCase().includes(term));
    }
    let existing = await fetchDB('attendance', `&date=eq.${date}&status=eq.absent&school_id=eq.${SCHOOL_ID}`);
    let absentSet = new Set(existing.map(a => a.student_id));
    let tbl = `<table><thead><tr><th>Photo</th><th>Student</th><th>LIN</th><th>Mark Absent</th></tr></thead><tbody>`;
    for (let s of classStd) {
        let photoHtml = s.photo_url ? `<img src="${s.photo_url}" style="width:35px;height:35px;border-radius:50%;object-fit:cover;">` : `<i class="fas fa-user-circle fa-2x"></i>`;
        tbl += `<tr><td>${photoHtml}</td><td><strong>${s.first_name} ${s.last_name}</strong></td><td>${s.lin}</td><td><input type="checkbox" class="absent-cb" data-id="${s.id}" ${absentSet.has(s.id) ? 'checked' : ''}></td></tr>`;
    }
    tbl += `</tbody></table>`;
    document.getElementById('attList').innerHTML = tbl;
}

async function saveAttendance() {
    let date = document.getElementById('attDate').value;
    let cbs = document.querySelectorAll('.absent-cb');
    for (let cb of cbs) {
        let sid = cb.dataset.id;
        let exist = await fetchDB('attendance', `&student_id=eq.${sid}&date=eq.${date}`);
        if (cb.checked) {
            if (!exist.length) {
                let att = { id: crypto.randomUUID(), school_id: SCHOOL_ID, student_id: sid, date, status: 'absent', academic_year: CURRENT_ACADEMIC_YEAR };
                await insertDB('attendance', att);
                cache.attendance.push(att);
            }
        } else {
            if (exist.length) {
                await deleteDB('attendance', exist[0].id);
                cache.attendance = cache.attendance.filter(a => a.id !== exist[0].id);
            }
        }
    }
    showToast('Attendance saved');
}

                let sid = inp.dataset.student;
                let subj = inp.dataset.subject;
                let markId = inp.dataset.markId;
                if (currentUser?.role === 'teacher' && markId) {
                    let existingMark = getMarks().find(m => m.id === markId);
                    if (existingMark && existingMark.created_at && (new Date() - new Date(existingMark.created_at)) / 60000 > 1) {

    document.getElementById('marksSearch').addEventListener('input', (e) => { if (document.getElementById('loadMarks')) debounce('marksSearch', () => document.getElementById('loadMarks').click(), 200); });

}

function calculatePosition(classStudents, term, examType, year) {
    let marks = getMarks();
    let scores = classStudents.map(s => {
        let total = 0;
        let subs = SUBJECTS_BY_CLASS[s.class] || [];
        for (let sub of subs) {
            let mark = marks.find(m => m.student_id === s.id && m.term === term && m.exam_type === examType && m.subject === sub && m.academic_year === year);
            if (mark) total += mark.score;
        }
        return { id: s.id, total: total };
    });
    scores.sort((a, b) => b.total - a.total);
    let map = new Map();
    scores.forEach((item, idx) => map.set(item.id, idx + 1));
    return map;
}

    let examType = examSelection === 'end' ? 'End of Term' : examSelection === 'mid' ? 'Mid Term' : 'Beginning';
    let positionMap = calculatePosition(classStudents, term, examType, year);
    let exams = examSelection === 'end' ? ['Beginning of Term', 'Mid Term', 'End of Term'] : examSelection === 'mid' ? ['Beginning of Term', 'Mid Term'] : ['Beginning of Term'];
    
    let html = `<!DOCTYPE html><html><head><title>Reports - ${term} ${year}</title><style>
        body{font-family:Arial;padding:20px;background:white;}
        .report-card{max-width:1000px;margin:0 auto 20px;background:white;border-radius:16px;padding:24px;page-break-after:all;box-shadow:0 2px 12px rgba(0,0,0,0.06);}

        @media print{body{padding:0;}.report-card{box-shadow:none;margin:0;page-break-after:always;}}
    </style></head><body>`;
    
    for (let s of selected) {
        let studentMarks = marks.filter(m => m.student_id === s.id && m.term === term && m.academic_year === year);
        let subjects = SUBJECTS_BY_CLASS[s.class] || ['English', 'Mathematics', 'Science', 'Social Studies'];

        exams.forEach(e => totals[e] = 0);
        for (let sub of subjects) {
            rows += `<tr><td style="font-weight:600;">${sub}</td>`;
            for (let ex of exams) {
                let mk = studentMarks.find(m => m.subject === sub && m.exam_type === ex);

                if (score !== '-') {
                    if (s.class === 'P.1' || s.class === 'P.2' || s.class === 'P.3') {
                        if (sub === 'R.E') grade = getLetterGrade(score);
                        else grade = getStandardGrade(score);
                    } else if (['Baby','Middle','Top'].includes(s.class)) {
                        grade = '-';
                    } else {
                        grade = getStandardGrade(score);
                    }

                rows += `<td>${score}<br><small>${grade}</small></td>`;
                if (mk) totals[ex] += mk.score;
            }
            rows += `</tr>`;

        let totalRow = `<tr style="background:#eef2ff;"><td style="font-weight:700;">TOTAL / ${subjects.length * 100}</td>`;

            <table class="grade-table"><thead><tr><th>SUBJECT</th>${exams.map(e => `<th>${e}</th>`).join('')}</tr></thead><tbody>${rows}</tbody></table>
            ${specialInfo}
            <div class="comment-section">

        </div>`;
    }
    html += `</body></html>`;

    win.document.write(html);
    win.document.close();
    win.print();
    showToast(`Printed ${selected.length} report(s)`);
}

    let grid = document.getElementById('absentGrid');
    if (absentStudents.length === 0) {
        grid.innerHTML = `<div style="text-align:center;padding:20px;background:#f0fdf4;border-radius:16px;"><i class="fas fa-check-circle" style="color:#10b981;"></i><p>No absent students on ${date}</p></div>`;
        return;
    }
    grid.innerHTML = `<div style="margin-bottom:10px;"><span style="background:#dc2626;color:white;padding:2px 12px;border-radius:30px;">${absentStudents.length} absent</span></div>`;
    for (let s of absentStudents) {
        let photoHtml = s.photo_url ? `<img src="${s.photo_url}" class="absent-photo" style="width:45px;height:45px;border-radius:50%;object-fit:cover;">` : `<div class="absent-photo"><i class="fas fa-user-graduate fa-2x"></i></div>`;
        grid.innerHTML += `<div class="absent-card">${photoHtml}<div style="flex:1;"><p><strong>${s.first_name} ${s.last_name}</strong></p><p style="font-size:0.75rem;">LIN: ${s.lin} | ${s.class}</p><p style="font-size:0.75rem;">Parent: ${s.parent_name || 'N/A'}</p></div><button class="btn btn-sm btn-whatsapp" onclick="sendAbsentParentNotify('${s.id}','${date}')"><i class="fab fa-whatsapp"></i> Notify</button></div>`;
    }
}

window.sendAbsentParentNotify = (id, date) => {
    let students = getStudents();
    let s = students.find(st => st.id === id);
    if (s?.parent_whatsapp) sendWhatsApp(s.parent_whatsapp, `Dear ${s.parent_name}, ${s.first_name} ${s.last_name} was absent on ${date}.`);
};

async function notifyAllAbsentParents() {
    let students = getStudents();
    let date = document.getElementById('absentDate').value;
    let records = await fetchDB('attendance', `&date=eq.${date}&status=eq.absent&school_id=eq.${SCHOOL_ID}`);
    let absent = students.filter(s => records.map(r => r.student_id).includes(s.id));
    let sent = 0;
    for (let s of absent) {
        if (s.parent_whatsapp) { sendWhatsApp(s.parent_whatsapp, `Dear ${s.parent_name}, ${s.first_name} ${s.last_name} was absent on ${date}.`); sent++; await new Promise(r => setTimeout(r, 100)); }
    }
    showToast(`Sent to ${sent} parents`);
}

function printAbsentList() {
    let date = document.getElementById('absentDate').value;
    let container = document.getElementById('absentGrid');
    if (!container || !container.innerHTML) return;
    let win = window.open('', '_blank');
    win.document.write(`<html><head><title>Absent Students - ${date}</title><style>
        body{font-family:Arial;padding:20px;}.absent-card{background:#fef2f2;border-radius:12px;padding:12px;display:flex;gap:12px;align-items:center;border-left:4px solid #dc2626;margin-bottom:8px;}.absent-photo{width:45px;height:45px;border-radius:50%;background:#e2e8f0;display:flex;align-items:center;justify-content:center;}h2{color:#003366;}
    </style></head><body><h2>PROGRESSIVE MOTHERS SCHOOL - ABSENT STUDENTS</h2><p>Date: ${date}</p>${container.innerHTML}<p style="margin-top:20px;font-size:10px;">Generated ${formatUgandaDateTime(getUgandaTime())}</p></body></html>`);
    win.document.close();
    win.print();
}

// ============= MAIN APP =============
async function renderMainApp() {
    await loadAllData();
    let perms = ROLE_PERMS[currentUser?.role];
    let tabs = ['dashboard'];
    if (perms.students) tabs.push('students');
    if (perms.attendance) tabs.push('attendance');
    if (perms.marks) tabs.push('marks');
    if (perms.fees) tabs.push('fees');
    if (perms.reports) tabs.push('reports');
    if (perms.absentees) tabs.push('absentees');
    if (!tabs.includes(activeTab)) activeTab = 'dashboard';
    
    let now = getUgandaTime();
    let statusClass = supabaseConnected ? '' : 'error';
    document.getElementById('app').innerHTML = `
        <div class="role-badge">${currentUser.role.toUpperCase()} <button class="logout-btn" onclick="logout()">Exit</button></div>
        <div class="app-container">
            <div class="school-header">
                <div class="school-name">🏫 PROGRESSIVE MOTHERS</div>
                <div class="school-address">Gayaza-Kijabijjo, Kampala | 📞 ${SCHOOL_CONTACTS.join(', ')}</div>
                <div class="datetime-row">
                    <div><i class="far fa-calendar-alt"></i> ${now.toLocaleDateString('en-UG', { weekday: 'short', year: 'numeric', month: 'short', day: 'numeric' })}</div>
                    <div><i class="far fa-clock"></i> <span id="liveTime">${now.toLocaleTimeString('en-UG', { hour: '2-digit', minute: '2-digit', hour12: true })} (EAT)</span></div>
                    <div class="global-search"><i class="fas fa-search"></i><input type="text" id="globalSearchInput" placeholder="Search..."></div>
                </div>
                <div style="margin-top:8px;display:flex;justify-content:flex-end;">
                    <span class="supabase-status ${statusClass}">${supabaseConnected ? '✅ Supabase Connected' : '⚠️ Supabase Error - Using Local Data'}</span>
                </div>
            </div>
            <div class="action-buttons">${tabs.map(t => `<button class="action-btn ${activeTab === t ? 'active' : ''}" data-tab="${t}"><i class="fas ${t === 'dashboard' ? 'fa-tachometer-alt' : t === 'students' ? 'fa-user-graduate' : t === 'attendance' ? 'fa-calendar-check' : t === 'marks' ? 'fa-chart-line' : t === 'fees' ? 'fa-coins' : t === 'reports' ? 'fa-print' : 'fa-user-clock'}"></i> ${t.charAt(0).toUpperCase() + t.slice(1)}</button>`).join('')}</div>
            <div id="tabContent"></div>
        </div>`;
    setInterval(() => { let t = document.getElementById('liveTime'); if (t) t.innerText = getUgandaTime().toLocaleTimeString('en-UG', { hour: '2-digit', minute: '2-digit', hour12: true }) + ' (EAT)'; }, 1000);
    let search = document.getElementById('globalSearchInput');
    if (search) {
        search.addEventListener('input', (e) => {
            globalSearch = e.target.value;
            if (activeTab === 'students') debounce('globalSearch', () => renderStudents(), 150);
        });
    }
    document.querySelectorAll('.action-btn').forEach(btn => { btn.onclick = () => { activeTab = btn.dataset.tab; renderMainApp(); }; });
    
    if (activeTab === 'dashboard') await renderDashboard();
    else if (activeTab === 'students') await renderStudents();
    else if (activeTab === 'attendance') await renderAttendance();
    else if (activeTab === 'marks') await renderMarks();
    else if (activeTab === 'fees') await renderFees();
    else if (activeTab === 'reports') await renderReports();
    else if (activeTab === 'absentees') await renderAbsentees();
}

function switchTab(tab) { activeTab = tab; renderMainApp(); }
function logout() { currentUser = null; sessionStorage.removeItem('progressive_user'); renderLogin(); }
function renderLogin() {
    document.getElementById('app').innerHTML = `<div class="login-container"><i class="fas fa-school fa-3x" style="color:#003366;"></i><h2>Progressive Mothers</h2><p>"With God Everything is Possible"</p><input type="text" id="username" placeholder="Username"><input type="password" id="password" placeholder="Password"><button onclick="doLogin()">Login</button></div>`;
}
function doLogin() {
    let u = document.getElementById('username').value, p = document.getElementById('password').value;
    if (u === 'admin' && p === 'admin123') { currentUser = { username: 'admin', role: 'admin' }; sessionStorage.setItem('progressive_user', JSON.stringify(currentUser)); renderMainApp(); }
    else if (u === 'teacher' && p === 'teacher123') { currentUser = { username: 'teacher', role: 'teacher' }; sessionStorage.setItem('progressive_user', JSON.stringify(currentUser)); renderMainApp(); }
    else if (u === 'finance' && p === 'finance123') { currentUser = { username: 'finance', role: 'finance' }; sessionStorage.setItem('progressive_user', JSON.stringify(currentUser)); renderMainApp(); }
    else alert('Invalid credentials');
}
function init() { 
    let saved = sessionStorage.getItem('progressive_user'); 
    if (saved) { 
        try { currentUser = JSON.parse(saved); renderMainApp(); } 
        catch(e) { renderLogin(); }
    } else renderLogin(); 
}
init();
</script>
