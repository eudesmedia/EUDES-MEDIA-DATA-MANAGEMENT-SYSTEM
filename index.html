<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>EUDES MEDIA | Core School Management System</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg-workspace: #f8fafc;
            --sidebar-dark: #090d16;
            --sidebar-item-hover: #151f32;
            --text-title: #0f172a;
            --text-muted: #64748b;
            --text-body: #334155;
            --brand-primary: #2563eb;
            --brand-primary-light: rgba(37, 99, 235, 0.08);
            --border-elegant: #e2e8f0;
            --emerald-success: #10b981;
            --emerald-bg: #ecfdf5;
            --rose-danger: #ef4444;
            --rose-bg: #fef2f2;
            --amber-warning: #f59e0b;
            --amber-bg: #fffbeb;
            --sidebar-width: 280px;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Plus Jakarta Sans', system-ui, sans-serif; }
        body { background: var(--bg-workspace); color: var(--text-body); min-height: 100vh; display: flex; -webkit-font-smoothing: antialiased; }

        /* --- SIDEBAR DECK --- */
        .sidebar-wrapper {
            width: var(--sidebar-width); background: var(--sidebar-dark); color: #f1f5f9;
            position: fixed; top: 0; bottom: 0; left: 0;
            display: flex; flex-direction: column; z-index: 100;
            border-right: 1px solid #1e293b;
        }
        .sidebar-branding {
            padding: 32px 28px; display: flex; align-items: center; gap: 14px;
            border-bottom: 1px solid #151f32;
        }
        .branding-logo {
            background: linear-gradient(135deg, #3b82f6, #1d4ed8);
            width: 38px; height: 38px; border-radius: 12px;
            display: flex; align-items: center; justify-content: center; color: white; font-size: 18px;
            box-shadow: 0 4px 12px rgba(37, 99, 235, 0.3);
        }
        .branding-text { font-weight: 800; font-size: 1.15rem; letter-spacing: -0.5px; color: #fff; }
        .branding-text span { color: #3b82f6; }
        
        .navigation-links { padding: 32px 20px; flex: 1; display: flex; flex-direction: column; gap: 8px; }
        .nav-link-item {
            width: 100%; background: transparent; border: none; padding: 14px 18px;
            border-radius: 12px; color: #94a3b8; font-weight: 600; font-size: 14px;
            cursor: pointer; display: flex; align-items: center; gap: 14px; transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .nav-link-item i { width: 20px; font-size: 18px; text-align: left; opacity: 0.8; }
        .nav-link-item:hover { background: var(--sidebar-item-hover); color: #fff; }
        .nav-link-item.active { background: var(--brand-primary); color: white; box-shadow: 0 4px 20px rgba(37,99,235,0.25); }

        /* --- CONTENT MAIN WRAPPER --- */
        .main-workspace-frame { margin-left: var(--sidebar-width); flex: 1; padding: 48px; min-width: 0; }
        
        .workspace-top-bar {
            display: flex; justify-content: space-between; align-items: center;
            margin-bottom: 40px; padding-bottom: 28px; border-bottom: 1px solid var(--border-elegant);
        }
        .meta-title-block h1 { font-size: 2rem; font-weight: 800; color: var(--text-title); letter-spacing: -0.75px; }
        .meta-sub-labels { font-size: 0.9rem; color: var(--text-muted); margin-top: 6px; display: flex; gap: 20px; font-weight: 500; }
        .meta-sub-labels span { display: flex; align-items: center; gap: 8px; }
        .meta-sub-labels i { color: var(--brand-primary); }

        /* --- KPI COUNTERS --- */
        .metrics-dashboard-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 28px; margin-bottom: 40px; }
        .metric-volumetric-card {
            background: white; border-radius: 20px; padding: 28px; display: flex; align-items: center;
            justify-content: space-between; border: 1px solid var(--border-elegant);
            box-shadow: 0 10px 30px -5px rgba(0, 0, 0, 0.02); transition: transform 0.2s;
        }
        .metric-volumetric-card:hover { transform: translateY(-2px); }
        .metric-details h4 { font-size: 13px; font-weight: 700; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.06em; }
        .metric-details .metric-numerical-value { font-size: 2rem; font-weight: 800; color: var(--text-title); margin-top: 10px; letter-spacing: -0.5px; }
        .metric-icon-wrapper { width: 56px; height: 56px; border-radius: 16px; display: flex; align-items: center; justify-content: center; font-size: 22px; }

        /* --- DASHBOARD INTERACTIVE CARD PANELS --- */
        .workspace-panel-card { 
            background: white; border-radius: 20px; padding: 36px; 
            border: 1px solid var(--border-elegant); box-shadow: 0 12px 36px -6px rgba(0,0,0,0.02); 
        }
        .panel-card-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 28px; }
        .panel-card-title { font-size: 1.25rem; font-weight: 700; color: var(--text-title); display: flex; align-items: center; gap: 12px; letter-spacing: -0.3px; }
        
        .search-input-group {
            background: #fff; border-radius: 14px; border: 1px solid var(--border-elegant);
            padding: 0 18px; display: flex; align-items: center; gap: 14px; margin-bottom: 28px; width: 100%;
            max-width: 440px; transition: all 0.2s; box-shadow: 0 2px 8px -2px rgba(0,0,0,0.02);
        }
        .search-input-group:focus-within { border-color: var(--brand-primary); box-shadow: 0 0 0 4px var(--brand-primary-light); }
        .search-input-group input { border: none; padding: 14px 0; outline: none; width: 100%; font-size: 14px; color: var(--text-title); font-weight: 500; background: transparent; }
        .search-input-group i { color: var(--text-muted); font-size: 16px; }

        /* --- DATA TABLES --- */
        .table-responsive-container { width: 100%; overflow-x: auto; border-radius: 14px; border: 1px solid var(--border-elegant); }
        table { width: 100%; border-collapse: collapse; text-align: left; }
        th { background: #f8fafc; padding: 16px 24px; font-size: 12px; font-weight: 700; color: #475569; border-bottom: 1px solid var(--border-elegant); text-transform: uppercase; letter-spacing: 0.05em; }
        td { padding: 18px 24px; font-size: 14px; border-bottom: 1px solid #f1f5f9; color: var(--text-body); vertical-align: middle; }
        tr:last-child td { border-bottom: none; }
        tr:hover td { background: #f8fafc; }

        .status-pill-badge { display: inline-flex; padding: 6px 14px; border-radius: 10px; font-size: 12px; font-weight: 700; }
        .status-pill-badge.danger { background: var(--rose-bg); color: var(--rose-danger); }
        .status-pill-badge.success { background: var(--emerald-bg); color: var(--emerald-success); }
        
        .action-tool-btn {
            background: transparent; border: none; cursor: pointer; font-size: 15px; 
            padding: 10px; border-radius: 10px; color: var(--text-muted); transition: all 0.2s; margin-left: 6px;
        }
        .action-tool-btn:hover { background: #f1f5f9; color: var(--text-title); }
        .action-tool-btn.delete-action:hover { background: var(--rose-bg); color: var(--rose-danger); }

        /* --- FORM GRID ARCHITECTURE --- */
        .form-layout-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 28px; margin-bottom: 36px; }
        .form-input-wrapper { display: flex; flex-direction: column; gap: 10px; }
        .form-input-wrapper label { font-size: 13px; font-weight: 700; color: #475569; text-transform: uppercase; letter-spacing: 0.03em; }
        input[type="text"], input[type="number"], select {
            width: 100%; padding: 14px 18px; border: 1px solid #cbd5e1; border-radius: 12px;
            font-size: 14px; color: var(--text-title); font-weight: 500; outline: none; transition: all 0.2s; background: #fff;
        }
        input:focus, select:focus { border-color: var(--brand-primary); box-shadow: 0 0 0 4px var(--brand-primary-light); }

        /* --- BUTTONS --- */
        .action-btn-primary {
            background: var(--brand-primary); color: white; font-weight: 600; padding: 14px 28px; border: none;
            border-radius: 12px; cursor: pointer; display: inline-flex; align-items: center; gap: 10px; font-size: 14px;
            transition: background 0.2s, transform 0.1s; box-shadow: 0 4px 14px rgba(37, 99, 235, 0.2);
        }
        .action-btn-primary:hover { background: #1d4ed8; }
        .action-btn-primary:active { transform: scale(0.98); }
        .action-btn-secondary { background: #e2e8f0; color: #475569; box-shadow: none; }
        .action-btn-secondary:hover { background: #cbd5e1; }

        /* --- ATTENDANCE ROLL OVERLAYS --- */
        .attendance-tracking-strip { display: flex; justify-content: space-between; align-items: center; padding: 16px 4px; border-bottom: 1px solid #f1f5f9; }
        .attendance-dropdown-pill { width: auto; padding: 8px 16px; border-radius: 10px; font-weight: 700; font-size: 13px; border-color: var(--border-elegant); }

        /* --- SYSTEM HOVER MODALS & TOAST CARDS --- */
        .toast-notification-node {
            position: fixed; bottom: 40px; right: 40px; background: var(--sidebar-dark); color: white;
            padding: 18px 28px; border-radius: 16px; box-shadow: 0 20px 40px -5px rgba(0,0,0,0.3);
            font-weight: 600; font-size: 14px; z-index: 1000; display: flex; align-items: center; gap: 12px;
            border: 1px solid #1e293b; animation: overlayPopIn 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
        }
        @keyframes overlayPopIn { from { opacity: 0; transform: scale(0.85) translateY(12px); } to { opacity: 1; transform: scale(1) translateY(0); } }

        .modal-blur-overlay {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(15,23,42,0.3); backdrop-filter: blur(8px); z-index: 1000;
            align-items: center; justify-content: center; padding: 20px;
        }
        .modal-frame-window { background: white; border-radius: 24px; padding: 40px; width: 100%; max-width: 520px; box-shadow: 0 30px 60px -15px rgba(0,0,0,0.15); border: 1px solid var(--border-elegant); }

        @media (max-width: 1024px) {
            .sidebar-wrapper { width: 80px; }
            .sidebar-wrapper .branding-text, .sidebar-wrapper span { display: none; }
            .main-workspace-frame { margin-left: 80px; padding: 28px; }
            .metrics-dashboard-grid { grid-template-columns: 1fr; gap: 20px; }
            .form-layout-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

    <aside class="sidebar-wrapper">
        <div class="sidebar-branding">
            <div class="branding-logo"><i class="fas fa-play-circle"></i></div>
            <div class="branding-text">EUDES<span>MEDIA</span></div>
        </div>
        <nav class="navigation-links">
            <button class="nav-link-item active" id="btn-records" onclick="switchView('records')"><i class="fas fa-address-book"></i> <span>Students Directory</span></button>
            <button class="nav-link-item" id="btn-admission" onclick="switchView('admission')"><i class="fas fa-user-plus"></i> <span>Admit Student</span></button>
            <button class="nav-link-item" id="btn-rollcall" onclick="switchView('rollcall')"><i class="fas fa-calendar-check"></i> <span>Roll Call Monitor</span></button>
        </nav>
    </aside>

    <main class="main-workspace-frame">
        <div class="workspace-top-bar">
            <div class="meta-title-block">
                <h1 id="banner-school-name">LOADING PROFILE...</h1>
                <div class="meta-sub-labels">
                    <span id="banner-location"><i class="fas fa-location-crosshairs"></i> TRACKING LOCATION...</span>
                    <span><i class="fas fa-shield-halved"></i> EUDES MEDIA Cloud Engine Platform</span>
                </div>
            </div>
        </div>

        <div class="metrics-dashboard-grid">
            <div class="metric-volumetric-card">
                <div class="metric-details"><h4>Active Enrollment</h4><div class="metric-numerical-value" id="m-total">0</div></div>
                <div class="metric-icon-wrapper" style="background:#f0f6ff; color:var(--brand-primary);"><i class="fas fa-graduation-cap"></i></div>
            </div>
            <div class="metric-volumetric-card">
                <div class="metric-details"><h4>Revenue Logs</h4><div class="metric-numerical-value" id="m-fees">0</div></div>
                <div class="metric-icon-wrapper" style="background:var(--emerald-bg); color:var(--emerald-success);"><i class="fas fa-vault"></i></div>
            </div>
            <div class="metric-volumetric-card">
                <div class="metric-details"><h4>Daily Absenteeism</h4><div class="metric-numerical-value" id="m-absent">0</div></div>
                <div class="metric-icon-wrapper" style="background:var(--rose-bg); color:var(--rose-danger);"><i class="fas fa-triangle-exclamation"></i></div>
            </div>
        </div>

        <div id="view-viewport"></div>
    </main>

    <script>
        // ==================== ENGINE ARCHITECTURE CONFIG & SUPABASE POOLS ====================
        const SUPABASE_URL = 'https://qtvkasgnrftajqrrcgsg.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InF0dmthc2ducmZ0YWpxcnJjZ3NnIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzczMTM5ODksImV4cCI6MjA5Mjg4OTk4OX0.gw1-WKC2ccGRXl1O74v1TaHu2DzwSlVTCaQHv6bsYcg';
        const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        let schoolContext = { id: '11111111-1111-1111-1111-111111111111', name: 'PROGRESSIVE MOTHERS', address: 'GAYAZA-KIJABIJJO' };
        let localDataCache = [];
        let activeView = 'records';

        function alertNotify(msg) {
            const el = document.createElement('div'); el.className = 'toast-notification-node'; el.innerHTML = `<i class="fas fa-circle-check" style="color:var(--emerald-success); font-size:16px;"></i> <span>${msg}</span>`;
            document.body.appendChild(el); setTimeout(() => el.remove(), 3500);
        }

        function formatUGX(val) { return 'UGX ' + (val || 0).toLocaleString(); }

        // ==================== ROUTING MANAGER ENGINE ====================
        async function switchView(targetView) {
            activeView = targetView;
            document.querySelectorAll('.nav-link-item').forEach(b => b.classList.remove('active'));
            const matchedBtn = document.getElementById(`btn-${targetView}`);
            if(matchedBtn) matchedBtn.classList.add('active');

            const container = document.getElementById('view-viewport');
            
            if (targetView === 'records') {
                container.innerHTML = `
                    <div class="search-input-group">
                        <i class="fas fa-magnifying-glass"></i>
                        <input type="text" id="directorySearchInput" placeholder="Filter roster profiles by name or unique LIN keys...">
                    </div>
                    <div class="workspace-panel-card">
                        <div class="panel-card-header">
                            <div class="panel-card-title"><i class="fas fa-database" style="color:var(--brand-primary);"></i> Active Student Roster Partition</div>
                        </div>
                        <div class="table-responsive-container">
                            <table>
                                <thead><tr><th>Student/Identity Keys</th><th>Class Grade</th><th>Arrears Matrix</th><th style="text-align:right;">Control Actions</th></tr></thead>
                                <tbody id="student-tbody-target"></tbody>
                            </table>
                        </div>
                    </div>`;
                document.getElementById('directorySearchInput').addEventListener('input', (e) => executeClientSearch(e.target.value));
                await syncRenderTableData();
            } else if (targetView === 'admission') {
                container.innerHTML = `
                    <div class="workspace-panel-card" style="max-width: 760px; margin: 0 auto;">
                        <div class="panel-card-header">
                            <div class="panel-card-title"><i class="fas fa-address-card" style="color:var(--brand-primary);"></i> Institutional Admission Registration</div>
                        </div>
                        <div class="form-layout-grid">
                            <div class="form-input-wrapper"><label>Full Legal Name</label><input type="text" id="form-name" placeholder="e.g., Kigozi Arthur"></div>
                            <div class="form-input-wrapper"><label>Assigned Class Grade</label>
                                <select id="form-class">
                                    <option>Primary 1</option><option>Primary 2</option><option>Primary 3</option><option>Primary 4</option>
                                    <option>Primary 5</option><option>Primary 6</option><option>Primary 7</option>
                                </select>
                            </div>
                            <div class="form-input-wrapper"><label>Parent Guardian WhatsApp</label><input type="text" id="form-wa" placeholder="e.g., 256701XXXXXX"></div>
                            <div class="form-input-wrapper"><label>Tuition Standard Flat Allocation (UGX)</label><input type="number" id="form-fees" placeholder="Rate magnitude values"></div>
                        </div>
                        <div style="text-align: right;">
                            <button class="action-btn-primary" onclick="commitStudentRegistration()"><i class="fas fa-circle-arrow-up"></i> Deploy Profile Node</button>
                        </div>
                    </div>`;
            } else if (targetView === 'rollcall') {
                await renderAttendanceRegistryView();
            }
        }

        // ==================== RENDERS & SERVER CONTEXT READ LOGIC ====================
        async function fetchSystemState() {
            let { data } = await supabase.from('students').select('*').eq('school_id', schoolContext.id).order('name', { ascending: true });
            localDataCache = data || [];
            
            let { data: trx } = await supabase.from('transactions').select('amount').eq('school_id', schoolContext.id);
            let { data: att } = await supabase.from('attendance').select('status').eq('school_id', schoolContext.id).eq('date', new Date().toISOString().slice(0,10));
            
            document.getElementById('m-total').innerText = localDataCache.length;
            document.getElementById('m-fees').innerText = formatUGX((trx || []).reduce((acc, curr) => acc + (curr.amount || 0), 0));
            document.getElementById('m-absent').innerText = (att || []).filter(a => a.status === 'absent').length;
        }

        async function syncRenderTableData(dataset = null) {
            const target = document.getElementById('student-tbody-target');
            if(!target) return;
            let elements = dataset || localDataCache;
            target.innerHTML = '';

            if(!elements.length) {
                target.innerHTML = `<tr><td colspan="4" style="text-align:center; padding:56px; color:var(--text-muted); font-weight:500;"><i class="fas fa-cubes-stacked block text-xl mb-2" style="color:#cbd5e1;"></i> Empty query data arrays context returned.</td></tr>`;
                return;
            }

            elements.forEach(s => {
                let debt = (s.total_fees || 0) - (s.fees_paid || 0);
                let row = document.createElement('tr');
                row.innerHTML = `
                    <td><strong>${s.name}</strong><br><small style="color:var(--text-muted); font-family:'JetBrains Mono', monospace; font-size:11px;">LIN-${s.lin || 'NONE'}</small></td>
                    <td><span style="background:#f1f5f9; padding:6px 12px; border-radius:8px; font-weight:700; font-size:12px; color:var(--text-title);">${s.class}</span></td>
                    <td><span class="status-pill-badge ${debt <= 0 ? 'success' : 'danger'}">${debt <= 0 ? 'CLEARED' : formatUGX(debt)}</span></td>
                    <td style="text-align:right;">
                        <button class="action-tool-btn" onclick="triggerFeesPaymentModal('${s.id}')" title="Collect Fees"><i class="fas fa-receipt" style="color:var(--emerald-success);"></i></button>
                        <button class="action-tool-btn" onclick="trigger
