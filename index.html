function getUgandaTime() {

function formatUgandaDate(date) {

// Supabase API
async function fetchDB(table, filter = '') {
    try {
        let res = await fetch(`${SUPABASE_URL}/rest/v1/${table}?select=*${filter}`, {
            headers: { 'apikey': SUPABASE_KEY, 'Authorization': `Bearer ${SUPABASE_KEY}` }
        });
        if (!res.ok) return [];
        let text = await res.text();
        return text ? JSON.parse(text) : [];
    } catch (e) { return []; }
}

async function insertDB(table, data) {
    try {
        let res = await fetch(`${SUPABASE_URL}/rest/v1/${table}`, {
            method: 'POST',
            headers: { 'apikey': SUPABASE_KEY, 'Authorization': `Bearer ${SUPABASE_KEY}`, 'Content-Type': 'application/json' },
            body: JSON.stringify(data)
        });
        if (!res.ok) {
            let errorText = await res.text();
            console.error('Insert error:', errorText);
            showToast(`Error: ${errorText.substring(0, 100)}`, true);
            return null;
        }
        let text = await res.text();
        return text ? JSON.parse(text) : true;
    } catch (e) { showToast(`Error: ${e.message}`, true); return null; }
}

async function updateDB(table, id, data) {
    try {
        let res = await fetch(`${SUPABASE_URL}/rest/v1/${table}?id=eq.${id}`, {
            method: 'PATCH',
            headers: { 'apikey': SUPABASE_KEY, 'Authorization': `Bearer ${SUPABASE_KEY}`, 'Content-Type': 'application/json' },
            body: JSON.stringify(data)
        });
        if (!res.ok) throw new Error(await res.text());
        let text = await res.text();
        return text ? JSON.parse(text) : true;
    } catch (e) { showToast(`Error: ${e.message}`, true); return null; }
}

async function deleteDB(table, id) {

        method: 'DELETE',
        headers: { 'apikey': SUPABASE_KEY, 'Authorization': `Bearer ${SUPABASE_KEY}` }

}

            <div class="data-table"><table><thead><tr><th>Photo</th><th>Name</th><th>Class</th><th>LIN</th><th>Payment Code</th>${viewFinance ? '<th>Total</th><th>Paid</th><th>Balance</th>' : ''}<th>Parent</th><th>Actions</th></tr></thead><tbody id="studentsBody"></tbody></table></div>
        </div>`;
    
    document.getElementById('studentSearch').addEventListener('input', (e) => { globalSearch = e.target.value; renderStudents(); });
    let tbody = document.getElementById('studentsBody');
    for (let s of filtered) {
        let paid = payments.filter(p => p.student_id === s.id).reduce((a, b) => a + (b.amount || 0), 0);
        let bal = (s.total_fees || 0) - paid;
        let row = tbody.insertRow();
        let photoHtml = s.photo_url ? `<img src="${s.photo_url}" class="student-photo-img" style="width:45px;height:45px;border-radius:50%;object-fit:cover;">` : `<div class="student-photo-img"><i class="fas fa-user-circle fa-2x"></i></div>`;
        let actions = '';
        if (perms.editStudents) {
            actions += `<button class="btn btn-sm btn-primary" onclick="editStudent('${s.id}')">Edit</button> <button class="btn btn-sm btn-red" onclick="deleteStudent('${s.id}')">Delete</button>`;
        }
        actions += `<button class="btn btn-sm btn-gold" onclick="showStudentFinancialHistory('${s.id}')"><i class="fas fa-history"></i> Fees History</button>`;
        
        if (viewFinance) {
            row.innerHTML = `<td>${photoHtml}</td><td><strong>${s.first_name} ${s.last_name}</strong></td><td>${s.class}</td><td>${s.lin}</td><td>${s.payment_code || ''}</td><td>${formatMoney(s.total_fees || 0)}</td><td class="paid">${formatMoney(paid)}</td><td class="${bal > 0 ? 'debt' : ''}">${formatMoney(bal)}</td><td>${escapeHtml(s.parent_name || '')}</td><td>${actions}</td>`;
        } else {
            row.innerHTML = `<td>${photoHtml}</td><td><strong>${s.first_name} ${s.last_name}</strong></td><td>${s.class}</td><td>${s.lin}</td><td>${s.payment_code || ''}</td><td>${escapeHtml(s.parent_name || '')}</td><td>${actions}</td>`;
        }
    }
}

window.showStudentFinancialHistory = (studentId) => {

// ==================== CLASS SUMMARY ====================
function renderClassSummary() {
    let container = document.getElementById('classSummaryContainer');
    if (!container) return;
    let term = document.getElementById('classSummaryTerm')?.value || filterTerm;
    let year = document.getElementById('classSummaryYear')?.value || filterYear;
    
    let classData = {};
    for (let s of students) {
        if (!classData[s.class]) {
            classData[s.class] = { expected: 0, paid: 0, count: 0, students: [] };
        }
        let paid = payments.filter(p => p.student_id === s.id && p.term === term && p.academic_year === year).reduce((a, b) => a + (b.amount || 0), 0);
        classData[s.class].expected += s.total_fees || 0;
        classData[s.class].paid += paid;
        classData[s.class].count++;
        classData[s.class].students.push(s);
    }
    
    let html = '';
    let grandExpected = 0, grandPaid = 0;
    for (let cls of CLASS_ORDER) {
        if (!classData[cls]) continue;
        let data = classData[cls];
        let bal = data.expected - data.paid;
        grandExpected += data.expected;
        grandPaid += data.paid;
        html += `
            <div class="class-summary-card">
                <div style="display:flex; justify-content:space-between; align-items:center; flex-wrap:wrap; gap:10px;">
                    <strong style="font-size:16px; color:#003366;">${cls}</strong>
                    <span style="font-size:12px; background:#e2e8f0; padding:2px 12px; border-radius:20px;">${data.count} students</span>
                </div>
                <div class="stat-row">
                    <span><strong>Expected:</strong> ${formatMoney(data.expected)}</span>
                    <span><strong>Paid:</strong> <span class="paid">${formatMoney(data.paid)}</span></span>
                    <span><strong>Balance:</strong> <span class="${bal > 0 ? 'debt' : ''}">${formatMoney(bal)}</span></span>
                    <span><strong>Collection Rate:</strong> ${data.expected > 0 ? Math.round((data.paid/data.expected)*100) : 0}%</span>
                </div>
            </div>
        `;
    }
    
    let totalBal = grandExpected - grandPaid;
    html += `
        <div class="class-summary-card" style="background:#fef3c7; border-left-color:#D4A017;">
            <strong style="font-size:16px; color:#003366;">📊 SCHOOL TOTALS</strong>
            <div class="stat-row">
                <span><strong>Total Expected:</strong> ${formatMoney(grandExpected)}</span>
                <span><strong>Total Paid:</strong> <span class="paid">${formatMoney(grandPaid)}</span></span>
                <span><strong>Total Balance:</strong> <span class="${totalBal > 0 ? 'debt' : ''}">${formatMoney(totalBal)}</span></span>
                <span><strong>Overall Rate:</strong> ${grandExpected > 0 ? Math.round((grandPaid/grandExpected)*100) : 0}%</span>
            </div>
        </div>
    `;
    container.innerHTML = html;
}

    }
}

// ==================== FINANCIAL HISTORY ====================
function renderFinancialHistory() {
    let container = document.getElementById('historyBody');
    if (!container) return;
    let searchTerm = document.getElementById('historySearch')?.value || '';
    let term = document.getElementById('historyTermFilter')?.value || filterTerm;
    let year = document.getElementById('historyYearFilter')?.value || filterYear;
    let studentFilter = document.getElementById('historyStudentFilter')?.value || 'all';
    let methodFilter = document.getElementById('historyMethodFilter')?.value || 'all';
    
    let filtered = [...payments].filter(p => p.term === term && p.academic_year === year);
    if (studentFilter !== 'all') {
        filtered = filtered.filter(p => p.student_id === studentFilter);
    }
    if (methodFilter !== 'all') {
        filtered = filtered.filter(p => p.payment_method === methodFilter);
    }
    filtered.sort((a, b) => new Date(b.payment_date) - new Date(a.payment_date));
    
    if (searchTerm) {
        const termSearch = searchTerm.toLowerCase();
        filtered = filtered.filter(p => {
            let s = students.find(st => st.id === p.student_id);
            return s && (`${s.first_name} ${s.last_name}`.toLowerCase().includes(termSearch) || s.lin.toLowerCase().includes(termSearch));
        });
    }
    
    if (filtered.length === 0) {
        container.innerHTML = '<tr><td colspan="9" style="text-align:center;color:#666;padding:20px;">No payment records found for ' + term + ' ' + year + '</td></tr>';
        return;
    }
    
    let html = '';
    for (let p of filtered) {
        let s = students.find(st => st.id === p.student_id);
        if (!s) continue;
        let dateTime = formatUgandaDateTime(p.payment_date);
        let methodBadge = getPaymentMethodBadge(p.payment_method);
        html += `<tr>
            <td>${dateTime}</td>
            <td><strong>${s.first_name} ${s.last_name}</strong></td>
            <td>${s.lin}</td>
            <td>${s.class}</td>
            <td class="paid">${formatMoney(p.amount)}</td>
            <td>${methodBadge}</td>
            <td>${p.receipt_number || 'N/A'}</td>
            <td>${p.term || 'Term I'}</td>
            <td>${p.academic_year || CURRENT_ACADEMIC_YEAR}</td>
        </tr>`;
    }
    container.innerHTML = html;
}

// Helper: Convert file to base64
function fileToBase64(file) {
    return new Promise((resolve, reject) => {
        const reader = new FileReader();
        reader.readAsDataURL(file);
        reader.onload = () => resolve(reader.result);
        reader.onerror = error => reject(error);
    });
}

async function loadAttendance() {
    let cls = document.getElementById('attClass').value;
    let date = document.getElementById('attDate').value;
    let classStd = students.filter(s => s.class === cls);
    if (attSearch) {
        const term = attSearch.toLowerCase();
        classStd = classStd.filter(s => `${s.first_name} ${s.last_name}`.toLowerCase().includes(term) || s.lin.toLowerCase().includes(term));
    }
    let existing = await fetchDB('attendance', `&date=eq.${date}&status=eq.absent&school_id=eq.${SCHOOL_ID}`);
    let absentSet = new Set(existing.map(a => a.student_id));
    let tbl = `<table><thead><tr><th>Photo</th><th>Student</th><th>LIN</th><th>Mark Absent</th></tr></thead><tbody>`;
    for (let s of classStd) {

async function saveAttendance() {

        let classStd = students.filter(s => s.class === cls);

            const termSearch = document.getElementById('marksSearch').value.toLowerCase();
            classStd = classStd.filter(s => `${s.first_name} ${s.last_name}`.toLowerCase().includes(termSearch) || s.lin.toLowerCase().includes(termSearch));
        }
        let subs = SUBJECTS_BY_CLASS[cls] || [];
        let relMarks = marks.filter(m => m.term === term && m.exam_type === exam && m.academic_year === year);
        let grid = `<table><thead><tr><th>Student</th><th>Photo</th>${subs.map(s => `<th>${s}</th>`).join('')}</thead><tbody>`;
        for (let s of classStd) {
            let photoHtml = s.photo_url ? `<img src="${s.photo_url}" style="width:40px;height:40px;border-radius:50%;object-fit:cover;">` : `<i class="fas fa-user-circle fa-2x"></i>`;
            grid += `<tr><td><strong>${s.first_name} ${s.last_name}</strong><br><small>${s.lin}</small></td><td>${photoHtml}</td>`;
            for (let sub of subs) {
                let mk = relMarks.find(m => m.student_id === s.id && m.subject === sub);
                let isLocked = false;
                if (currentUser?.role === 'teacher' && mk && mk.created_at) {
                    let timeDiff = (new Date() - new Date(mk.created_at)) / 1000 / 60;
                    isLocked = timeDiff > 1;
                }
                let disabledAttr = isLocked ? 'disabled' : '';
                grid += `<td><input type="number" class="mark-input" data-student="${s.id}" data-subject="${sub}" data-mark-id="${mk?.id || ''}" value="${mk ? mk.score : ''}" style="width:70px;" min="0" max="100" ${disabledAttr}> ${isLocked ? '🔒' : ''}</td>`;
            }
            grid += `</tr>`;
        }
        grid += `</tbody></table>`;
        document.getElementById('marksGrid').innerHTML = grid;
    };

        let term = document.getElementById('markTerm').value;
        let exam = document.getElementById('markExam').value;
        let year = document.getElementById('markYear').value;
        let inputs = document.querySelectorAll('.mark-input');
        for (let inp of inputs) {
            let score = parseInt(inp.value);
            if (!isNaN(score) && score >= 0 && score <= 100) {
                let sid = inp.dataset.student;
                let subj = inp.dataset.subject;
                let markId = inp.dataset.markId;
                if (currentUser?.role === 'teacher' && markId) {
                    let existingMark = marks.find(m => m.id === markId);
                    if (existingMark && existingMark.created_at) {
                        let timeDiff = (new Date() - new Date(existingMark.created_at)) / 1000 / 60;
                        if (timeDiff > 1) {
                            showToast(`Cannot edit ${subj} - only editable within 1 minute`, true);
                            continue;
                        }
                    }
                }
                let existing = marks.find(m => m.student_id === sid && m.subject === subj && m.term === term && m.exam_type === exam && m.academic_year === year);
                let grade = getStandardGrade(score);
                if (existing) await updateDB('marks', existing.id, { score, grade });
                else await insertDB('marks', { id: crypto.randomUUID(), school_id: SCHOOL_ID, student_id: sid, subject: subj, score, grade, term, exam_type: exam, academic_year: year, created_at: new Date().toISOString() });
            }
        }
        showToast('Marks saved');
        await loadAllData();
    };
    document.getElementById('marksSearch').addEventListener('input', (e) => { if (document.getElementById('loadMarks')) document.getElementById('loadMarks').click(); });
    document.getElementById('loadMarks').click();
}

function calculatePosition(classStudents, term, examType, year) {
    let scores = classStudents.map(s => {
        let total = 0;
        let subs = SUBJECTS_BY_CLASS[s.class] || [];
        for (let sub of subs) {
            let mark = marks.find(m => m.student_id === s.id && m.term === term && m.exam_type === examType && m.subject === sub && m.academic_year === year);
            if (mark) total += mark.score;
        }
        return { id: s.id, total: total };
    });
    scores.sort((a, b) => b.total - a.total);
    let map = new Map();
    scores.forEach((item, idx) => map.set(item.id, idx + 1));
    return map;
}

async function printReports(ids) {
    if (!ids.length) { showToast('No students selected', true); return; }

    let term = document.getElementById('reportTerm').value;
    let examSelection = document.getElementById('reportExam').value;

    let selected = students.filter(s => ids.includes(s.id));
    let classStudents = students.filter(s => s.class === cls);
    
    let examType = examSelection === 'end' ? 'End of Term' : examSelection === 'mid' ? 'Mid Term' : 'Beginning';
    let positionMap = calculatePosition(classStudents, term, examType, year);
    let exams = examSelection === 'end' ? ['Beginning of Term', 'Mid Term', 'End of Term'] : examSelection === 'mid' ? ['Beginning of Term', 'Mid Term'] : ['Beginning of Term'];
    
    let html = `<!DOCTYPE html><html><head><title>Student Reports - ${term} ${year}</title><link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet"><style>
        body{font-family:'Inter',sans-serif;padding:30px;background:white;margin:0;}
        .report-card{max-width:1000px;margin:0 auto 30px;background:white;border-radius:24px;padding:32px;page-break-after:all;box-shadow:0 4px 20px rgba(0,0,0,0.1)}
        .report-header{text-align:center;border-bottom:3px solid #D4A017;padding-bottom:20px;margin-bottom:24px}
        .report-header h2{color:#003366;margin:0;}
        .student-info{background:#f8fafc;padding:20px;border-radius:20px;display:flex;gap:24px;flex-wrap:wrap;margin-bottom:24px;align-items:center}
        .student-photo{width:100px;height:100px;border-radius:50%;object-fit:cover;border:3px solid #D4A017;background:#e2e8f0;display:flex;align-items:center;justify-content:center;}
        .grade-table{width:100%;border-collapse:collapse;margin:20px 0}
        .grade-table th,.grade-table td{border:1px solid #e2e8f0;padding:10px;text-align:center}
        .grade-table th{background:#003366;color:white}
        .comment-section{display:flex;gap:30px;margin-top:30px;flex-wrap:wrap}
        .comment-box{flex:1;border-top:2px dashed #cbd5e1;padding-top:18px}
        .position-badge{background:#D4A017;color:#003366;padding:4px 12px;border-radius:20px;font-size:12px;font-weight:bold;display:inline-block;}
        @media print{body{padding:0}.report-card{page-break-after:always;margin:0;box-shadow:none}}
    </style></head><body>`;
    
    for (let s of selected) {
        let studentMarks = marks.filter(m => m.student_id === s.id && m.term === term && m.academic_year === year);
        let subjects = SUBJECTS_BY_CLASS[s.class] || ['English', 'Mathematics', 'Science', 'Social Studies'];
        let rows = '', totals = {};
        exams.forEach(e => totals[e] = 0);
        
        for (let sub of subjects) {
            rows += `<tr><td style="font-weight:600;padding:10px;">${sub}</td>`;
            for (let ex of exams) {
                let mk = studentMarks.find(m => m.subject === sub && m.exam_type === ex);
                let score = mk ? mk.score : '-';
                let grade = '-';
                if (score !== '-') {
                    if (s.class === 'P.1' || s.class === 'P.2' || s.class === 'P.3') {
                        if (sub === 'R.E') grade = getLetterGrade(score);
                        else grade = getStandardGrade(score);
                    } else if (s.class === 'Baby' || s.class === 'Middle' || s.class === 'Top') {
                        grade = '-';
                    } else {
                        grade = getStandardGrade(score);
                    }
                }
                rows += `<td>${score}<br><small>${grade}</small></td>`;
                if (mk) totals[ex] += mk.score;
            }
            rows += `</tr>`;
        }
        
        let totalRow = `<tr style="background:#eef2ff;"><td style="font-weight:700;padding:10px;">TOTAL / ${subjects.length * 100}</td>`;
        for (let ex of exams) totalRow += `<td><strong>${totals[ex] || 0}</strong></td>`;
        totalRow += `</tr>`;
        rows += totalRow;
        
        let position = positionMap.get(s.id) || classStudents.length;
        let totalScore = totals['End of Term'] || totals['Mid Term'] || totals['Beginning of Term'] || 0;
        let isNursery = ['Baby', 'Middle', 'Top'].includes(s.class);
        let isLower = ['P.1', 'P.2', 'P.3'].includes(s.class);
        
        let specialInfo = '';
        if (isNursery) {
            specialInfo = `<div style="margin-top:15px; text-align:center;"><span class="position-badge"><i class="fas fa-trophy"></i> Position: ${position} / ${classStudents.length}</span> <span style="margin-left:15px;"><strong>Total Marks:</strong> ${totalScore}/${subjects.length * 100}</span></div>`;
        } else if (isLower) {
            let gradingSubjects = subjects.filter(s => s !== 'R.E');
            let gradingTotal = 0;
            for (let sub of gradingSubjects) {
                let mk = studentMarks.find(m => m.subject === sub && m.exam_type === examType);
                if (mk) gradingTotal += mk.score;
            }
            let overallGrade = getLetterGrade(gradingTotal / gradingSubjects.length);
            specialInfo = `<div style="margin-top:15px; text-align:center;"><span class="position-badge"><i class="fas fa-trophy"></i> Position: ${position} / ${classStudents.length}</span> <span style="margin-left:15px;"><strong>Grade:</strong> ${overallGrade}</span> <span style="margin-left:15px;"><strong>Total:</strong> ${totalScore}/${subjects.length * 100}</span></div>`;
        } else {
            let gradePointsList = [];
            for (let sub of subjects) {
                let mk = studentMarks.find(m => m.subject === sub && m.exam_type === examType);
                if (mk) {
                    let grade = getStandardGrade(mk.score);
                    gradePointsList.push(getGradePoints(grade));
                }
            }
            gradePointsList.sort((a, b) => a - b);
            let agg = gradePointsList.slice(0, 4).reduce((s, p) => s + p, 0);
            let division = getDivision(agg);
            specialInfo = `<div style="margin-top:15px; text-align:center;"><strong>Aggregate: ${agg}</strong> | <strong>Division: ${division}</strong> | <strong>Total:</strong> ${totalScore}/${subjects.length * 100}</div>`;
        }
        
        let photoHtml = s.photo_url ? `<img src="${s.photo_url}" class="student-photo">` : `<div class="student-photo"><i class="fas fa-user-graduate fa-3x" style="color:#003366;"></i></div>`;
        
        html += `<div class="report-card">
            <div class="report-header"><h2>PROGRESSIVE MOTHERS NURSERY & PRIMARY SCHOOL</h2><p>"With God Everything is Possible"</p><p>P.O BOX ......, KAMPALA | Tel: 0756 585035</p></div>
            <h3 style="text-align:center;margin:10px 0;">ACADEMIC REPORT - ${term} ${year}</h3>
            <p style="text-align:center;color:#666;font-size:13px;">${examSelection === 'beginning' ? 'Beginning of Term Examination' : examSelection === 'mid' ? 'Mid Term Examination' : 'End of Term Examination'}</p>
            <div class="student-info">${photoHtml}<div><p><strong>Name:</strong> ${s.first_name} ${s.last_name}</p><p><strong>LIN:</strong> ${s.lin}</p><p><strong>Payment Code:</strong> ${s.payment_code || ''}</p><p><strong>Class:</strong> ${s.class}</p><p><strong>Parent:</strong> ${s.parent_name || 'N/A'}</p></div></div>
            <table class="grade-table"><thead><tr><th>SUBJECT</th>${exams.map(e => `<th>${e}</th>`).join('')}</tr></thead><tbody>${rows}</tbody></table>
            ${specialInfo}
            <div class="comment-section">
                <div class="comment-box"><strong>👩‍🏫 CLASS TEACHER'S COMMENT</strong><div style="height:50px;border-bottom:1px solid #000;margin:12px 0"></div>Signature: ____________________<br>Date: ___________</div>
                <div class="comment-box"><strong>👨‍🎓 HEAD TEACHER'S COMMENT</strong><div style="height:50px;border-bottom:1px solid #000;margin:12px 0"></div>Signature: ____________________<br>Date: ___________</div>
            </div>
            <div style="text-align:center;margin-top:20px;font-size:10px;color:#666;border-top:1px solid #eee;padding-top:15px;">Generated on ${formatUgandaDateTime(getUgandaTime())}</div>
        </div>`;
    }
    html += `</body></html>`;
    let win = window.open('', '_blank');
    win.document.write(html);
    win.document.close();
    win.print();
    showToast(`Printed ${selected.length} report(s)`);
}

        absentStudents = absentStudents.filter(s => `${s.first_name} ${s.last_name}`.toLowerCase().includes(term) || s.lin.toLowerCase().includes(term) || s.class.toLowerCase().includes(term));
    }
    let grid = document.getElementById('absentGrid');
    if (absentStudents.length === 0) {
        grid.innerHTML = `<div style="text-align:center; padding:40px; background:#f0fdf4; border-radius:20px;"><i class="fas fa-check-circle fa-2x" style="color:#10b981;"></i><p>No absent students on ${date}</p></div>`;
        return;

    grid.innerHTML = `<div style="margin-bottom:15px;"><span style="background:#dc2626; color:white; padding:5px 15px; border-radius:30px;">${absentStudents.length} absent student(s)</span></div>`;

    let date = document.getElementById('absentDate').value;
    let records = await fetchDB('attendance', `&date=eq.${date}&status=eq.absent&school_id=eq.${SCHOOL_ID}`);
    let absent = students.filter(s => records.map(r => r.student_id).includes(s.id));
    let sent = 0;
    for (let s of absent) {
        if (s.parent_whatsapp) {
            sendWhatsApp(s.parent_whatsapp, `Dear ${s.parent_name}, your child ${s.first_name} ${s.last_name} (${s.lin}) was absent on ${date}. Please ensure regular attendance.`);
            sent++;
            await new Promise(r => setTimeout(r, 300));
        }
    }
    showToast(`Sent to ${sent} parents`);
}

function printAbsentList() {
    let date = document.getElementById('absentDate').value;
    let container = document.getElementById('absentGrid');
    if (!container || !container.innerHTML) return;
    let win = window.open('', '_blank');
    win.document.write(`<html><head><title>Absent Students - ${date}</title><style>
        body{font-family:Arial;padding:20px}.absent-card{background:#fef2f2;border-radius:16px;padding:16px;display:flex;gap:16px;align-items:center;border-left:4px solid #dc2626;margin-bottom:12px;page-break-inside:avoid}
        .absent-photo{width:55px;height:55px;border-radius:50%;background:#e2e8f0;display:flex;align-items:center;justify-content:center;}
        h2{color:#003366;border-bottom:2px solid #D4A017;padding-bottom:10px;}
        .count-badge{background:#dc2626;color:white;padding:5px 15px;border-radius:30px;display:inline-block;margin:10px 0;}
    </style></head><body><h2>PROGRESSIVE MOTHERS SCHOOL - ABSENT STUDENTS</h2><p>Date: ${date}</p>${container.innerHTML}<p style="margin-top:30px;text-align:center;font-size:11px;">Generated on ${formatUgandaDateTime(getUgandaTime())}</p></body></html>`);
    win.document.close();
    win.print();
}

// ==================== MAIN APP ====================
async function renderMainApp() {
    await loadAllData();
    let perms = ROLE_PERMS[currentUser?.role];
    let tabs = ['dashboard'];
    if (perms.students) tabs.push('students');
    if (perms.attendance) tabs.push('attendance');
    if (perms.marks) tabs.push('marks');
    if (perms.fees) tabs.push('fees');
    if (perms.reports) tabs.push('reports');
    if (perms.absentees) tabs.push('absentees');
    if (!tabs.includes(activeTab)) activeTab = 'dashboard';
    
    let now = getUgandaTime();
    document.getElementById('app').innerHTML = `
        <div class="role-badge">${currentUser.role.toUpperCase()} <button class="logout-btn" onclick="logout()">Exit</button></div>
        <div class="app-container">
            <div class="school-header">
                <div class="school-name">🏫 PROGRESSIVE MOTHERS NURSERY & PRIMARY SCHOOL</div>
                <div class="school-address">Gayaza-Kijabijjo, Kampala | 📞 ${SCHOOL_CONTACTS.join(', ')}</div>
                <div class="datetime-row">
                    <div><i class="far fa-calendar-alt"></i> ${now.toLocaleDateString('en-UG', { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' })}</div>
                    <div><i class="far fa-clock"></i> <span id="liveTime">${now.toLocaleTimeString('en-UG', { hour: '2-digit', minute: '2-digit', hour12: true })} (EAT)</span></div>
                    <div class="global-search"><i class="fas fa-search"></i><input type="text" id="globalSearchInput" placeholder="Search by name, LIN, class, parent..."></div>
                </div>
            </div>
            <div class="action-buttons">${tabs.map(t => `<button class="action-btn ${activeTab === t ? 'active' : ''}" data-tab="${t}"><i class="fas ${t === 'dashboard' ? 'fa-tachometer-alt' : t === 'students' ? 'fa-user-graduate' : t === 'attendance' ? 'fa-calendar-check' : t === 'marks' ? 'fa-chart-line' : t === 'fees' ? 'fa-coins' : t === 'reports' ? 'fa-print' : 'fa-user-clock'}"></i> ${t.charAt(0).toUpperCase() + t.slice(1)}</button>`).join('')}</div>
            <div id="tabContent"></div>
        </div>`;
    setInterval(() => { 
        let t = document.getElementById('liveTime'); 
        if (t) t.innerText = getUgandaTime().toLocaleTimeString('en-UG', { hour: '2-digit', minute: '2-digit', hour12: true }) + ' (EAT)';
    }, 1000);
    let search = document.getElementById('globalSearchInput');
    if (search) search.addEventListener('input', (e) => { globalSearch = e.target.value; if (activeTab === 'students') renderStudents(); });
    document.querySelectorAll('.action-btn').forEach(btn => { btn.onclick = () => { activeTab = btn.dataset.tab; renderMainApp(); }; });
    
    if (activeTab === 'dashboard') await renderDashboard();
    else if (activeTab === 'students') await renderStudents();
    else if (activeTab === 'attendance') await renderAttendance();
    else if (activeTab === 'marks') await renderMarks();
    else if (activeTab === 'fees') await renderFees();
    else if (activeTab === 'reports') await renderReports();
    else if (activeTab === 'absentees') await renderAbsentees();
}

function switchTab(tab) { activeTab = tab; renderMainApp(); }
function logout() { currentUser = null; sessionStorage.removeItem('progressive_user'); renderLogin(); }
function renderLogin() {
    document.getElementById('app').innerHTML = `<div class="login-container"><i class="fas fa-school fa-3x" style="color:#003366;"></i><h2>Progressive Mothers School</h2><p>"With God Everything is Possible"</p><input type="text" id="username" placeholder="Username"><input type="password" id="password" placeholder="Password"><button onclick="doLogin()">Login</button></div>`;
}
function doLogin() {
    let u = document.getElementById('username').value, p = document.getElementById('password').value;
    if (u === 'admin' && p === 'admin123') { currentUser = { username: 'admin', role: 'admin' }; sessionStorage.setItem('progressive_user', JSON.stringify(currentUser)); renderMainApp(); }
    else if (u === 'teacher' && p === 'teacher123') { currentUser = { username: 'teacher', role: 'teacher' }; sessionStorage.setItem('progressive_user', JSON.stringify(currentUser)); renderMainApp(); }
    else if (u === 'finance' && p === 'finance123') { currentUser = { username: 'finance', role: 'finance' }; sessionStorage.setItem('progressive_user', JSON.stringify(currentUser)); renderMainApp(); }
    else alert('Invalid credentials');
}
function init() { let saved = sessionStorage.getItem('progressive_user'); if (saved) { currentUser = JSON.parse(saved); renderMainApp(); } else renderLogin(); }
init();
</script>
