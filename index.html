<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>EduSuite Pro | School Management System</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --bg-main: #f8fafc;
            --sidebar-bg: #0f172a;
            --sidebar-hover: #1e293b;
            --text-main: #334155;
            --text-dark: #0f172a;
            --accent: #2563eb;
            --accent-light: rgba(37, 99, 236, 0.1);
            --border-color: #e2e8f0;
            --success: #16a34a;
            --success-bg: #dcfce7;
            --danger: #dc2626;
            --danger-bg: #fee2e2;
            --warning: #d97706;
            --warning-bg: #fef3c7;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', system-ui, -apple-system, sans-serif; }
        body { background: var(--bg-main); color: var(--text-main); min-height: 100vh; display: flex; }

        /* --- SIDEBAR --- */
        .sidebar {
            width: 260px; background: var(--sidebar-bg); color: #f1f5f9;
            position: fixed; top: 0; bottom: 0; left: 0;
            display: flex; flex-direction: column; z-index: 100;
        }
        .brand {
            padding: 28px 24px; display: flex; align-items: center; gap: 12px;
            border-bottom: 1px solid #1e293b;
        }
        .brand-icon {
            background: linear-gradient(135deg, #60a5fa, #2563eb);
            width: 34px; height: 34px; border-radius: 10px;
            display: flex; align-items: center; justify-content: center; color: white; font-size: 16px;
        }
        .brand-title { font-weight: 700; font-size: 1.1rem; letter-spacing: -0.5px; color: #fff; }
        .nav-group { padding: 24px 16px; flex: 1; display: flex; flex-direction: column; gap: 6px; }
        .nav-btn {
            width: 100%; background: transparent; border: none; padding: 12px 16px;
            border-radius: 10px; color: #94a3b8; font-weight: 500; font-size: 14px;
            cursor: pointer; display: flex; align-items: center; gap: 12px; transition: all 0.2s;
        }
        .nav-btn i { width: 20px; font-size: 16px; text-align: left; }
        .nav-btn:hover { background: var(--sidebar-hover); color: #fff; }
        .nav-btn.active { background: var(--accent); color: white; font-weight: 600; }

        /* --- MAIN WORKSPACE --- */
        .main-content { margin-left: 260px; flex: 1; padding: 40px; min-width: 0; }
        
        /* --- HEADER BANNER --- */
        .header-panel {
            display: flex; justify-content: space-between; align-items: center;
            margin-bottom: 36px; padding-bottom: 24px; border-bottom: 1px solid var(--border-color);
        }
        .school-name { font-size: 1.75rem; font-weight: 800; color: var(--text-dark); letter-spacing: -0.75px; }
        .school-meta { font-size: 0.875rem; color: #64748b; margin-top: 4px; display: flex; gap: 16px; }
        .school-meta span { display: flex; align-items: center; gap: 6px; }

        /* --- STATS CARDS --- */
        .stats-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 24px; margin-bottom: 36px; }
        .stat-card {
            background: white; border-radius: 16px; padding: 24px; display: flex; align-items: center;
            justify-content: space-between; border: 1px solid var(--border-color);
            box-shadow: 0 4px 20px -2px rgba(0, 0, 0, 0.02);
        }
        .stat-info h4 { font-size: 13px; font-weight: 600; color: #64748b; text-transform: uppercase; letter-spacing: 0.05em; }
        .stat-info .value { font-size: 1.85rem; font-weight: 700; color: var(--text-dark); margin-top: 8px; }
        .stat-icon { width: 48px; height: 48px; border-radius: 12px; display: flex; align-items: center; justify-content: center; font-size: 20px; }

        /* --- PANELS & UTILITIES --- */
        .panel { 
            background: white; border-radius: 16px; padding: 32px; 
            border: 1px solid var(--border-color); box-shadow: 0 4px 24px -4px rgba(0,0,0,0.03); 
        }
        .panel-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 24px; }
        .panel-title { font-size: 1.2rem; font-weight: 700; color: var(--text-dark); display: flex; align-items: center; gap: 10px; }
        
        .search-container {
            background: white; border-radius: 12px; border: 1px solid var(--border-color);
            padding: 0 16px; display: flex; align-items: center; gap: 12px; margin-bottom: 24px; width: 100%;
            max-width: 400px; box-shadow: inset 0 1px 2px rgba(0,0,0,0.02);
        }
        .search-container input { border: none; padding: 12px 0; outline: none; width: 100%; font-size: 14px; color: var(--text-dark); }
        .search-container i { color: #94a3b8; }

        /* --- DATA TABLES --- */
        .table-container { width: 100%; overflow-x: auto; border-radius: 12px; border: 1px solid var(--border-color); }
        table { width: 100%; border-collapse: collapse; text-align: left; }
        th { background: #f8fafc; padding: 14px 20px; font-size: 12px; font-weight: 600; color: #475569; border-bottom: 1px solid var(--border-color); text-transform: uppercase; letter-spacing: 0.02em; }
        td { padding: 16px 20px; font-size: 14px; border-bottom: 1px solid #f1f5f9; color: var(--text-main); vertical-align: middle; }
        tr:last-child td { border-bottom: none; }
        tr:hover td { background: #f8fafc; }

        /* --- BADGES & BUTTONS --- */
        .badge { display: inline-flex; padding: 6px 12px; border-radius: 8px; font-size: 12px; font-weight: 600; }
        .badge.danger { background: var(--danger-bg); color: var(--danger); }
        .badge.success { background: var(--success-bg); color: var(--success); }
        
        .btn-action {
            background: transparent; border: none; cursor: pointer; font-size: 14px; 
            padding: 8px; border-radius: 8px; color: #64748b; transition: all 0.15s; margin-left: 4px;
        }
        .btn-action:hover { background: #f1f5f9; color: var(--text-dark); }
        .btn-action.delete:hover { background: var(--danger-bg); color: var(--danger); }

        /* --- FORMS --- */
        .form-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 24px; margin-bottom: 32px; }
        .form-group { display: flex; flex-direction: column; gap: 8px; }
        .form-group label { font-size: 13px; font-weight: 600; color: #475569; }
        input[type="text"], input[type="number"], select {
            width: 100%; padding: 12px 16px; border: 1px solid #cbd5e1; border-radius: 10px;
            font-size: 14px; color: var(--text-dark); outline: none; transition: all 0.2s; background: #fff;
        }
        input:focus, select:focus { border-color: var(--accent); box-shadow: 0 0 0 4px var(--accent-light); }

        .btn {
            background: var(--accent); color: white; font-weight: 600; padding: 12px 24px; border: none;
            border-radius: 10px; cursor: pointer; display: inline-flex; align-items: center; gap: 8px; font-size: 14px;
            transition: background 0.2s;
        }
        .btn:hover { background: #1d4ed8; }
        .btn-secondary { background: #e2e8f0; color: #475569; }
        .btn-secondary:hover { background: #cbd5e1; }

        /* --- ROLL CALL STYLE --- */
        .attendance-row { display: flex; justify-content: space-between; align-items: center; padding: 14px 0; border-bottom: 1px solid #f1f5f9; }
        .attendance-select { width: auto; padding: 6px 12px; border-radius: 8px; font-weight: 600; font-size: 13px; }

        /* --- TOAST SYSTEM --- */
        .toast {
            position: fixed; bottom: 32px; right: 32px; background: var(--sidebar-bg); color: white;
            padding: 16px 24px; border-radius: 12px; box-shadow: 0 20px 25px -5px rgba(0,0,0,0.15);
            font-weight: 500; font-size: 14px; z-index: 1000; display: flex; align-items: center; gap: 10px;
            animation: popIn 0.25s cubic-bezier(0.16, 1, 0.3, 1);
        }
        @keyframes popIn { from { opacity: 0; transform: scale(0.9) translateY(10px); } to { opacity: 1; transform: scale(1) translateY(0); } }

        /* --- MODAL PLUG --- */
        .modal {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(15,23,42,0.3); backdrop-filter: blur(4px); z-index: 1000;
            align-items: center; justify-content: center; padding: 16px;
        }
        .modal-content { background: white; border-radius: 16px; padding: 32px; width: 100%; max-width: 480px; box-shadow: 0 25px 50px -12px rgba(0,0,0,0.15); border: 1px solid var(--border-color); }

        @media (max-width: 968px) {
            .sidebar { width: 72px; }
            .sidebar .brand-title, .sidebar span { display: none; }
            .main-content { margin-left: 72px; padding: 24px; }
            .stats-grid { grid-template-columns: 1fr; }
            .form-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

    <aside class="sidebar">
        <div class="brand">
            <div class="brand-icon"><i class="fas fa-layer-group"></i></div>
            <div class="brand-title">EduSuite</div>
        </div>
        <nav class="nav-group">
            <button class="nav-btn active" id="btn-records" onclick="switchView('records')"><i class="fas fa-user-graduate"></i> <span>Students Directory</span></button>
            <button class="nav-btn" id="btn-admission" onclick="switchView('admission')"><i class="fas fa-plus-circle"></i> <span>Admit Student</span></button>
            <button class="nav-btn" id="btn-rollcall" onclick="switchView('rollcall')"><i class="fas fa-check-square"></i> <span>Roll Call Monitor</span></button>
        </nav>
    </aside>

    <main class="main-content">
        <div class="header-panel">
            <div>
                <div class="school-name" id="banner-school-name">PROGRESSIVE MOTHERS</div>
                <div class="school-meta">
                    <span id="banner-location"><i class="fas fa-map-marker-alt"></i> GAYAZA-KIJABIJJO</span>
                    <span><i class="fas fa-graduation-cap"></i> Term 1 Core Dashboard</span>
                </div>
            </div>
        </div>

        <div class="stats-grid">
            <div class="stat-card">
                <div class="stat-info"><h4>Total Students</h4><div class="value" id="m-total">0</div></div>
                <div class="stat-icon" style="background:#eff6ff; color:#2563eb;"><i class="fas fa-users"></i></div>
            </div>
            <div class="stat-card">
                <div class="stat-info"><h4>Fees Collected</h4><div class="value" id="m-fees">0</div></div>
                <div class="stat-icon" style="background:#ecfdf5; color:#10b981;"><i class="fas fa-wallet"></i></div>
            </div>
            <div class="stat-card">
                <div class="stat-info"><h4>Absent Today</h4><div class="value" id="m-absent">0</div></div>
                <div class="stat-icon" style="background:#fef2f2; color:#ef4444;"><i class="fas fa-user-times"></i></div>
            </div>
        </div>

        <div id="view-viewport"></div>
    </main>

    <script>
        // ==================== MASTER APP LOGIC CONFIG & DATA REPOSITORIES ====================
        const SUPABASE_URL = 'https://qtvkasgnrftajqrrcgsg.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InF0dmthc2ducmZ0YWpxcnJjZ3NnIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzczMTM5ODksImV4cCI6MjA5Mjg4OTk4OX0.gw1-WKC2ccGRXl1O74v1TaHu2DzwSlVTCaQHv6bsYcg';
        const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        let schoolContext = { id: '11111111-1111-1111-1111-111111111111', name: 'PROGRESSIVE MOTHERS', address: 'GAYAZA-KIJABIJJO' };
        let localDataCache = [];
        let activeView = 'records';

        function alertNotify(msg) {
            const el = document.createElement('div'); el.className = 'toast'; el.innerHTML = `<i class="fas fa-check-circle" style="color:#34d399;"></i> <span>${msg}</span>`;
            document.body.appendChild(el); setTimeout(() => el.remove(), 3000);
        }

        function formatUGX(val) { return 'UGX ' + (val || 0).toLocaleString(); }

        // ==================== COMPONENT VIEW ROUTER SWITCHER ====================
        async function switchView(targetView) {
            activeView = targetView;
            document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
            const matchedBtn = document.getElementById(`btn-${targetView}`);
            if(matchedBtn) matchedBtn.classList.add('active');

            const container = document.getElementById('view-viewport');
            
            if (targetView === 'records') {
                container.innerHTML = `
                    <div class="search-container">
                        <i class="fas fa-search"></i>
                        <input type="text" id="directorySearchInput" placeholder="Search students by name or unique LIN...">
                    </div>
                    <div class="panel">
                        <div class="panel-header">
                            <div class="panel-title"><i class="fas fa-list" style="color:var(--accent);"></i> Active Student Roster Partition</div>
                        </div>
                        <div class="table-container">
                            <table>
                                <thead><tr><th>Student / Unique ID</th><th>Class Level</th><th>Arrears Balance</th><th style="text-align:right;">Actions</th></tr></thead>
                                <tbody id="student-tbody-target"></tbody>
                            </table>
                        </div>
                    </div>`;
                document.getElementById('directorySearchInput').addEventListener('input', (e) => executeClientSearch(e.target.value));
                await syncRenderTableData();
            } else if (targetView === 'admission') {
                container.innerHTML = `
                    <div class="panel" style="max-width: 680px; margin: 0 auto;">
                        <div class="panel-header">
                            <div class="panel-title"><i class="fas fa-user-plus" style="color:var(--accent);"></i> New Student Registry Form</div>
                        </div>
                        <div class="form-grid">
                            <div class="form-group"><label>Full Student Name</label><input type="text" id="form-name" placeholder="e.g., Namubiru Sarah"></div>
                            <div class="form-group"><label>Assigned Class Grade</label>
                                <select id="form-class">
                                    <option>Primary 1</option><option>Primary 2</option><option>Primary 3</option><option>Primary 4</option>
                                    <option>Primary 5</option><option>Primary 6</option><option>Primary 7</option>
                                </select>
                            </div>
                            <div class="form-group"><label>Parent Guardian WhatsApp</label><input type="text" id="form-wa" placeholder="e.g., 256701XXXXXX"></div>
                            <div class="form-group"><label>Termly Tuition Allocated Fees (UGX)</label><input type="number" id="form-fees" placeholder="Allocated amount value"></div>
                        </div>
                        <div style="text-align: right;">
                            <button class="btn" onclick="commitStudentRegistration()"><i class="fas fa-save"></i> Register Account Profile</button>
                        </div>
                    </div>`;
            } else if (targetView === 'rollcall') {
                await renderAttendanceRegistryView();
            }
        }

        // ==================== RENDERS & SERVER CONTEXT EXECUTORS ====================
        async function fetchSystemState() {
            let { data } = await supabase.from('students').select('*').eq('school_id', schoolContext.id).order('name', { ascending: true });
            localDataCache = data || [];
            
            let { data: trx } = await supabase.from('transactions').select('amount').eq('school_id', schoolContext.id);
            let { data: att } = await supabase.from('attendance').select('status').eq('school_id', schoolContext.id).eq('date', new Date().toISOString().slice(0,10));
            
            document.getElementById('m-total').innerText = localDataCache.length;
            document.getElementById('m-fees').innerText = formatUGX((trx || []).reduce((acc, current) => acc + (current.amount || 0), 0));
            document.getElementById('m-absent').innerText = (att || []).filter(a => a.status === 'absent').length;
        }

        async function syncRenderTableData(dataset = null) {
            const target = document.getElementById('student-tbody-target');
            if(!target) return;
            let elements = dataset || localDataCache;
            target.innerHTML = '';

            if(!elements.length) {
                target.innerHTML = `<tr><td colspan="4" style="text-align:center; padding:48px; color:#94a3b8;"><i class="fas fa-folder-open mb-2 text-2xl block"></i> No records found inside current partition scope.</td></tr>`;
                return;
            }

            elements.forEach(s => {
                let debt = (s.total_fees || 0) - (s.fees_paid || 0);
                let row = document.createElement('tr');
                row.innerHTML = `
                    <td><strong>${s.name}</strong><br><small style="color:#94a3b8; font-family:monospace;">LIN: ${s.lin || 'UNASSIGNED'}</small></td>
                    <td><span style="background:#f1f5f9; padding:4px 10px; border-radius:6px; font-weight:600; font-size:12px; color:var(--text-dark);">${s.class}</span></td>
                    <td><span class="badge ${debt <= 0 ? 'success' : 'danger'}">${debt <= 0 ? 'PAID' : formatUGX(debt)}</span></td>
                    <td style="text-align:right;">
                        <button class="btn-action" onclick="triggerFeesPaymentModal('${s.id}')" title="Collect Fees"><i class="fas fa-dollar-sign" style="color:var(--success);"></i></button>
                        <button class="btn-action" onclick="triggerMarksInputModal('${s.id}')" title="Enter Marks"><i class="fas fa-edit" style="color:var(--warning);"></i></button>
                        <button class="btn-action delete" onclick="triggerEraseProfileNode('${s.id}')" title="Delete Profile"><i class="fas fa-trash-alt"></i></button>
                    </td>`;
                target.appendChild(row);
            });
        }

        function executeClientSearch(term) {
            let matches = localDataCache.filter(s => s.name.toLowerCase().includes(term.toLowerCase()) || (s.lin || '').toLowerCase().includes(term.toLowerCase()));
            syncRenderTableData(matches);
        }

        // ==================== DATA TRANSACTIONS WRITERS ====================
        async function commitStudentRegistration() {
            let name = document.getElementById('form-name').value.trim();
            if(!name) return alert('Name required');
            let lin = name.replace(/[^a-zA-Z]/g,'').slice(0,2).toUpperCase() + Math.floor(1000+Math.random()*9000);

            await supabase.from('students').insert({
                school_id: schoolContext.id, name, lin,
                class: document.getElementById('form-class').value,
                parent_whatsapp: document.getElementById('form-wa').value,
                total_fees: parseFloat(document.getElementById('form-fees').value) || 0, fees_paid: 0
            });

            alertNotify('Account Profile Node Created Successfully');
            await fetchSystemState();
            switchView('records');
        }

        // ==================== CASHIER ACTIONS POSTS ====================
        window.triggerFeesPaymentModal = function(id) {
            let s = localDataCache.find(x => x.id === id);
            let modal = document.createElement('div'); modal.className = 'modal'; modal.id = 'active-modal-node';
            modal.innerHTML = `
                <div class="modal-content">
                    <div class="panel-title" style="margin-bottom:12px;"><i class="fas fa-receipt" style="color:var(--success);"></i> Collect Tuition Fees</div>
                    <div style="background:#f8fafc; padding:14px; border-radius:10px; font-size:13px; margin-bottom:20px; border:1px solid var(--border-color);">
                        Student Profile: <strong>${s.name}</strong><br>
                        Arrears Standing: <strong style="color:var(--danger);">${formatUGX(s.total_fees - s.fees_paid)}</strong>
                    </div>
                    <div class="form-group" style="margin-bottom:24px;"><label>Remitted Cash Value (UGX)</label><input type="number" id="pay-amt-field" placeholder="Enter collection value amount"></div>
                    <div style="display:flex; justify-content:flex-end; gap:12px;">
                        <button class="btn btn-secondary" onclick="document.getElementById('active-modal-node').remove()">Cancel</button>
                        <button class="btn" style="background:var(--success);" onclick="executePaymentTransactionPost('${id}')">Post Payment Log</button>
                    </div>
                </div>`;
            document.body.appendChild(modal); modal.style.display = 'flex';
        };

        window.executePaymentTransactionPost = async function(id) {
            let val = parseFloat(document.getElementById('pay-amt-field').value);
            if(isNaN(val) || val <= 0) return alert('Invalid entry volume');
            let s = localDataCache.find(x => x.id === id);
            let newPaid = (s.fees_paid || 0) + val;

            await supabase.from('students').update({ fees_paid: newPaid }).eq('id', id);
            await supabase.from('transactions').insert({
                school_id: schoolContext.id, student_id: id, amount: val, payment_method: 'cash',
                receipt_number: 'TXN'+Date.now(), payment_date: new Date().toISOString()
            });

            document.getElementById('active-modal-node').remove();
            alertNotify('Payment posted safely into system books database');
            await fetchSystemState();
            await switchView('records');
        };

        // ==================== MARKS PROCESSING ====================
        window.triggerMarksInputModal = function(id) {
            let s = localDataCache.find(x => x.id === id);
            let subjects = ['English','Science','Social Studies','Mathematics'];
            let injectionHtml = '';
            subjects.forEach(sub => {
                injectionHtml += `<div class="form-group" style="margin-bottom:14px;"><label>${sub} Grade Score (0-100)</label><input type="number" class="subject-mark-input" data-subject="${sub}" max="100" min="0" placeholder="Raw score"></div>`;
            });

            let modal = document.createElement('div'); modal.className = 'modal'; modal.id = 'active-modal-node';
            modal.innerHTML = `
                <div class="modal-content" style="max-height:85vh; overflow-y:auto;">
                    <div class="panel-title" style="margin-bottom:8px;"><i class="fas fa-edit" style="color:var(--warning);"></i> Academic Evaluation Matrix</div>
                    <div style="margin-bottom:20px; font-size:13px; color:#64748b;">Updating metrics for student: <strong>${s.name}</strong></div>
                    ${injectionHtml}
                    <div style="display:flex; justify-content:flex-end; gap:12px; margin-top:24px;">
                        <button class="btn btn-secondary" onclick="document.getElementById('active-modal-node').remove()">Cancel</button>
                        <button class="btn" style="background:var(--warning);" onclick="commitGradesMatrixLog('${id}')">Save Student Grades</button>
                    </div>
                </div>`;
            document.body.appendChild(modal); modal.style.display = 'flex';
        };

        window.commitGradesMatrixLog = async function(id) {
            const inputs = document.querySelectorAll('.subject-mark-input');
            function resolveGradeTier(sc) {
                if (sc >= 80) return 'D1'; if (sc >= 75) return 'D2'; if (sc >= 70) return 'C3'; if (sc >= 65) return 'C4';
                if (sc >= 60) return 'C5'; if (sc >= 55) return 'C6'; if (sc >= 50) return 'P7'; if (sc >= 45) return 'P8';
                return 'F9';
            }

            for(let input of inputs) {
                let score = parseInt(input.value);
                let subject = input.getAttribute('data-subject');
                if(!isNaN(score)) {
                    await supabase.from('marks').upsert({
                        school_id: schoolContext.id, student_id: id, subject, score, grade: resolveGradeTier(score),
                        term: 'Term 1', locked: false, created_at: new Date().toISOString()
                    }, { onConflict: 'student_id,subject,term' });
                }
            }

            document.getElementById('active-modal-node').remove();
            alertNotify('Student academic marks captured and synced');
        };

        // ==================== PURGE DATA NODES OPERATORS ====================
        window.triggerEraseProfileNode = async function(id) {
            if(!confirm('Are you absolutely sure you want to remove this student account profile row? All related grade and attendance arrays rows will be dropped permanently.')) return;
            await supabase.from('students').delete().eq('id', id);
            await supabase.from('marks').delete().eq('student_id', id);
            await supabase.from('attendance').delete().eq('student_id', id);
            
            alertNotify('Account Profile Removed Safely From Multitenant Storage Arrays Layers');
            await fetchSystemState();
            await switchView('records');
        };

        // ==================== DIGITAL ATTENDANCE LOGISTICS MODULES ====================
        async function renderAttendanceRegistryView() {
            let today = new Date().toISOString().slice(0,10);
            let { data: currentAttLogs } = await supabase.from('attendance').select('*').eq('school_id', schoolContext.id).eq('date', today);
            
            let listInjections = '';
            localDataCache.forEach(s => {
                let existingRecord = (currentAttLogs || []).find(a => a.student_id === s.id);
                let status = existingRecord ? existingRecord.status : 'present';
                
                listInjections += `
                    <div class="attendance-row">
                        <div><strong>${s.name}</strong> <span style="font-size:11px; background:#f1f5f9; padding:3px 8px; border-radius:6px; margin-left:6px; font-weight:600; color:#475569;">${s.class}</span></div>
                        <select class="att-dropdown-field" data-student-id="${s.id}" style="width:140px; padding:6px 12px; border-radius:8px;">
                            <option value="present" ${status==='present'?'selected':''}>PRESENT</option>
                            <option value="absent" ${status==='absent'?'selected':''}>ABSENT</option>
                            <option value="late" ${status==='late'?'selected':''}>LATE</option>
                        </select>
                    </div>`;
            });

            document.getElementById('view-viewport').innerHTML = `
                <div class="panel" style="max-width:720px; margin:0 auto;">
                    <div class="panel-header">
                        <div class="panel-title"><i class="fas fa-calendar-check" style="color:var(--accent);"></i> Daily Class Roll Call Registry — ${today}</div>
                    </div>
                    <div style="display:flex; flex-direction:column; margin-bottom:28px;">${listInjections || '<div style="padding:24px; text-align:center; color:#94a3b8;">No enrolled rows returned from server query.</div>'}</div>
                    ${localDataCache.length ? '<button class="btn" style="width:100%; justify-content:center;" onclick="commitAttendanceStateLogs()"><i class="fas fa-check"></i> Commit Daily Attendance Data Grid</button>' : ''}
                </div>`;
        }

        window.commitAttendanceStateLogs = async function() {
            let today = new Date().toISOString().slice(0,10);
            const dropdowns = document.querySelectorAll('.att-dropdown-field');
            for(let select of dropdowns) {
                let studentId = select.getAttribute('data-student-id');
                let status = select.value;
                await supabase.from('attendance').upsert({ school_id: schoolContext.id, student_id: studentId, date: today, status }, { onConflict: 'student_id,date' });
            }
            alertNotify('Daily attendance parameters saved safely');
            await fetchSystemState();
            await switchView('records');
        };

        // ==================== MASTER APP RUN TIME BOOT INITIALIZER ====================
        async function bootPlatformKernelInstance() {
            let { data } = await supabase.from('schools').select('id, name, address').eq('subdomain', 'progressive').maybeSingle();
            if(data) { schoolContext = data; }
            
            document.getElementById('banner-school-name').innerText = schoolContext.name;
            document.getElementById('banner-location').innerHTML = `<i class="fas fa-map-marker-alt"></i> ${schoolContext.address || 'GAYAZA-KIJABIJJO'}`;
            
            await fetchSystemState();
            await switchView('records');
        }

        bootPlatformKernelInstance();
    </script>
</body>
</html>
