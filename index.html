<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EUDES MEDIA SCHOOL SYSTEM</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #003366; color: white; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
        .container { background: white; color: #333; padding: 40px; border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); text-align: center; width: 400px; }
        h1 { color: #003366; margin: 0 0 10px 0; }
        #status-box { padding: 15px; margin: 20px 0; border-radius: 8px; font-weight: bold; background: #f0f0f0; border: 1px solid #ccc; }
        .btn { background: #003366; color: white; border: none; padding: 15px 20px; font-size: 16px; border-radius: 8px; cursor: pointer; width: 100%; font-weight: bold; }
        .btn:hover { background: #00509e; }
        .contact { margin-top: 20px; font-size: 13px; color: #666; }
    </style>
</head>
<body>

<div class="container">
    <h1>EUDES MEDIA</h1>
    <p>School Data Management</p>
    
    <div id="status-box">Connecting to Database...</div>
    
    <button class="btn" id="regButton" onclick="register()">+ REGISTER NEW STUDENT</button>

    <div class="contact">Support: +256762992440</div>
</div>

<script>
    // 1. Database Credentials
    const SUPABASE_URL = 'https://qtvkasgnrftajqrrcgsg.supabase.co';
    const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InF0dmthc2ducmZ0YWpxcnJjZ3NnIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzczMTM5ODksImV4cCI6MjA5Mjg4OTk4OX0.gw1-WKC2ccGRXl1O74v1TaHu2DzwSlVTCaQHv6bsYcg';

    // 2. Initialize Supabase
    const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    // 3. Test Connection Immediately
    window.onload = async function() {
        const box = document.getElementById('status-box');
        try {
            const { data, error } = await supabase.from('students').select('count', { count: 'exact', head: true });
            if (error) throw error;
            box.style.color = "green";
            box.innerText = "✅ SYSTEM ONLINE";
        } catch (err) {
            box.style.color = "red";
            box.innerText = "❌ CONNECTION ERROR";
            console.error(err);
        }
    };

    // 4. The Registration Function
    async function register() {
        const name = prompt("Student Full Name:");
        if (!name) return;

        const box = document.getElementById('status-box');
        box.innerText = "Saving data...";

        try {
            const { error } = await supabase.from('students').insert([
                { 
                    name: name, 
                    lin: "LIN-" + Math.floor(1000 + Math.random() * 9000),
                    health_status: 'Normal'
                }
            ]);

            if (error) throw error;

            alert("SUCCESS! " + name + " has been added to the database.");
            box.innerText = "✅ SYSTEM ONLINE";
        } catch (err) {
            alert("ERROR: Could not save student. Make sure you ran the SQL 'Disable RLS' command.");
            console.error(err);
            box.innerText = "❌ SAVE FAILED";
        }
    }
</script>

</body>
</html>
