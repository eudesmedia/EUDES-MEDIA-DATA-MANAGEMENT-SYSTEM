<!DOCTYPE html>
<html>
<head>
    <title>EUDES MEDIA SYSTEM</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { font-family: sans-serif; padding: 40px; text-align: center; background: #003366; color: white; }
        .box { background: white; color: #333; padding: 20px; border-radius: 10px; display: inline-block; min-width: 300px; }
        .btn { padding: 10px 20px; background: #003366; color: white; border: none; border-radius: 5px; cursor: pointer; margin-top: 10px; }
    </style>
</head>
<body>

<div class="box">
    <h1>EUDES MEDIA</h1>
    <div id="status">Connecting...</div>
    <div id="data"></div>
    <button class="btn" onclick="addTest()">Add Test Student</button>
</div>

<script>
    const S_URL = 'https://qtvkasgnrftajqrrcgsg.supabase.co';
    const S_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InF0dmthc2ducmZ0YWpxcnJjZ3NnIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzczMTM5ODksImV4cCI6MjA5Mjg4OTk4OX0.gw1-WKC2ccGRXl1O74v1TaHu2DzwSlVTCaQHv6bsYcg';
    const supabase = window.supabase.createClient(S_URL, S_KEY);

    async function check() {
        const { data, error } = await supabase.from('students').select('*');
        if (error) {
            document.getElementById('status').innerHTML = "❌ Error: " + error.message;
        } else {
            document.getElementById('status').innerHTML = "✅ Connected!";
            document.getElementById('data').innerHTML = "Students found: " + data.length;
        }
    }

    async function addTest() {
        const name = prompt("Student Name:");
        await supabase.from('students').insert([{ name: name, lin: "LIN-"+Math.floor(Math.random()*1000) }]);
        check();
    }

    check();
</script>
</body>
</html>
