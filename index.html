<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EUDES MEDIA SCHOOL SYSTEM</title>
    <style>
        :root { --primary: #003366; --secondary: #f0f4f8; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--secondary); margin: 0; padding: 20px; }
        .container { max-width: 1000px; margin: auto; background: white; padding: 30px; border-radius: 15px; box-shadow: 0 5px 20px rgba(0,0,0,0.1); }
        .header { background: var(--primary); color: white; padding: 20px; border-radius: 10px; text-align: center; margin-bottom: 20px; }
        .stats-bar { display: flex; justify-content: space-between; margin-bottom: 20px; font-weight: bold; color: var(--primary); }
        table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        th { background: #e2e8f0; color: var(--primary); padding: 12px; text-align: left; border-bottom: 2px solid var(--primary); }
        td { padding: 12px; border-bottom: 1px solid #eee; }
        .btn { background: var(--primary); color: white; border: none; padding: 12px 25px; border-radius: 6px; cursor: pointer; font-weight: bold; }
        .status-badge { padding: 4px 8px; border-radius: 4px; font-size: 12px; font-weight: bold; background: #dcfce7; color: #166534; }
        #loader { text-align: center; padding: 40px; color: #666; }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <h1 style="margin:0;">EUDES MEDIA SCHOOL SYSTEM</h1>
        <p style="margin:5px 0; opacity:0.9;">Student Management Portal | +256762992440</p>
    </div>

    <div class="stats-bar">
        <button class="btn" onclick="addStudent()">+ REGISTER NEW STUDENT</button>
        <div id="studentCount">Loading Students...</div>
    </div>

    <table>
        <thead>
            <tr>
                <th>LIN</th>
                <th>STUDENT NAME</th>
                <th>CLASS</th>
                <th>DEBT (UGX)</th>
                <th>STATUS</th>
            </tr>
        </thead>
        <tbody id="studentTable">
            </tbody>
    </table>
    <div id="loader">Connecting to secure database...</div>
</div>

<script>
    const API_URL = 'https://qtvkasgnrftajqrrcgsg.supabase.co/rest/v1/students';
    const API_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InF0dmthc2ducmZ0YWpxcnJjZ3NnIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzczMTM5ODksImV4cCI6MjA5Mjg4OTk4OX0.gw1-WKC2ccGRXl1O74v1TaHu2DzwSlVTCaQHv6bsYcg';

    // 1. Fetch and Display Students
    async function loadStudents() {
        try {
            const response = await fetch(`${API_URL}?select=*&order=name.asc`, {
                headers: { 'apikey': API_KEY, 'Authorization': `Bearer ${API_KEY}` }
            });
            const data = await response.json();
            
            document.getElementById('loader').style.display = 'none';
            const table = document.getElementById('studentTable');
            table.innerHTML = "";

            if (data.length === 0) {
                table.innerHTML = '<tr><td colspan="5" style="text-align:center;">No students registered yet.</td></tr>';
            }

            data.forEach(s => {
                const row = `<tr>
                    <td>${s.lin || 'N/A'}</td>
                    <td><strong>${s.name}</strong></td>
                    <td>${s.class || 'Not Set'}</td>
                    <td style="color:red;">${(s.total_fees - s.fees_paid).toLocaleString()} UGX</td>
                    <td><span class="status-badge">ACTIVE</span></td>
                </tr>`;
                table.innerHTML += row;
            });
            document.getElementById('studentCount').innerText = `Total Students: ${data.length}`;
        } catch (e) {
            document.getElementById('loader').innerText = "Error loading data. Please refresh.";
        }
    }

    // 2. Add New Student
    async function addStudent() {
        const name = prompt("Enter Student Name:");
        if (!name) return;
        const className = prompt("Enter Class (e.g. P.1, S.4):");
        
        try {
            const response = await fetch(API_URL, {
                method: 'POST',
                headers: {
                    'apikey': API_KEY,
                    'Authorization': `Bearer ${API_KEY}`,
                    'Content-Type': 'application/json',
                    'Prefer': 'return=minimal'
                },
                body: JSON.stringify({ 
                    name: name, 
                    class: className,
                    lin: "LIN-" + Math.floor(1000 + Math.random() * 9000),
                    total_fees: 0,
                    fees_paid: 0
                })
            });

            if (response.ok) {
                alert("Successfully Registered " + name);
                loadStudents(); // Refresh the list
            } else {
                alert("Error saving student.");
            }
        } catch (e) {
            alert("Network error.");
        }
    }

    // Initial Load
    loadStudents();
</script>

</body>
</html>
