<!DOCTYPE html>
<html>
<head>
    <title>EUDES MEDIA SYSTEM</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { font-family: sans-serif; background: white; color: #003366; padding: 40px; text-align: center; }
        .container { max-width: 800px; margin: auto; border: 2px solid #003366; padding: 20px; border-radius: 10px; }
        .btn { padding: 15px 30px; background: #003366; color: white; border: none; border-radius: 5px; cursor: pointer; font-size: 16px; margin: 10px; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th, td { border: 1px solid #ddd; padding: 12px; }
        #status { font-weight: bold; margin: 20px; padding: 10px; }
    </style>
</head>
<body>

<div class="container">
    <h1>EUDES MEDIA SYSTEM</h1>
    <div id="status" style="background: #eee;">Checking Connection...</div>
    
    <button class="btn" onclick="testConnection()">1. TEST CONNECTION</button>
    <button class="btn" onclick="register()">2. REGISTER STUDENT</button>

    <table>
        <thead>
            <tr>
                <th>LIN</th>
                <th>NAME</th>
                <th>CLASS</th>
            </tr>
        </thead>
        <tbody id="list">
            <tr><td colspan="3">No data loaded.</td></tr>
        </tbody>
    </table>
</div>

<script>
    const S_URL = 'https://qtvkasgnrftajqrrcgsg.supabase.co';
    const S_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InF0dmthc2ducmZ0YWpxcnJjZ3NnIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzczMTM5ODksImV4cCI6MjA5Mjg4OTk4OX0.gw1-WKC2ccGRXl1O74v1TaHu2DzwSlVTCaQHv6bsYcg';
    const supabase = window.supabase.createClient(S_URL, S_KEY);

    // Function to see if Supabase is even talking to us
    async function testConnection() {
        const stat = document.getElementById('status');
        stat.innerText = "Testing...";
        try {
            const { data, error } = await supabase.from('students').select('count');
            if (error) {
                stat.innerText = "❌ ERROR: " + error.message;
                stat.style.color = "red";
            } else {
                stat.innerText = "✅ CONNECTED TO SUPABASE!";
                stat.style.color = "green";
                load();
            }
        } catch (e) {
            stat.innerText = "❌ CRITICAL ERROR: " + e.message;
        }
    }

    async function load() {
        const { data } = await supabase.from('students').select('*');
        const list = document.getElementById('list');
        if (data && data.length > 0) {
            list.innerHTML = data.map(s => `<tr><td>${s.lin}</td><td>${s.name}</td><td>${s.class}</td></tr>`).join('');
        } else {
            list.innerHTML = '<tr><td colspan="3">Connected, but no students found.</td></tr>';
        }
    }

    async function register() {
        const name = prompt("Name:");
        const cls = prompt("Class:");
        const lin = "LIN-" + Math.floor(Math.random()*9000);
        
        const { error } = await supabase.from('students').insert([{ name, class: cls, lin }]);
        if (error) alert("Error saving: " + error.message);
        else { alert("Saved!"); testConnection(); }
    }

    window.onload = testConnection;
</script>
</body>
</html>
