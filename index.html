// Supabase API with retry and error handling
async function fetchDB(table, filter = '', retries = 2) {
    for (let i = 0; i < retries; i++) {
        try {
            let res = await fetch(`${SUPABASE_URL}/rest/v1/${table}?select=*${filter}`, {
                headers: { 'apikey': SUPABASE_KEY, 'Authorization': `Bearer ${SUPABASE_KEY}` }
            });
            if (!res.ok) {
                if (i === retries - 1) return [];
                await new Promise(r => setTimeout(r, 300 * (i + 1)));
                continue;
            }
            let text = await res.text();
            return text ? JSON.parse(text) : [];
        } catch (e) {
            if (i === retries - 1) return [];
            await new Promise(r => setTimeout(r, 300 * (i + 1)));
        }
    }
    return [];
}

async function insertDB(table, data) {
    try {
        let res = await fetch(`${SUPABASE_URL}/rest/v1/${table}`, {
            method: 'POST',
            headers: { 'apikey': SUPABASE_KEY, 'Authorization': `Bearer ${SUPABASE_KEY}`, 'Content-Type': 'application/json' },
            body: JSON.stringify(data)
        });
        if (!res.ok) {
            let errorText = await res.text();
            if (errorText.includes('duplicate key')) {
                showToast('Duplicate entry - record already exists', true);
            }
            return null;
        }
        let text = await res.text();
        return text ? JSON.parse(text) : true;
    } catch (e) { return null; }
}

async function updateDB(table, id, data) {

}

    try {

        }
        
        // Clean orphaned marks
        let marks = await fetchDB('marks', `&school_id=eq.${SCHOOL_ID}`);
        let orphanedMarks = marks.filter(m => !studentIds.has(m.student_id));
        for (let m of orphanedMarks) {

        }
        
        // Clean orphaned attendance
        let attendance = await fetchDB('attendance', `&school_id=eq.${SCHOOL_ID}`);

        // Reload fresh data

            fetchDB('students', `&school_id=eq.${SCHOOL_ID}`),
            fetchDB('marks', `&school_id=eq.${SCHOOL_ID}`),
            fetchDB('attendance', `&school_id=eq.${SCHOOL_ID}`),

        ]);

        cache.marks = m || [];
        cache.attendance = a || [];
        cache.payments = p || [];
        
        cache.students.sort((a, b) => {

function fileToBase64(file) {
    return new Promise((resolve, reject) => {
        const reader = new FileReader();
        reader.readAsDataURL(file);
        reader.onload = () => resolve(reader.result);
        reader.onerror = error => reject(error);
    });
}

// ============= DASHBOARD =============
async function renderDashboard() {
    let students = getStudents(), payments = getPayments(), attendance = getAttendance();
    let today = new Date().toISOString().slice(0, 10);
    let absentToday = attendance.filter(a => a.date === today && a.status === 'absent').length;
    let totalInc = payments.reduce((a, b) => a + (b.amount || 0), 0);
    let totalExp = students.reduce((a, b) => a + (b.total_fees || 0), 0);
    let viewFinance = currentUser?.role === 'admin' || currentUser?.role === 'finance';
    
    if (students.length === 0) {
        document.getElementById('tabContent').innerHTML = `

                <i class="fas fa-exclamation-triangle"></i>
                <h4>No Data Found</h4>
                <p>Your database appears to be empty or has connection issues.</p>
                <button class="repair-btn" onclick="repairAndReload()"><i class="fas fa-wrench"></i> Repair Database</button>
                <button class="btn btn-primary btn-sm" onclick="refreshData()" style="margin-left:10px;"><i class="fas fa-sync"></i> Refresh</button>

function getNavButtons() {
    let perms = ROLE_PERMS[currentUser?.role];
    let btns = [];
    if (perms.students) btns.push(`<button class="btn btn-primary" onclick="switchTab('students')"><i class="fas fa-users"></i> Students</button>`);
    if (perms.attendance) btns.push(`<button class="btn btn-primary" onclick="switchTab('attendance')"><i class="fas fa-calendar-check"></i> Attendance</button>`);
    if (perms.marks) btns.push(`<button class="btn btn-primary" onclick="switchTab('marks')"><i class="fas fa-chart-line"></i> Marks</button>`);
    if (perms.fees) btns.push(`<button class="btn btn-primary" onclick="switchTab('fees')"><i class="fas fa-coins"></i> Fees</button>`);
    if (perms.reports) btns.push(`<button class="btn btn-gold" onclick="switchTab('reports')"><i class="fas fa-print"></i> Reports</button>`);

// ============= STUDENTS =============
async function renderStudents() {
    let students = getStudents(), payments = getPayments();
    if (students.length === 0) {
        document.getElementById('tabContent').innerHTML = `
            <div class="error-box">
                <i class="fas fa-exclamation-triangle"></i>
                <h4>No Students Found</h4>
                <p>Click the Repair button to fix database issues.</p>
                <button class="repair-btn" onclick="repairAndReload()"><i class="fas fa-wrench"></i> Repair Database</button>
            </div>
        `;
        return;
    }
    
    let perms = ROLE_PERMS[currentUser?.role];
    let filtered = students.filter(s => {
        if (!globalSearch) return true;
        const term = globalSearch.toLowerCase();
        return `${s.first_name} ${s.last_name}`.toLowerCase().includes(term) ||
               s.lin.toLowerCase().includes(term) ||
               (s.payment_code || '').toLowerCase().includes(term) ||
               s.class.toLowerCase().includes(term) ||
               (s.parent_name || '').toLowerCase().includes(term) ||
               (s.parent_whatsapp || '').includes(term);
    });
    let viewFinance = currentUser?.role === 'admin' || currentUser?.role === 'finance';
    
    document.getElementById('tabContent').innerHTML = `
        <div class="card">
            <div class="flex" style="justify-content: space-between; align-items: center;">
                <h3 style="font-size:1.1rem;">Student Register (${students.length})</h3>
                <div class="flex" style="margin-bottom:0;">
                    <button class="btn btn-sm btn-gold" onclick="refreshData()"><i class="fas fa-sync"></i> Refresh</button>
                    ${perms.promote ? `<button class="btn btn-gold btn-sm" onclick="showPromoteModal()"><i class="fas fa-arrow-up"></i> Promote</button>` : ''}
                    ${perms.editStudents ? `<button class="btn btn-primary btn-sm" onclick="showAddStudentModal()"><i class="fas fa-plus"></i> Add</button>` : ''}
                </div>
            </div>
            <div class="search-bar"><i class="fas fa-search"></i><input type="text" id="studentSearch" placeholder="Search name, LIN, class, parent..." value="${escapeHtml(globalSearch)}"></div>
            <div class="data-table"><table><thead><tr><th>Photo</th><th>Name</th><th>Class</th><th>LIN</th><th>Payment Code</th>${viewFinance ? '<th>Total</th><th>Paid</th><th>Balance</th>' : ''}<th>Parent</th><th>Actions</th></tr></thead><tbody id="studentsBody"></tbody></table></div>
        </div>`;
    
    let searchInput = document.getElementById('studentSearch');
    if (searchInput) {
        searchInput.addEventListener('input', (e) => {
            globalSearch = e.target.value;
            debounce('studentSearch', () => renderStudents(), 150);
        });
    }
    let tbody = document.getElementById('studentsBody');
    if (!tbody) return;
    tbody.innerHTML = '';
    for (let s of filtered) {
        let paid = payments.filter(p => p.student_id === s.id).reduce((a, b) => a + (b.amount || 0), 0);
        let bal = (s.total_fees || 0) - paid;
        let row = tbody.insertRow();
        let photoHtml = s.photo_url ? `<img src="${s.photo_url}" class="student-photo-img" style="width:40px;height:40px;border-radius:50%;object-fit:cover;">` : `<div class="student-photo-img"><i class="fas fa-user-circle fa-2x"></i></div>`;
        let actions = '';
        if (perms.editStudents) {
            actions += `<button class="btn btn-sm btn-primary" onclick="editStudent('${s.id}')">Edit</button> <button class="btn btn-sm btn-red" onclick="deleteStudent('${s.id}')">Del</button>`;
        }
        actions += `<button class="btn btn-sm btn-gold" onclick="showStudentFinancialHistory('${s.id}')"><i class="fas fa-history"></i> History</button>`;
        if (viewFinance) {
            row.innerHTML = `<td>${photoHtml}</td><td><strong>${s.first_name} ${s.last_name}</strong></td><td>${s.class}</td><td>${s.lin}</td><td>${s.payment_code || ''}</td><td>${formatMoney(s.total_fees || 0)}</td><td class="paid">${formatMoney(paid)}</td><td class="${bal > 0 ? 'debt' : ''}">${formatMoney(bal)}</td><td>${escapeHtml(s.parent_name || '')}</td><td>${actions}</td>`;
        } else {
            row.innerHTML = `<td>${photoHtml}</td><td><strong>${s.first_name} ${s.last_name}</strong></td><td>${s.class}</td><td>${s.lin}</td><td>${s.payment_code || ''}</td><td>${escapeHtml(s.parent_name || '')}</td><td>${actions}</td>`;
        }
    }
}

// ============= MAIN APP =============
async function renderMainApp() {
    await loadAllData();
    let perms = ROLE_PERMS[currentUser?.role];
    let tabs = ['dashboard'];
    if (perms.students) tabs.push('students');
    if (perms.attendance) tabs.push('attendance');
    if (perms.marks) tabs.push('marks');
    if (perms.fees) tabs.push('fees');
    if (perms.reports) tabs.push('reports');
    if (perms.absentees) tabs.push('absentees');
    if (!tabs.includes(activeTab)) activeTab = 'dashboard';
    
    let now = getUgandaTime();
    document.getElementById('app').innerHTML = `
        <div class="role-badge">${currentUser.role.toUpperCase()} <button class="logout-btn" onclick="logout()">Exit</button></div>
        <div class="app-container">
            <div class="school-header">
                <div class="school-name">🏫 PROGRESSIVE MOTHERS</div>
                <div class="school-address">Gayaza-Kijabijjo, Kampala | 📞 ${SCHOOL_CONTACTS.join(', ')}</div>
                <div class="datetime-row">
                    <div><i class="far fa-calendar-alt"></i> ${now.toLocaleDateString('en-UG', { weekday: 'short', year: 'numeric', month: 'short', day: 'numeric' })}</div>
                    <div><i class="far fa-clock"></i> <span id="liveTime">${now.toLocaleTimeString('en-UG', { hour: '2-digit', minute: '2-digit', hour12: true })} (EAT)</span></div>
                    <div class="global-search"><i class="fas fa-search"></i><input type="text" id="globalSearchInput" placeholder="Search..."></div>
                </div>
            </div>
            <div class="action-buttons">${tabs.map(t => `<button class="action-btn ${activeTab === t ? 'active' : ''}" data-tab="${t}"><i class="fas ${t === 'dashboard' ? 'fa-tachometer-alt' : t === 'students' ? 'fa-user-graduate' : t === 'attendance' ? 'fa-calendar-check' : t === 'marks' ? 'fa-chart-line' : t === 'fees' ? 'fa-coins' : t === 'reports' ? 'fa-print' : 'fa-user-clock'}"></i> ${t.charAt(0).toUpperCase() + t.slice(1)}</button>`).join('')}</div>
            <div id="tabContent"></div>
        </div>`;
    setInterval(() => { let t = document.getElementById('liveTime'); if (t) t.innerText = getUgandaTime().toLocaleTimeString('en-UG', { hour: '2-digit', minute: '2-digit', hour12: true }) + ' (EAT)'; }, 1000);
    let search = document.getElementById('globalSearchInput');
    if (search) {
        search.addEventListener('input', (e) => {
            globalSearch = e.target.value;
            if (activeTab === 'students') debounce('globalSearch', () => renderStudents(), 150);
        });
    }
    document.querySelectorAll('.action-btn').forEach(btn => { btn.onclick = () => { activeTab = btn.dataset.tab; renderMainApp(); }; });
    
    if (activeTab === 'dashboard') await renderDashboard();
    else if (activeTab === 'students') await renderStudents();
    else if (activeTab === 'attendance') await renderAttendance();
    else if (activeTab === 'marks') await renderMarks();
    else if (activeTab === 'fees') await renderFees();
    else if (activeTab === 'reports') await renderReports();
    else if (activeTab === 'absentees') await renderAbsentees();
}

function switchTab(tab) { activeTab = tab; renderMainApp(); }
function logout() { currentUser = null; sessionStorage.removeItem('progressive_user'); renderLogin(); }
function renderLogin() {
    document.getElementById('app').innerHTML = `<div class="login-container"><i class="fas fa-school fa-3x" style="color:#003366;"></i><h2>Progressive Mothers</h2><p>"With God Everything is Possible"</p><input type="text" id="username" placeholder="Username"><input type="password" id="password" placeholder="Password"><button onclick="doLogin()">Login</button></div>`;
}
function doLogin() {
    let u = document.getElementById('username').value, p = document.getElementById('password').value;
    if (u === 'admin' && p === 'admin123') { currentUser = { username: 'admin', role: 'admin' }; sessionStorage.setItem('progressive_user', JSON.stringify(currentUser)); renderMainApp(); }
    else if (u === 'teacher' && p === 'teacher123') { currentUser = { username: 'teacher', role: 'teacher' }; sessionStorage.setItem('progressive_user', JSON.stringify(currentUser)); renderMainApp(); }
    else if (u === 'finance' && p === 'finance123') { currentUser = { username: 'finance', role: 'finance' }; sessionStorage.setItem('progressive_user', JSON.stringify(currentUser)); renderMainApp(); }
    else alert('Invalid credentials');
}
function init() { 
    let saved = sessionStorage.getItem('progressive_user'); 
    if (saved) { 
        try { currentUser = JSON.parse(saved); renderMainApp(); } 
        catch(e) { renderLogin(); }
    } else renderLogin(); 
}
init();
