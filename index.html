function formatMoney(amt) { return 'UGX ' + (amt || 0).toLocaleString(); }
function escapeHtml(str) { return str ? String(str).replace(/[&<>]/g, m => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;' })[m]) : ''; }
function showToast(msg, isErr) { let t = document.createElement('div'); t.className = `toast-msg ${isErr ? 'error' : ''}`; t.innerText = msg; document.body.appendChild(t); setTimeout(() => t.remove(), 3000); }

function getStandardGrade(score) { if(score>=90) return 'D1'; if(score>=80) return 'D2'; if(score>=70) return 'C3'; if(score>=60) return 'C4'; if(score>=50) return 'C5'; if(score>=40) return 'C6'; if(score>=35) return 'P7'; if(score>=30) return 'P8'; return 'F9'; }

function getDivision(agg) { if(agg<=12) return 'Division 1'; if(agg<=23) return 'Division 2'; if(agg<=29) return 'Division 3'; if(agg<=34) return 'Division 4'; return 'Division U'; }

function generateUniqueLIN(firstName, existingLINs) {
    let prefix = 'PM', firstLetter = firstName ? firstName.charAt(0).toUpperCase() : 'X', baseLIN = prefix + firstLetter;
    let newLIN = '', isUnique = false, attempts = 0;
    while (!isUnique && attempts < 100) {
        let randomNum = Math.floor(1000 + Math.random() * 9000);
        newLIN = baseLIN + randomNum;
        if (!existingLINs.includes(newLIN)) isUnique = true;
        attempts++;
    }
    return newLIN;
}

// Supabase API - SILENT LOADING (no messages)
async function supabaseFetch(table, filter = '') {
    try {
        let url = `${SUPABASE_URL}/rest/v1/${table}?select=*${filter}`;
        let res = await fetch(url, { headers: { 'apikey': SUPABASE_KEY, 'Authorization': `Bearer ${SUPABASE_KEY}` } });
        if (!res.ok) return [];
        let text = await res.text();
        return text ? JSON.parse(text) : [];
    } catch(e) { return []; }
}
async function supabaseInsert(table, data) {
    try {
        let res = await fetch(`${SUPABASE_URL}/rest/v1/${table}`, { method: 'POST', headers: { 'apikey': SUPABASE_KEY, 'Authorization': `Bearer ${SUPABASE_KEY}`, 'Content-Type': 'application/json' }, body: JSON.stringify(data) });
        if (!res.ok) throw new Error(`HTTP ${res.status}`);
        let text = await res.text();
        return text ? JSON.parse(text) : true;
    } catch(e) { showToast(`Error: ${e.message}`, true); return null; }
}
async function supabaseUpdate(table, id, data) {
    try {
        let res = await fetch(`${SUPABASE_URL}/rest/v1/${table}?id=eq.${id}`, { method: 'PATCH', headers: { 'apikey': SUPABASE_KEY, 'Authorization': `Bearer ${SUPABASE_KEY}`, 'Content-Type': 'application/json' }, body: JSON.stringify(data) });
        if (!res.ok) throw new Error(`HTTP ${res.status}`);
        let text = await res.text();
        return text ? JSON.parse(text) : true;
    } catch(e) { showToast(`Error updating: ${e.message}`, true); return null; }
}
async function supabaseDelete(table, id) {
    try { await fetch(`${SUPABASE_URL}/rest/v1/${table}?id=eq.${id}`, { method: 'DELETE', headers: { 'apikey': SUPABASE_KEY, 'Authorization': `Bearer ${SUPABASE_KEY}` } }); return true; } catch(e) { return false; }
}

// Filter functions
function filterStudents(list) { if (!searchTerm.trim()) return list; const term = searchTerm.toLowerCase().trim(); return list.filter(s => `${s.first_name} ${s.last_name}`.toLowerCase().includes(term) || (s.lin || '').toLowerCase().includes(term) || (s.payment_code || '').toLowerCase().includes(term) || (s.class || '').toLowerCase().includes(term) || (s.parent_name || '').toLowerCase().includes(term)); }
function filterAttendance(list) { if (!attendanceSearchTerm.trim()) return list; const term = attendanceSearchTerm.toLowerCase().trim(); return list.filter(s => `${s.first_name} ${s.last_name}`.toLowerCase().includes(term) || (s.lin || '').toLowerCase().includes(term)); }
function filterFees(list) { if (!feesSearchTerm.trim()) return list; const term = feesSearchTerm.toLowerCase().trim(); return list.filter(s => `${s.first_name} ${s.last_name}`.toLowerCase().includes(term) || (s.lin || '').toLowerCase().includes(term)); }

// Students - NO RE-RENDER ON SEARCH
function renderStudents() {
    let filtered = filterStudents(students), viewFinance = ROLE_PERMISSIONS[currentUser?.role]?.viewFinance || false;
    let html = `
        <div class="card-modern"><div class="flex-row" style="justify-content: space-between;"><div class="section-title" style="margin-bottom:0;"><i class="fas fa-user-graduate"></i> Student Register (${students.length})</div><button class="btn btn-primary" onclick="showAddStudentModal()"><i class="fas fa-plus"></i> Add Student</button></div>
        <div class="search-bar"><i class="fas fa-search"></i><input type="text" id="studentSearch" placeholder="Search by Name, LIN, Payment Code, Class, Parent..." value="${escapeHtml(searchTerm)}"><i class="fas fa-times" id="clearSearch" style="cursor:pointer; display:${searchTerm?'block':'none'};"></i></div>
        <div class="data-wrapper"><table class="data-table"><thead><tr><th>Photo</th><th>Name</th><th>Class</th><th>LIN</th><th>Payment Code</th>${viewFinance?'<th>Total Fees</th><th>Paid</th><th>Balance</th>':''}<th>Parent</th><th>WhatsApp</th><th>Year</th><th>Actions</th></tr></thead><tbody id="studentsBody"></tbody>}</div>${filtered.length===0?'<div class="no-results">No students match</div>':''}</div>`;
    document.getElementById('mainContent').innerHTML = html;
    
    // Attach search event without re-rendering the whole page
    let searchInput = document.getElementById('studentSearch');
    if(searchInput) {
        searchInput.addEventListener('input', (e) => { searchTerm = e.target.value; renderStudentsTableOnly(); });
        document.getElementById('clearSearch')?.addEventListener('click', () => { searchTerm = ''; searchInput.value = ''; renderStudentsTableOnly(); });
    }
    renderStudentsTableOnly();
}

function renderStudentsTableOnly() {

            for (let sub of subs) {
                let mk = relMarks.find(m=>m.student_id===s.id && m.subject===sub);
                grid += `<td><input type="number" class="mark-input" data-student="${s.id}" data-subject="${sub}" value="${mk?mk.score:''}" style="width:75px;"></td>`;
            }
            grid += `</tr>`;
        }
        grid += `</tbody></table>`;
        document.getElementById('marksGrid').innerHTML = grid;
    };
    document.getElementById('saveMarks').onclick = async () => {
        let term = document.getElementById('marksTerm').value, exam = document.getElementById('marksExam').value, inputs = document.querySelectorAll('.mark-input');

            }
        }
        showToast('Marks saved'); await loadAllData();
    };
    document.getElementById('loadMarks').click();
}

    </style></head><body>`;
    
    for(let s of selected){
        let studentMarks = marks.filter(m=>m.student_id===s.id && m.term===term);
        let subjects = SUBJECT_MAP[s.class] || ['English','Mathematics','Science','Social Studies'];
        let exams = scope==='beginning'?['Beginning of Term']:scope==='mid'?['Beginning of Term','Mid Term']:['Beginning of Term','Mid Term','End of Term'];
        let rows = '', totals = {}, points = {};
        exams.forEach(e=>{ totals[e]=0; points[e]=[]; });
        for(let sub of subjects){
            rows += `<tr><td style="font-weight:600">${sub}</td>`;
            for(let ex of exams){
                let mk = studentMarks.find(m=>m.subject===sub && m.exam_type===ex);
                let score = mk ? mk.score : '-';
                let grade = score !== '-' ? getStandardGrade(score) : '-';
                rows += `<td><strong>${score}</strong><br><small>${grade}</small></td>`;
                if(mk){
                    totals[ex] += mk.score;
                    if(grade!=='-') points[ex].push(getGradePoints(grade));
                }
            }
            rows += `</tr>`;
        }
        let summaryRow = `<tr style="background:#f1f5f9"><td style="font-weight:700">Total / Aggregate</td>`;
        let divisionRow = `<tr style="background:#eef2ff"><td style="font-weight:700">Division</td>`;
        for(let ex of exams){
            let total = totals[ex] || 0;
            let agg = 0;
            if(points[ex].length){
                points[ex].sort((a,b)=>a-b);
                agg = points[ex].slice(0,4).reduce((s,p)=>s+p,0);
            }
            summaryRow += `<td>${total}/${subjects.length*100}<br><small>Agg: ${agg}</small></td>`;
            divisionRow += `<td><strong>${getDivision(agg)}</strong></td>`;
        }
        summaryRow += `</tr>`; divisionRow += `</tr>`;
        rows += summaryRow + divisionRow;
        
        let photoHtml = s.photo_url ? `<img src="${s.photo_url}" class="student-photo">` : `<div class="student-photo"><i class="fas fa-user-graduate fa-3x" style="color:#0b2b5c"></i></div>`;
        
        html += `<div class="report-card">
            <div class="report-header"><h2>PROGRESSIVE MOTHERS NUR. & PRIMARY SCHOOL</h2><p>P.O BOX ......, KAMPALA | Tel: 0756 585035</p></div>
            <h3 style="text-align:center">ACADEMIC REPORT - ${term}</h3>
            <div class="student-info">${photoHtml}<div><p><strong>Name:</strong> ${s.first_name} ${s.last_name}</p><p><strong>LIN:</strong> ${s.lin}</p><p><strong>Payment Code:</strong> ${s.payment_code||s.lin}</p><p><strong>Class:</strong> ${s.class}</p><p><strong>Parent:</strong> ${s.parent_name||'N/A'}</p></div></div>
            <table class="grade-table"><thead><tr><th>SUBJECT</th>${exams.map(e=>`<th>${e}</th>`).join('')}</tr></thead><tbody>${rows}</tbody></table>
            <div class="comment-section"><div class="comment-box"><strong>CLASS TEACHER'S COMMENT</strong><div style="height:50px;border-bottom:1px solid #000;margin:12px 0"></div>Signature: ____________________<br>Date: ___________</div>
            <div class="comment-box"><strong>HEAD TEACHER'S COMMENT</strong><div style="height:50px;border-bottom:1px solid #000;margin:12px 0"></div>Signature: ____________________<br>Date: ___________</div></div>
            <div style="text-align:center;margin-top:20px">Generated on ${new Date().toLocaleString()}</div>
        </div>`;
    }
    html += `</body></html>`;
    let win = window.open('','_blank');
    win.document.write(html);
    win.document.close();
    win.print();
    showToast(`Printed ${selected.length} report(s)`);
}

// Main App
async function renderMainApp() {
    await loadAllData();
    let perms = ROLE_PERMISSIONS[currentUser?.role];
    let availableViews = ['dashboard'];
    if(perms?.students) availableViews.push('students');
    if(perms?.attendance) availableViews.push('attendance');
    if(perms?.marks) availableViews.push('marks');
    if(perms?.fees) availableViews.push('fees');
    if(perms?.reports) availableViews.push('reports');
    if(!availableViews.includes(activeView)) activeView = 'dashboard';
    
    document.getElementById('root').innerHTML = `
        <div class="role-badge"><i class="fas fa-user-tag"></i> ${currentUser.role.toUpperCase()} <button class="logout-icon" onclick="logout()"><i class="fas fa-sign-out-alt"></i> Exit</button></div>
        <div class="app-wrapper"><div class="hero-header"><div class="school-title"><i class="fas fa-school"></i> PROGRESSIVE MOTHERS NUR. & PRIMARY SCHOOL</div><div class="school-motto">Gayaza-Kijabijjo, Kampala | 📞 0756 585035 / 0779 585035</div></div>
        <div class="nav-ribbon">${availableViews.map(v=>`<button class="nav-pill ${activeView===v?'active':''}" onclick="switchView('${v}')"><i class="fas ${v==='dashboard'?'fa-tachometer-alt':v==='students'?'fa-user-graduate':v==='attendance'?'fa-calendar-check':v==='marks'?'fa-chart-line':v==='fees'?'fa-coins':'fa-print'}"></i> ${v.charAt(0).toUpperCase()+v.slice(1)}</button>`).join('')}</div>
        <div id="mainContent"></div></div>`;
    if(activeView==='dashboard') await renderDashboard();
    else if(activeView==='students') renderStudents();
    else if(activeView==='attendance') await renderAttendance();
    else if(activeView==='marks') await renderMarks();
    else if(activeView==='fees') await renderFees();
    else if(activeView==='reports') await renderReports();
}

function switchView(view) { activeView = view; renderMainApp(); }
function logout() { currentUser = null; sessionStorage.removeItem('progressive_user'); showLogin(); }
function showLogin() {
    document.getElementById('root').innerHTML = `<div class="login-screen"><i class="fas fa-school fa-3x" style="color:#0b2b5c"></i><h2>Progressive Mothers School</h2><p>Complete Management System</p><input type="text" id="loginUsername" placeholder="Username"><input type="password" id="loginPassword" placeholder="Password"><button onclick="doLogin()">Login</button></div>`;
}
function doLogin() {
    let u = document.getElementById('loginUsername').value, p = document.getElementById('loginPassword').value;
    if(u==='admin' && p==='admin123') { currentUser={username:'admin',role:'admin'}; sessionStorage.setItem('progressive_user',JSON.stringify(currentUser)); renderMainApp(); }
    else if(u==='teacher' && p==='teacher123') { currentUser={username:'teacher',role:'teacher'}; sessionStorage.setItem('progressive_user',JSON.stringify(currentUser)); renderMainApp(); }
    else if(u==='finance' && p==='finance123') { currentUser={username:'finance',role:'finance'}; sessionStorage.setItem('progressive_user',JSON.stringify(currentUser)); renderMainApp(); }
    else alert('Invalid credentials');
}
function init() { let saved = sessionStorage.getItem('progressive_user'); if(saved){ currentUser=JSON.parse(saved); renderMainApp(); } else showLogin(); }
init();
</script>
