<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EUDES MEDIA SCHOOL SYSTEM</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        * { margin:0; padding:0; box-sizing:border-box; font-family: 'Segoe UI', sans-serif; }
        body { background: #f0f4f8; padding: 20px; }
        .container { max-width: 1200px; margin: 0 auto; background: white; padding: 30px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        .header { background: #003366; color: white; padding: 20px; border-radius: 10px; display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .stats { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; margin-bottom: 20px; }
        .stat-box { padding: 20px; border: 1px solid #e2e8f0; border-radius: 10px; text-align: center; }
        .stat-box h3 { font-size: 14px; color: #64748b; }
        .stat-box p { font-size: 24px; font-weight: bold; color: #003366; }
        .btn { padding: 12px 20px; border: none; border-radius: 5px; cursor: pointer; font-weight: bold; }
        .btn-add { background: #003366; color: white; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th { text-align: left; background: #f8fafc; padding: 15px; color: #003366; border-bottom: 2px solid #eee; }
        td { padding: 15px; border-bottom: 1px solid #eee; font-size: 14px; }
        .badge { padding: 5px 10px; border-radius: 15px; font-size: 11px; font-weight: bold; }
        .present { background: #dcfce7; color: #166534; }
        .absent { background: #fee2e2; color: #991b1b; }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <div>
            <h1>EUDES MEDIA SCHOOL SYSTEM</h1>
            <p>Admin Contact: +256762992440</p>
        </div>
        <button class="btn" style="background:white; color:#003366;" onclick="loadData()">REFRESH</button>
    </div>

    <div class="stats">
        <div class="stat-box"><h3>TOTAL STUDENTS</h3><p id="tCount">0</p></div>
        <div class="stat-box"><h3>PRESENT TODAY</h3><p id="pCount">0</p></div>
        <div class="stat-box"><h3>TOTAL DEBT</h3><p id="dCount">UGX 0</p></div>
    </div>

    <button class="btn btn-add" onclick="registerStudent()">+ REGISTER NEW STUDENT</button>

    <div style="overflow-x: auto;">
        <table>
            <thead>
                <tr>
                    <th>LIN</th>
                    <th>NAME</th>
                    <th>CLASS</th>
                    <th>LOCATION</th>
                    <th>HEALTH</th>
                    <th>DEBT (UGX)</th>
                    <th>STATUS</th>
                    <th>ACTIONS</th>
                </tr>
            </thead>
            <tbody id="tableBody">
                <tr><td colspan="8" style="text-align:center; padding:50px;">Waiting for Supabase...</td></tr>
            </tbody>
        </table>
    </div>
</div>

<script>
    const S_URL = 'https://qtvkasgnrftajqrrcgsg.supabase.co';
    const S_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InF0dmthc2ducmZ0YWpxcnJjZ3NnIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzczMTM5ODksImV4cCI6MjA5Mjg4OTk4OX0.gw1-WKC2ccGRXl1O74v1TaHu2DzwSlVTCaQHv6bsYcg';
    const supabase = window.supabase.createClient(S_URL, S_KEY);

    window.onload = loadData;

    async function loadData() {
        const body = document.getElementById('tableBody');
        try {
            const { data, error } = await supabase.from('students').select('*').order('name');
            if (error) throw error;

            if (!data || data.length === 0) {
                body.innerHTML = '<tr><td colspan="8" style="text-align:center; padding:40px;">No students found. Register one above!</td></tr>';
                return;
            }

            body.innerHTML = data.map(s => {
                const debt = (s.total_fees || 0) - (s.fees_paid || 0);
                return `
                    <tr>
                        <td><strong>${s.lin || '-'}</strong></td>
                        <td>${s.name}</td>
                        <td>${s.class || '-'}</td>
                        <td>${s.physical_location || '-'}</td>
                        <td>${s.health_status || 'Normal'}</td>
                        <td style="color:red; font-weight:bold;">${debt.toLocaleString()}</td>
                        <td><span class="badge ${s.is_absent ? 'absent' : 'present'}">${s.is_absent ? 'ABSENT' : 'PRESENT'}</span></td>
                        <td>
                            <button onclick="toggleStatus('${s.id}', ${s.is_absent})" style="cursor:pointer; padding:5px;">Toggle</button>
                            <button onclick="deleteMe('${s.id}')" style="cursor:pointer; padding:5px; color:red;">Del</button>
                        </td>
                    </tr>
                `;
            }).join('');

            document.getElementById('tCount').innerText = data.length;
            document.getElementById('pCount').innerText = data.filter(x => !x.is_absent).length;
            const totalD = data.reduce((a, b) => a + ((b.total_fees || 0) - (b.fees_paid || 0)), 0);
            document.getElementById('dCount').innerText = "UGX " + totalD.toLocaleString();

        } catch (err) {
            body.innerHTML = `<tr><td colspan="8" style="color:red; text-align:center;">Error: ${err.message}</td></tr>`;
        }
    }

    async function registerStudent() {
        const name = prompt("Student Full Name:");
        if (!name) return;
        const className = prompt("Class:");
        const location = prompt("Physical Location:");
        const fees = prompt("Total Fees (UGX):", "350000");
        const lin = "LIN-" + Math.floor(1000 + Math.random() * 9000);

        const { error } = await supabase.from('students').insert([{
            name, class: className, physical_location: location, 
            total_fees: parseInt(fees) || 0, lin, is_absent: false
        }]);

        if (error) alert("Error: " + error.message);
        else loadData();
    }

    async function toggleStatus(id, current) {
        await supabase.from('students').update({ is_absent: !current }).eq('id', id);
        loadData();
    }

    async function deleteMe(id) {
        if (confirm("Delete this student?")) {
            await supabase.from('students').delete().eq('id', id);
            loadData();
        }
    }
</script>
</body>
</html>
