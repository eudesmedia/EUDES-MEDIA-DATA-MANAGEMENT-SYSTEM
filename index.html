function getStandardGrade(score) {
    if (score >= 90) return 'D1';

// Supabase Helpers
async function supabaseFetch(table, filter = '') {
    try {
        let res = await fetch(`${SUPABASE_URL}/rest/v1/${table}?select=*${filter}`, {
            headers: { 'apikey': SUPABASE_KEY, 'Authorization': `Bearer ${SUPABASE_KEY}` }
        });
        if (!res.ok) return [];
        return await res.json();
    } catch(e) { return []; }
}

async function supabaseInsert(table, data) {
    try {
        let res = await fetch(`${SUPABASE_URL}/rest/v1/${table}`, {
            method: 'POST',
            headers: { 'apikey': SUPABASE_KEY, 'Authorization': `Bearer ${SUPABASE_KEY}`, 'Content-Type': 'application/json' },
            body: JSON.stringify(data)
        });
        return res.ok ? await res.json() : null;
    } catch(e) { return null; }
}

async function supabaseUpdate(table, id, data) {
    try {
        let res = await fetch(`${SUPABASE_URL}/rest/v1/${table}?id=eq.${id}`, {
            method: 'PATCH',
            headers: { 'apikey': SUPABASE_KEY, 'Authorization': `Bearer ${SUPABASE_KEY}`, 'Content-Type': 'application/json' },
            body: JSON.stringify(data)
        });
        return await res.json();
    } catch(e) { return null; }
}

// ========== ATTENDANCE ==========
async function renderAttendance() {
    let classOptions = [...new Set(students.map(s => s.class))];
    document.getElementById('moduleContent').innerHTML = `
        <div class="card">
            <div class="card-title"><i class="fas fa-calendar-check"></i> Attendance</div>
            <div class="flex"><select id="attClass">${classOptions.map(c => `<option>${c}</option>`).join('')}</select><input type="date" id="attDate" value="${new Date().toISOString().slice(0,10)}"><button class="btn btn-primary" id="loadAttBtn">Load</button><button class="btn btn-gold" id="saveAttBtn">Save</button></div>
            <div id="attList" style="margin-top:20px;"></div>
        </div>
    `;
    document.getElementById('loadAttBtn').onclick = async () => {
        let cls = document.getElementById('attClass').value;
        let date = document.getElementById('attDate').value;
        let classStudents = students.filter(s => s.class === cls);
        let existing = await supabaseFetch('attendance', `&date=eq.${date}&status=eq.absent&school_id=eq.${SCHOOL_ID}`);
        let absentIds = new Set(existing.map(a => a.student_id));
        let html = '<table><thead><tr><th>Student</th><th>LIN</th><th>Absent</th></tr></thead><tbody>';
        for (let s of classStudents) html += `<tr><td>${s.first_name} ${s.last_name}</td><td>${s.lin}</td><td><input type="checkbox" class="absent-cb" data-id="${s.id}" ${absentIds.has(s.id) ? 'checked' : ''}></td></tr>`;
        html += '</tbody></table>';
        document.getElementById('attList').innerHTML = html;
    };
    document.getElementById('saveAttBtn').onclick = async () => {
        let date = document.getElementById('attDate').value;
        let cbs = document.querySelectorAll('.absent-cb');
        for (let cb of cbs) {
            let studentId = cb.dataset.id;
            let existing = await supabaseFetch('attendance', `&student_id=eq.${studentId}&date=eq.${date}`);
            if (cb.checked) { if (existing.length === 0) await supabaseInsert('attendance', { id: crypto.randomUUID(), school_id: SCHOOL_ID, student_id: studentId, date, status: 'absent' }); }
            else { if (existing.length > 0) await fetch(`${SUPABASE_URL}/rest/v1/attendance?id=eq.${existing[0].id}`, { method: 'DELETE', headers: { 'apikey': SUPABASE_KEY, 'Authorization': `Bearer ${SUPABASE_KEY}` } }); }
        }
        showToast('Attendance saved');
        await loadAllData();
    };
    document.getElementById('loadAttBtn').click();
}

    document.getElementById('loadMarksBtn').onclick = async () => {
        let cls = document.getElementById('marksClass').value;
        let term = document.getElementById('marksTerm').value;
        let exam = document.getElementById('marksExam').value;
        let classStudents = students.filter(s => s.class === cls);

        let relevantMarks = marks.filter(m => m.term === term && m.exam_type === exam);
        let html = `<table><thead><tr><th>Student</th>${subjects.map(s => `<th>${s}</th>`).join('')}</tr></thead><tbody>`;
        for (let s of classStudents) {
            html += `<tr><td><strong>${s.first_name} ${s.last_name}</strong></td>`;

                let mark = relevantMarks.find(m => m.student_id === s.id && m.subject === sub);

            }
            html += `</tr>`;
        }
        html += `</tbody></table>`;
        document.getElementById('marksGrid').innerHTML = html;

        let term = document.getElementById('marksTerm').value;
        let exam = document.getElementById('marksExam').value;

        for (let inp of inputs) {
            let score = parseInt(inp.value);
            if (!isNaN(score) && score >= 0 && score <= 100) {
                let studentId = inp.dataset.student;
                let subject = inp.dataset.subject;
                let existing = marks.find(m => m.student_id === studentId && m.subject === subject && m.term === term && m.exam_type === exam);
                let grade = getStandardGrade(score);
                if (existing) await supabaseUpdate('marks', existing.id, { score, grade });
                else await supabaseInsert('marks', { id: crypto.randomUUID(), school_id: SCHOOL_ID, student_id: studentId, subject, score, grade, term, exam_type: exam });
            }
        }
        showToast('Marks saved');
        await loadAllData();
    };
    document.getElementById('loadMarksBtn').click();
}

// ========== FEES WITH WHATSAPP REMINDER ==========
async function renderFees() {
    let totalIncome = payments.reduce((s,p) => s + p.amount, 0);
    let totalExpected = students.reduce((s,st) => s + (st.total_fees || 0), 0);
    
    let balanceHtml = '<table><thead><tr><th>Student</th><th>LIN</th><th>Total Fees</th><th>Paid</th><th>Balance</th><th>WhatsApp</th><th>Action</th></tr></thead><tbody>';
    for (let s of students) {
        let paid = payments.filter(p => p.student_id === s.id).reduce((a,b) => a + b.amount, 0);
        let bal = (s.total_fees || 0) - paid;
        balanceHtml += `<tr><td><strong>${s.first_name} ${s.last_name}</strong></td><td>${s.lin}</td><td>${formatMoney(s.total_fees || 0)}</td><td class="paid">${formatMoney(paid)}</td><td class="${bal > 0 ? 'debt' : ''}">${formatMoney(bal)}</td><td>${s.parent_whatsapp || 'N/A'}</td><td><button class="btn btn-sm btn-whatsapp" onclick="sendSingleReminder('${s.id}')"><i class="fab fa-whatsapp"></i> Send Reminder</button></td></tr>`;
    }
    balanceHtml += '</tbody></table>';
    
    // General message for all parents
    const generalMessage = `Good evening parents and thank you for your daily endeavors.\n\nThis is from the accounts section. We are requesting all parents who have not yet cleared fees to do so tomorrow to avoid inconveniencing our learners in the teaching and learning process.\n\nIf you have cleared, please ignore this message.\n\nWishing you a bright evening and a brand new day tomorrow.\n\nAccounts Department\nProgressive Mother's Nursery and Primary School`;
    
    document.getElementById('moduleContent').innerHTML = `
        <div class="card">
            <div class="card-title"><i class="fas fa-chart-line"></i> Financial Summary</div>
            <div class="stats-grid" style="grid-template-columns: repeat(3,1fr);">
                <div class="stat-card"><div class="stat-number">${formatMoney(totalIncome)}</div><div class="stat-label">Total Income</div></div>
                <div class="stat-card"><div class="stat-number">${formatMoney(totalExpected)}</div><div class="stat-label">Expected Fees</div></div>
                <div class="stat-card"><div class="stat-number">${formatMoney(totalExpected - totalIncome)}</div><div class="stat-label">Outstanding</div></div>
            </div>
        </div>
        
        <div class="card">
            <div class="card-title"><i class="fab fa-whatsapp"></i> Send Fee Reminder to ALL Parents</div>
            <div class="whatsapp-preview">
                <strong><i class="fab fa-whatsapp"></i> Message Preview:</strong>
                <pre>${generalMessage}</pre>
            </div>
            <button class="btn btn-whatsapp" id="sendAllReminderBtn" style="width:100%; margin-top:15px;"><i class="fab fa-whatsapp"></i> Send to ALL Parents via WhatsApp</button>
        </div>
        
        <div class="card">
            <div class="card-title"><i class="fas fa-list"></i> Student Balances & Individual Reminders</div>
            <div class="data-table">${balanceHtml}</div>
        </div>
        
        <div class="card">
            <div class="card-title"><i class="fas fa-money-bill-wave"></i> Record Payment</div>
            <div class="flex"><select id="payStudent" style="flex:2">${students.map(s => `<option value="${s.id}">${s.first_name} ${s.last_name} (${s.lin})</option>`).join('')}</select><input type="number" id="payAmount" placeholder="Amount" style="flex:1"><button class="btn btn-primary" id="recordPayBtn">Record Payment</button></div>
        </div>
    `;
    
    document.getElementById('sendAllReminderBtn').onclick = () => sendAllParentsReminder(generalMessage);
    document.getElementById('recordPayBtn').onclick = async () => {
        let sid = document.getElementById('payStudent').value;
        let amt = parseFloat(document.getElementById('payAmount').value);
        if (sid && amt > 0) {
            await supabaseInsert('payments', { id: crypto.randomUUID(), school_id: SCHOOL_ID, student_id: sid, amount: amt, payment_date: new Date().toISOString().slice(0,10), receipt_number: `RCP-${Date.now()}`, term: 'Term I', academic_year: '2026' });
            await loadAllData();
            await renderFees();
            showToast('Payment recorded');
        } else showToast('Invalid amount', true);
    };
}

window.sendSingleReminder = (studentId) => {
    let student = students.find(s => s.id === studentId);
    if (!student) return;
    let paid = payments.filter(p => p.student_id === studentId).reduce((a,b) => a + b.amount, 0);
    let balance = (student.total_fees || 0) - paid;
    
    let message = `Good evening ${student.parent_name || 'Parent'},\n\nThis is from the accounts section of Progressive Mother's Nursery and Primary School.\n\nYour child ${student.first_name} ${student.last_name} (LIN: ${student.lin}) has a fee balance of ${formatMoney(balance)}.\n\nPlease clear the balance tomorrow to avoid inconveniencing our learner in the teaching and learning process.\n\nIf you have already cleared, please ignore this message.\n\nWishing you a bright evening.\n\nAccounts Department\nProgressive Mother's Nursery and Primary School`;
    
    if (student.parent_whatsapp) {
        sendWhatsApp(student.parent_whatsapp, message);
        showToast(`Reminder sent to ${student.parent_name}`);
    } else {
        showToast('No WhatsApp number for this student', true);
    }
};

function sendAllParentsReminder(generalMessage) {
    let sent = 0;
    let failed = 0;
    for (let student of students) {
        if (student.parent_whatsapp) {
            sendWhatsApp(student.parent_whatsapp, generalMessage);
            sent++;
        } else {
            failed++;
        }
    }
    showToast(`Sent to ${sent} parents${failed > 0 ? `, ${failed} have no WhatsApp number` : ''}`);
}

// ========== REPORTS ==========
async function renderReports() {
    let classOptions = [...new Set(students.map(s => s.class))];
    document.getElementById('moduleContent').innerHTML = `
        <div class="card">
            <div class="card-title"><i class="fas fa-print"></i> Report Printing</div>
            <div class="flex"><select id="reportClass">${classOptions.map(c => `<option>${c}</option>`).join('')}</select><select id="reportTerm">${TERMS.map(t => `<option>${t}</option>`).join('')}</select><select id="reportExam"><option value="end">Full Term (All Exams)</option><option value="mid">Beginning + Mid</option><option value="beginning">Beginning Only</option></select></div>
            <div id="studentsReportList" style="margin-top:20px;"></div>
            <div id="selectionBar" class="selection-bar" style="display:none;"><span><i class="fas fa-check-circle"></i> <span id="selectedCount">0</span> selected</span><div class="flex"><button class="btn btn-green" id="printSelectedBtn">Print Selected</button><button class="btn btn-primary" id="selectAllBtn">Select All</button><button class="btn btn-red" id="deselectAllBtn">Deselect All</button></div></div>
            <button class="btn btn-gold" id="printWholeClassBtn" style="width:100%; margin-top:16px;">Print Whole Class</button>
        </div>
    `;
    
    const loadList = () => {
        let cls = document.getElementById('reportClass').value;
        if (!cls) return;
        let classStudents = students.filter(s => s.class === cls);
        selectedStudentIds.clear();
        document.getElementById('studentsReportList').innerHTML = `</table><thead><tr><th><input type="checkbox" id="headerCheckbox"></th><th>Name</th><th>LIN</th><th>Payment Code</th><th>Parent</th><th>Action</th></tr></thead><tbody>${classStudents.map(s => `<tr><td><input type="checkbox" class="student-chk" data-id="${s.id}"></td><td><strong>${s.first_name} ${s.last_name}</strong></td><td>${s.lin}</td><td>${s.payment_code || s.lin}</td><td>${s.parent_name || ''}</td><td><button class="btn btn-sm btn-gold" onclick="printSingleStudentReport('${s.id}')">Print</button></td></tr>`).join('')}</tbody></table>`;
        document.getElementById('selectionBar').style.display = 'flex';
        document.querySelectorAll('.student-chk').forEach(cb => cb.addEventListener('change', function() { if(this.checked) selectedStudentIds.add(this.dataset.id); else selectedStudentIds.delete(this.dataset.id); document.getElementById('selectedCount').innerText = selectedStudentIds.size; }));
        let header = document.getElementById('headerCheckbox');
        if(header) header.onchange = function() { document.querySelectorAll('.student-chk').forEach(cb => { cb.checked = this.checked; if(this.checked) selectedStudentIds.add(cb.dataset.id); else selectedStudentIds.delete(cb.dataset.id); }); document.getElementById('selectedCount').innerText = selectedStudentIds.size; };
    };
    document.getElementById('reportClass').addEventListener('change', loadList);
    document.getElementById('printSelectedBtn').onclick = () => printSelectedReports(Array.from(selectedStudentIds));
    document.getElementById('selectAllBtn').onclick = () => { document.querySelectorAll('.student-chk').forEach(cb => { cb.checked = true; selectedStudentIds.add(cb.dataset.id); }); document.getElementById('selectedCount').innerText = selectedStudentIds.size; };
    document.getElementById('deselectAllBtn').onclick = () => { document.querySelectorAll('.student-chk').forEach(cb => { cb.checked = false; selectedStudentIds.delete(cb.dataset.id); }); document.getElementById('selectedCount').innerText = 0; };
    document.getElementById('printWholeClassBtn').onclick = () => { let cls = document.getElementById('reportClass').value; let allIds = students.filter(s => s.class === cls).map(s => s.id); printSelectedReports(allIds); };
    loadList();
}

window.printSingleStudentReport = (id) => printSelectedReports([id]);

async function printSelectedReports(ids) {
    if (ids.length === 0) { showToast('No students selected', true); return; }
    let cls = document.getElementById('reportClass').value;
    let term = document.getElementById('reportTerm').value;
    let examScope = document.getElementById('reportExam').value;
    let selected = students.filter(s => ids.includes(s.id));
    let classList = students.filter(s => s.class === cls);
    
    let html = `<!DOCTYPE html><html><head><title>Student Reports</title><style>
        body { padding: 20px; background: white; font-family: 'Inter', sans-serif; }
        .report-card { max-width: 1000px; margin: 0 auto 30px auto; background: white; border-radius: 24px; padding: 32px; page-break-after: always; }
        .report-header { text-align: center; border-bottom: 3px solid #1a2a6c; padding-bottom: 20px; margin-bottom: 24px; }
        .report-header h2 { color: #1a2a6c; }
        .report-student-info { background: #f8f9fc; padding: 20px; border-radius: 20px; margin-bottom: 24px; display: flex; gap: 24px; flex-wrap: wrap; align-items: center; }
        .student-photo { width: 100px; height: 100px; border-radius: 50%; background: #e2e8f0; display: flex; align-items: center; justify-content: center; border: 3px solid #fdbb4d; }
        .info-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 12px; flex: 1; }
        .report-table { width: 100%; border-collapse: collapse; margin: 20px 0; }
        .report-table th, .report-table td { border: 1px solid #e2e8f0; padding: 12px; text-align: center; }
        .report-table th { background: #1a2a6c; color: white; }
        .comments-section { display: flex; gap: 32px; margin-top: 32px; flex-wrap: wrap; }
        .comment-box { flex: 1; border-top: 2px dashed #cbd5e1; padding-top: 20px; }
    </style></head><body>`;
    
    for (let s of selected) {
        let studentMarks = marks.filter(m => m.student_id === s.id && m.term === term);
        let subjects = CLASS_SUBJECTS[s.class] || [];
        let exams = examScope === 'beginning' ? ['Beginning of Term'] : examScope === 'mid' ? ['Beginning of Term', 'Mid Term'] : ['Beginning of Term', 'Mid Term', 'End of Term'];
        let rows = '', totals = {};
        exams.forEach(e => totals[e] = 0);
        for (let sub of subjects) {
            rows += `<tr><td>${sub}</td>`;
            for (let ex of exams) {
                let mark = studentMarks.find(m => m.subject === sub && m.exam_type === ex);
                let score = mark ? mark.score : '-';
                rows += `<td>${score}</td>`;
                if (mark) totals[ex] += mark.score;
            }
            rows += `</tr>`;
        }
        let totalRow = `<tr><td><strong>TOTAL</strong></td>`;
        for (let ex of exams) totalRow += `<td><strong>${totals[ex] || 0}/${subjects.length * 100}</strong></td>`;
        totalRow += `</tr>`;
        rows += totalRow;
        
        html += `<div class="report-card"><div class="report-header"><h2>PROGRESSIVE MOTHERS NUR. & PRIMARY SCHOOL</h2><p>P.O BOX ......, KAMPALA | Tel: 0756 585035</p></div><h3 style="text-align:center;">ACADEMIC REPORT - ${term}</h3><div class="report-student-info"><div class="student-photo"><i class="fas fa-user-graduate fa-3x"></i></div><div class="info-grid"><div><div class="info-label">NAME</div><div>${s.first_name} ${s.last_name}</div></div><div><div class="info-label">LIN</div><div>${s.lin}</div></div><div><div class="info-label">PAYMENT CODE</div><div>${s.payment_code || s.lin}</div></div><div><div class="info-label">CLASS</div><div>${s.class}</div></div><div><div class="info-label">PARENT</div><div>${s.parent_name || 'N/A'}</div></div></div></div><table class="report-table"><thead><tr><th>SUBJECT</th>${exams.map(e => `<th>${e}</th>`).join('')}th</thead><tbody>${rows}</tbody></table>><div class="comments-section"><div class="comment-box"><div class="comment-title">CLASS TEACHER'S COMMENT</div><div style="height: 50px;"></div><div>Signature: ____________________</div><div>Date: ___________</div></div><div class="comment-box"><div class="comment-title">HEAD TEACHER'S COMMENT</div><div style="height: 50px;"></div><div>Signature: ____________________</div><div>Date: ___________</div></div></div><div style="text-align:center; margin-top:20px;">Generated on ${new Date().toLocaleString()}</div></div>`;
    }
    html += `</body></html>`;
    let win = window.open('', '_blank');
    win.document.write(html);
    win.document.close();
    win.print();
    showToast(`Printed ${selected.length} report(s)`);
}

// ========== MAIN APP ==========

    await loadAllData();
    document.getElementById('app').innerHTML = `
        <div style="position:fixed; top:16px; right:20px; z-index:100;"><span class="role-badge"><i class="fas fa-user-shield"></i> ADMIN</span><button class="logout-btn" onclick="logout()"><i class="fas fa-sign-out-alt"></i> Logout</button></div>
        <div class="app-container">
            <div class="header"><div class="school-name"><i class="fas fa-school"></i> PROGRESSIVE MOTHERS NUR. & PRIMARY SCHOOL</div><div class="school-address">P.O BOX ......, KAMPALA - UGANDA | 📞 0756 585035 / 0779 585035</div></div>
            <div class="nav-tabs">
                <button class="nav-tab ${activeModule === 'dashboard' ? 'active' : ''}" onclick="switchModule('dashboard')"><i class="fas fa-tachometer-alt"></i> Dashboard</button>
                <button class="nav-tab ${activeModule === 'students' ? 'active' : ''}" onclick="switchModule('students')"><i class="fas fa-user-graduate"></i> Students</button>
                <button class="nav-tab ${activeModule === 'attendance' ? 'active' : ''}" onclick="switchModule('attendance')"><i class="fas fa-calendar-check"></i> Attendance</button>
                <button class="nav-tab ${activeModule === 'marks' ? 'active' : ''}" onclick="switchModule('marks')"><i class="fas fa-chart-line"></i> Marks</button>
                <button class="nav-tab ${activeModule === 'fees' ? 'active' : ''}" onclick="switchModule('fees')"><i class="fas fa-money-bill-wave"></i> Fees</button>
                <button class="nav-tab ${activeModule === 'reports' ? 'active' : ''}" onclick="switchModule('reports')"><i class="fas fa-print"></i> Reports</button>
            </div>
            <div id="moduleContent"></div>
        </div>
    `;
    if (activeModule === 'dashboard') await renderDashboard();
    else if (activeModule === 'students') await renderStudents();
    else if (activeModule === 'attendance') await renderAttendance();
    else if (activeModule === 'marks') await renderMarks();
    else if (activeModule === 'fees') await renderFees();
    else if (activeModule === 'reports') await renderReports();
}

function switchModule(module) { activeModule = module; renderMainApp(); }
function logout() { currentUser = null; sessionStorage.removeItem('school_user'); renderLogin(); }
function renderLogin() {
    document.getElementById('app').innerHTML = `<div class="login-container"><i class="fas fa-school fa-4x" style="color:#1a2a6c;"></i><h2>PROGRESSIVE MOTHERS SCHOOL</h2><p>Complete Management System</p><input type="text" id="username" placeholder="Username"><input type="password" id="password" placeholder="Password"><button onclick="doLogin()">Login</button><p style="margin-top:20px;">Demo: admin / admin123</p></div>`;
}
function doLogin() { let u = document.getElementById('username').value, p = document.getElementById('password').value; if (u === 'admin' && p === 'admin123') { currentUser = { username: 'admin' }; sessionStorage.setItem('school_user', JSON.stringify(currentUser)); renderMainApp(); } else alert('Invalid credentials! Use admin / admin123'); }
function init() { let saved = sessionStorage.getItem('school_user'); if (saved) { currentUser = JSON.parse(saved); renderMainApp(); } else renderLogin(); }
init();
</script>
