function formatMoney(amt) { return 'UGX ' + (amt || 0).toLocaleString(); }

function generateUniqueLIN(firstName, existingLINs) {
    let prefix = 'PM';
    let firstLetter = firstName ? firstName.charAt(0).toUpperCase() : 'X';
    let baseLIN = prefix + firstLetter;
    let newLIN = '';
    let isUnique = false;
    let attempts = 0;
    while (!isUnique && attempts < 100) {
        let randomNum = Math.floor(1000 + Math.random() * 9000);
        newLIN = baseLIN + randomNum;
        if (!existingLINs.includes(newLIN)) isUnique = true;
        attempts++;
    }
    return newLIN;
}

function isDuplicateStudent(firstName, lastName, parentWhatsapp, excludeId = null) {

}

function filterStudents(list) {
    if (!searchTerm.trim()) return list;

        `${s.first_name} ${s.last_name}`.toLowerCase().includes(term) ||
        (s.lin || '').toLowerCase().includes(term) ||
        (s.payment_code || '').toLowerCase().includes(term) ||
        (s.class || '').toLowerCase().includes(term) ||
        (s.parent_name || '').toLowerCase().includes(term)
    );
}

// Supabase API with better error handling
async function supabaseFetch(table, filter = '') {
    try {
        let url = `${SUPABASE_URL}/rest/v1/${table}?select=*${filter}`;
        let res = await fetch(url, {
            headers: { 'apikey': SUPABASE_KEY, 'Authorization': `Bearer ${SUPABASE_KEY}` }
        });
        if (!res.ok) return [];
        let text = await res.text();
        if (!text) return [];
        return JSON.parse(text);
    } catch (e) {
        console.error(`Error fetching ${table}:`, e);
        return [];
    }
}

async function supabaseInsert(table, data) {
    try {
        let res = await fetch(`${SUPABASE_URL}/rest/v1/${table}`, {
            method: 'POST',
            headers: { 'apikey': SUPABASE_KEY, 'Authorization': `Bearer ${SUPABASE_KEY}`, 'Content-Type': 'application/json' },
            body: JSON.stringify(data)
        });
        if (!res.ok) throw new Error(`HTTP ${res.status}`);
        let text = await res.text();
        if (!text) return true;
        return JSON.parse(text);
    } catch (e) {
        console.error(`Insert error:`, e);
        showToast(`Error saving: ${e.message}`, true);
        return null;
    }
}

async function supabaseUpdate(table, id, data) {
    try {
        let res = await fetch(`${SUPABASE_URL}/rest/v1/${table}?id=eq.${id}`, {
            method: 'PATCH',
            headers: { 'apikey': SUPABASE_KEY, 'Authorization': `Bearer ${SUPABASE_KEY}`, 'Content-Type': 'application/json' },
            body: JSON.stringify(data)
        });
        if (!res.ok) {
            let errorText = await res.text();
            console.error('Update error response:', errorText);
            throw new Error(`HTTP ${res.status}: ${errorText}`);
        }
        // Try to parse response, but if empty, return success
        let text = await res.text();
        if (!text) return true;
        return JSON.parse(text);
    } catch (e) {
        console.error(`Update error:`, e);
        showToast(`Error updating: ${e.message}`, true);
        return null;
    }
}

async function supabaseDelete(table, id) {
    try {
        let res = await fetch(`${SUPABASE_URL}/rest/v1/${table}?id=eq.${id}`, {
            method: 'DELETE',
            headers: { 'apikey': SUPABASE_KEY, 'Authorization': `Bearer ${SUPABASE_KEY}` }
        });
        if (!res.ok) throw new Error(await res.text());
        return true;
    } catch (e) {
        console.error(`Delete error:`, e);
        return false;
    }
}

window.saveNewStudent = async function() {
    let first = document.getElementById('newFirstName').value.trim();
    let last = document.getElementById('newLastName').value.trim();
    let lin = document.getElementById('newLin').value.trim().toUpperCase();
    let paymentCode = document.getElementById('newPaymentCode').value.trim().toUpperCase();
    let parentWhatsapp = document.getElementById('newParentWhatsapp').value.trim();
    
    if (!first || !last) { showToast('First and Last name required', true); return; }
    if (!paymentCode) paymentCode = `PAY${Math.floor(1000 + Math.random() * 9000)}`;
    
    if (isDuplicateStudent(first, last, parentWhatsapp)) {
        showToast(`Student ${first} ${last} with same parent WhatsApp already exists!`, true);
        return;
    }
    
    let newStudent = {
        id: crypto.randomUUID(),
        school_id: SCHOOL_ID,
        first_name: first,
        last_name: last,
        lin: lin,
        payment_code: paymentCode,
        class: document.getElementById('newClass').value,
        parent_name: document.getElementById('newParentName').value,
        parent_whatsapp: parentWhatsapp,
        total_fees: parseFloat(document.getElementById('newTotalFees').value) || 0,
        academic_year: document.getElementById('newAcademicYear').value,
        photo_url: ''
    };
    
    let result = await supabaseInsert('students', newStudent);
    if (result !== null) {
        await loadAllData();
        await renderStudents();
        document.querySelector('.modal')?.remove();
        showToast('Student added successfully');
    }
};

window.updateStudent = async function(id) {
    let updates = {
        first_name: document.getElementById('editFirstName').value,
        last_name: document.getElementById('editLastName').value,
        payment_code: document.getElementById('editPaymentCode').value.trim().toUpperCase(),
        class: document.getElementById('editClass').value,
        parent_name: document.getElementById('editParentName').value,
        parent_whatsapp: document.getElementById('editParentWhatsapp').value,
        total_fees: parseFloat(document.getElementById('editTotalFees').value) || 0,
        academic_year: document.getElementById('editAcademicYear').value
    };
    
    // Remove undefined fields
    Object.keys(updates).forEach(key => updates[key] === undefined && delete updates[key]);
    
    console.log('Updating student with data:', updates);
    
    let result = await supabaseUpdate('students', id, updates);
    if (result !== null) {
        await loadAllData();
        await renderStudents();
        document.querySelector('.modal')?.remove();
        showToast('Student updated successfully');
    }
};

window.deleteStudent = async function(id) {
    if (confirm('Are you sure you want to delete this student? This action cannot be undone.')) {
        let studentMarks = marks.filter(m => m.student_id === id);
        for (let m of studentMarks) await supabaseDelete('marks', m.id);
        let studentAttendance = attendance.filter(a => a.student_id === id);
        for (let a of studentAttendance) await supabaseDelete('attendance', a.id);
        let studentPayments = payments.filter(p => p.student_id === id);
        for (let p of studentPayments) await supabaseDelete('payments', p.id);
        await supabaseDelete('students', id);
        await loadAllData();
        await renderStudents();
        showToast('Student deleted');
    }
};

async function renderAttendance() {

            </div>
            <div id="attList"></div>
        </div>
    `;
    
    document.getElementById('loadAttBtn').onclick = async () => {
        let cls = document.getElementById('attClass').value;
        let date = document.getElementById('attDate').value;
        let classStd = students.filter(s => s.class === cls);
        let existing = await supabaseFetch('attendance', `&date=eq.${date}&status=eq.absent&school_id=eq.${SCHOOL_ID}`);
        let absentSet = new Set(existing.map(a => a.student_id));
        let tbl = `<table class="data-table"><thead><tr><th>Photo</th><th>Student</th><th>LIN</th><th>Payment Code</th><th>Mark Absent</th></tr></thead><tbody>`;
        for (let s of classStd) {
            tbl += `<tr><td class="student-photo-cell"><div class="student-photo-img">${s.photo_url ? `<img src="${s.photo_url}" style="width:40px;height:40px;border-radius:50%;">` : `<i class="fas fa-user-circle"></i>`}</div></td>
                    <td>${s.first_name} ${s.last_name}</td>
                    <td>${s.lin}</td>
                    <td>${s.payment_code || s.lin}</td>
                    <td><input type="checkbox" class="absent-cb" data-id="${s.id}" ${absentSet.has(s.id) ? 'checked' : ''}></td>
                </tr>`;
        }
        tbl += `</tbody><tr>`;
        document.getElementById('attList').innerHTML = tbl;
    };
    
    document.getElementById('saveAttBtn').onclick = async () => {
        let date = document.getElementById('attDate').value;
        let cbs = document.querySelectorAll('.absent-cb');
        for (let cb of cbs) {
            let sid = cb.dataset.id;
            let exist = await supabaseFetch('attendance', `&student_id=eq.${sid}&date=eq.${date}`);

            }

        await loadAllData();
    };

}

async function renderMarks() {
    let opts = [...new Set(students.map(s => s.class))];

            <div class="section-title"><i class="fas fa-chart-simple"></i> Marks Entry</div>

                <select id="marksClass" class="form-control">${opts.map(c => `<option>${c}</option>`).join('')}</select>

                <button class="btn btn-gold" id="saveMarks">Save</button>
            </div>
            <div id="marksGrid"></div>
        </div>
    `;
    
    document.getElementById('loadMarks').onclick = async () => {
        let cls = document.getElementById('marksClass').value;
        let term = document.getElementById('marksTerm').value;
        let exam = document.getElementById('marksExam').value;
        let classStd = students.filter(s => s.class === cls);
        let subs = SUBJECT_MAP[cls] || [];
        let relMarks = marks.filter(m => m.term === term && m.exam_type === exam && m.academic_year === CURRENT_ACADEMIC_YEAR);
        let grid = `<table class="data-table"><thead><tr><th>Student</th><th>Photo</th><th>Payment Code</th>${subs.map(s => `<th>${s}</th>`).join('')}</thead><tbody>`;
        for (let s of classStd) {
            grid += `<tr>
                <td><strong>${s.first_name} ${s.last_name}</strong></td>
                <td class="student-photo-cell"><div class="student-photo-img">${s.photo_url ? `<img src="${s.photo_url}" style="width:40px;height:40px;border-radius:50%;">` : `<i class="fas fa-user-circle"></i>`}</div></td>
                <td>${s.payment_code || s.lin}</td>`;
            for (let sub of subs) {
                let mk = relMarks.find(m => m.student_id === s.id && m.subject === sub);
                grid += `<td><input type="number" class="mark-input" data-student="${s.id}" data-subject="${sub}" value="${mk ? mk.score : ''}" style="width:75px;"></td>`;
            }
            grid += `</tr>`;
        }
        grid += `</tbody></table>`;
        document.getElementById('marksGrid').innerHTML = grid;
    };
    
    document.getElementById('saveMarks').onclick = async () => {
        let term = document.getElementById('marksTerm').value;
        let exam = document.getElementById('marksExam').value;
        let inputs = document.querySelectorAll('.mark-input');
        for (let inp of inputs) {
            let score = parseInt(inp.value);
            if (!isNaN(score) && score >= 0 && score <= 100) {
                let sid = inp.dataset.student;
                let subj = inp.dataset.subject;
                let existing = marks.find(m => m.student_id === sid && m.subject === subj && m.term === term && m.exam_type === exam && m.academic_year === CURRENT_ACADEMIC_YEAR);
                if (existing) await supabaseUpdate('marks', existing.id, { score });
                else await supabaseInsert('marks', { id: crypto.randomUUID(), school_id: SCHOOL_ID, student_id: sid, subject: subj, score, term, exam_type: exam, academic_year: CURRENT_ACADEMIC_YEAR });
            }
        }
        showToast('Marks saved');
        await loadAllData();
    };
    document.getElementById('loadMarks').click();
}

        <div class="card-modern">
            <div class="section-title"><i class="fas fa-chart-pie"></i> Financial Overview</div>

                <div class="stat-tile"><div class="stat-digit">${formatMoney(totalInc)}</div><div class="stat-caption">Income (${CURRENT_ACADEMIC_YEAR})</div></div>
                <div class="stat-tile"><div class="stat-digit">${formatMoney(totalExp)}</div><div class="stat-caption">Expected</div></div>
                <div class="stat-tile"><div class="stat-digit">${formatMoney(totalExp - totalInc)}</div><div class="stat-caption">Outstanding</div></div>

            <div class="whatsapp-preview"><i class="fab fa-whatsapp"></i> <strong>Message Preview</strong><pre>${generalMsg}</pre></div>

            <div class="data-wrapper">${balHtml}</div>

window.recordPayment = async (sid) => {
    let amt = prompt('Enter payment amount (UGX):');
    if (amt && !isNaN(parseFloat(amt)) && parseFloat(amt) > 0) {
        await supabaseInsert('payments', { id: crypto.randomUUID(), school_id: SCHOOL_ID, student_id: sid, amount: parseFloat(amt), payment_date: new Date().toISOString().slice(0, 10), receipt_number: `RCP-${Date.now()}`, term: 'Term I', academic_year: CURRENT_ACADEMIC_YEAR });
        await loadAllData();
        await renderFees();
        showToast('Payment recorded');
    } else showToast('Invalid amount', true);
};

window.sendSingleFeeReminder = (sid) => {
    let s = students.find(st => st.id === sid);
    if (!s) return;
    let paid = payments.filter(p => p.student_id === sid && p.academic_year === CURRENT_ACADEMIC_YEAR).reduce((a, b) => a + (b.amount || 0), 0);
    let bal = (s.total_fees || 0) - paid;
    let msg = `Good evening ${s.parent_name || 'Parent'},\n\nYour child ${s.first_name} ${s.last_name} (LIN: ${s.lin}) has a fee balance of ${formatMoney(bal)} for ${CURRENT_ACADEMIC_YEAR}.\n\nPlease clear tomorrow.\nAccounts Department.`;
    if (s.parent_whatsapp) sendWhatsApp(s.parent_whatsapp, msg);
    else showToast('No WhatsApp', true);
};

        let headerChk = document.getElementById('headerCheckAll');

                <h2 style="text-align:center">PROGRESSIVE MOTHERS SCHOOL</h2>

                <h3 style="text-align:center">STUDENT REPORT - ${term} (${CURRENT_ACADEMIC_YEAR})</h3>
                <div style="display:flex; gap:20px; margin:20px 0">
                    <div style="width:100px;height:100px;background:#eee;border-radius:50%;display:flex;align-items:center;justify-content:center"><i class="fas fa-user-graduate fa-3x"></i></div>
                    <div>
                        <p><strong>Name:</strong> ${s.first_name} ${s.last_name}</p>
                        <p><strong>LIN:</strong> ${s.lin}</p>
                        <p><strong>Payment Code:</strong> ${s.payment_code || s.lin}</p>
                        <p><strong>Class:</strong> ${s.class}</p>
                        <p><strong>Parent:</strong> ${s.parent_name || 'N/A'}</p>
                    </div>
                    <div>
                        <p><strong>Total Fees:</strong> ${formatMoney(s.total_fees || 0)}</p>
                        <p><strong>Paid:</strong> ${formatMoney(paid)}</p>
                        <p><strong>Balance:</strong> ${formatMoney(bal)}</p>
                    </div>
                </div>
                <div class="comment-panel" style="display:flex; gap:30px; margin-top:30px">
                    <div style="flex:1; border-top:1px dashed #ccc; padding-top:15px"><strong>CLASS TEACHER'S COMMENT</strong><div style="height:40px"></div>Signature: _______________</div>
                    <div style="flex:1; border-top:1px dashed #ccc; padding-top:15px"><strong>HEAD TEACHER'S COMMENT</strong><div style="height:40px"></div>Signature: _______________</div>
                </div>
                <div style="text-align:center; margin-top:20px">Generated on ${new Date().toLocaleString()}</div>
            </div>
        `;
    }
    html += `</body></html>`;
    let win = window.open('', '_blank');
    win.document.write(html);
    win.document.close();
    win.print();
    showToast(`Printed ${selected.length} report(s)`);
}

// ==================== MAIN APPLICATION ====================
async function renderMainApp() {
    await loadAllData();
    
    let perms = ROLE_PERMISSIONS[currentUser?.role];
    let availableViews = ['dashboard'];
    if (perms?.students) availableViews.push('students');
    if (perms?.attendance) availableViews.push('attendance');
    if (perms?.marks) availableViews.push('marks');
    if (perms?.fees) availableViews.push('fees');
    if (perms?.reports) availableViews.push('reports');
    if (!availableViews.includes(activeView)) activeView = 'dashboard';
    
    const appDiv = document.getElementById('root');
    appDiv.innerHTML = `
        <div class="role-badge"><i class="fas fa-user-tag"></i> ${currentUser.role.toUpperCase()} <button class="logout-icon" onclick="logoutApp()"><i class="fas fa-sign-out-alt"></i> Exit</button></div>
        <div class="app-wrapper">
            <div class="hero-header">
                <div class="school-title"><i class="fas fa-school"></i> PROGRESSIVE MOTHERS NUR. & PRIMARY SCHOOL</div>
                <div class="school-motto"><i class="fas fa-map-marker-alt"></i> Gayaza-Kijabijjo, Kampala | 📞 0756 585035 / 0779 585035</div>
            </div>
            <div class="nav-ribbon">
                ${availableViews.map(v => `<button class="nav-pill ${activeView === v ? 'active' : ''}" onclick="switchView('${v}')"><i class="fas ${v === 'dashboard' ? 'fa-tachometer-alt' : v === 'students' ? 'fa-user-graduate' : v === 'attendance' ? 'fa-calendar-check' : v === 'marks' ? 'fa-chart-line' : v === 'fees' ? 'fa-coins' : 'fa-print'}"></i> ${v.charAt(0).toUpperCase() + v.slice(1)}</button>`).join('')}
            </div>
            <div id="mainContent"></div>
        </div>
    `;
    
    if (activeView === 'dashboard') await renderDashboard();
    else if (activeView === 'students') await renderStudents();
    else if (activeView === 'attendance') await renderAttendance();
    else if (activeView === 'marks') await renderMarks();
    else if (activeView === 'fees') await renderFees();
    else if (activeView === 'reports') await renderReports();
}

function switchView(view) { activeView = view; renderMainApp(); }
function logoutApp() { currentUser = null; sessionStorage.removeItem('progressive_user'); showLogin(); }

function showLogin() {
    document.getElementById('root').innerHTML = `
        <div class="login-screen">
            <i class="fas fa-school fa-3x" style="color:#0b2b5c"></i>
            <h2 style="margin:20px 0">Progressive Mothers School</h2>
            <p style="margin-bottom:25px">Complete Management System</p>
            <input type="text" id="loginUsername" placeholder="Username">
            <input type="password" id="loginPassword" placeholder="Password">
            <button onclick="doLogin()"><i class="fas fa-arrow-right"></i> Login</button>
        </div>
    `;
}

function doLogin() {
    let u = document.getElementById('loginUsername').value;
    let p = document.getElementById('loginPassword').value;
    if (u === 'admin' && p === 'admin123') { currentUser = { username: 'admin', role: 'admin' }; sessionStorage.setItem('progressive_user', JSON.stringify(currentUser)); renderMainApp(); }
    else if (u === 'teacher' && p === 'teacher123') { currentUser = { username: 'teacher', role: 'teacher' }; sessionStorage.setItem('progressive_user', JSON.stringify(currentUser)); renderMainApp(); }
    else if (u === 'finance' && p === 'finance123') { currentUser = { username: 'finance', role: 'finance' }; sessionStorage.setItem('progressive_user', JSON.stringify(currentUser)); renderMainApp(); }
    else alert('Invalid credentials. Use admin/admin123, teacher/teacher123, finance/finance123');
}

function init() {
    let saved = sessionStorage.getItem('progressive_user');
    if (saved) { currentUser = JSON.parse(saved); renderMainApp(); }
    else showLogin();
}
init();
</script>
