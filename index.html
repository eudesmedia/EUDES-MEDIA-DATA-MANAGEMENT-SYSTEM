        function compressImage(file, callback) {
            const reader = new FileReader();
            reader.onload = function(e) {
                const img = new Image();
                img.onload = function() {
                    const canvas = document.createElement('canvas');
                    let width = img.width, height = img.height;
                    const maxSize = 200;
                    if (width > height) {
                        if (width > maxSize) {
                            height = (height * maxSize) / width;
                            width = maxSize;
                        }
                    } else {
                        if (height > maxSize) {
                            width = (width * maxSize) / height;
                            height = maxSize;
                        }
                    }
                    canvas.width = width;
                    canvas.height = height;
                    const ctx = canvas.getContext('2d');
                    ctx.drawImage(img, 0, 0, width, height);
                    canvas.toBlob(callback, 'image/jpeg', 0.7);
                };
                img.src = e.target.result;
            };
            reader.readAsDataURL(file);
        }

        // -------------------- SUPABASE HELPERS --------------------
        async function restFetch(table, query = '') {
            const url = `${SUPABASE_URL}/rest/v1/${table}?select=*${query ? `&${query}` : ''}`;
            const res = await fetch(url, {
                headers: { 'apikey': SUPABASE_KEY, 'Authorization': `Bearer ${SUPABASE_KEY}` }
            });
            if (!res.ok) throw new Error(await res.text());
            return res.json();

        async function restInsert(table, data) {
            const res = await fetch(`${SUPABASE_URL}/rest/v1/${table}`, {
                method: 'POST',
                headers: { 'apikey': SUPABASE_KEY, 'Authorization': `Bearer ${SUPABASE_KEY}`, 'Content-Type': 'application/json' },
                body: JSON.stringify(data)
            });
            if (!res.ok) {
                const errText = await res.text();
                throw new Error(`Insert failed: ${errText}`);
            }
            return res.json().catch(() => ({}));
        }
        
        async function restUpdate(table, id, data) {
            const res = await fetch(`${SUPABASE_URL}/rest/v1/${table}?id=eq.${id}`, {
                method: 'PATCH',
                headers: { 'apikey': SUPABASE_KEY, 'Authorization': `Bearer ${SUPABASE_KEY}`, 'Content-Type': 'application/json' },
                body: JSON.stringify(data)
            });
            if (!res.ok) {
                const errText = await res.text();
                throw new Error(`Update failed: ${errText}`);
            }
            return res.json();
        }

                        previewDiv.innerHTML = `<img src="${ev.target.result}" class="photo-preview">`;

        async function saveMark(markData) {

            const existing = await restFetch('marks', 
                `student_id=eq.${student_id}&subject=eq.${subject}&term=eq.${term}&exam_type=eq.${exam_type}&school_id=eq.${school_id}`);

        async function renderMarks() {
            const container = document.getElementById('tabContent');

                        <select id="reportStudent">${students.map(s => `<option value="${s.id}">${s.first_name} ${s.last_name} (${s.class})</option>`).join('')}</select>
                        <select id="reportTerm">${TERMS.map(t => `<option>${t}</option>`).join('')}</select>
                        <select id="reportExam">${EXAM_TYPES.map(e => `<option>${e}</option>`).join('')}</select>
                        <button class="btn" id="genReportBtn">Generate Report</button>

            const loadMarksGrid = async () => {
                const className = document.getElementById('marksClass').value;
                const term = document.getElementById('marksTerm').value;
                const examType = document.getElementById('marksExam').value;
                let classStudents = students.filter(s => s.class === className);
                classStudents = classStudents.filter(s => 
                    (s.first_name + ' ' + s.last_name).toLowerCase().includes(globalSearchTerm.toLowerCase()) ||
                    (s.lin || '').toLowerCase().includes(globalSearchTerm.toLowerCase())
                );
                if (!classStudents.length) {
                    document.getElementById('marksGrid').innerHTML = '<div class="p-4 text-center">No students in this class</div>';
                    return;
                }
                await loadAll();
                const relevantMarks = marks.filter(m => m.term === term && m.exam_type === examType);
                const markMap = new Map();
                relevantMarks.forEach(m => markMap.set(`${m.student_id}_${m.subject}`, m));
                let html = `<table class="min-w-full border"><thead><tr><th>Student (LIN)</th>${CORE_SUBJECTS.map(s => `<th>${s}</th>`).join('')}</thead><tbody>`;
                for (let s of classStudents) {
                    html += `<tr><td class="p-2 font-medium">${escapeHtml(s.first_name)} ${escapeHtml(s.last_name)}<br><span class="text-xs">${s.lin}</span></td>`;
                    for (let sub of CORE_SUBJECTS) {
                        const existing = markMap.get(`${s.id}_${sub}`);
                        const val = existing ? existing.score : '';
                        html += `<td class="p-2"><input type="number" class="mark-input" data-student="${s.id}" data-subject="${sub}" value="${val}" min="0" max="100"> <span class="text-xs">${existing ? existing.grade : ''}</span></td>`;
                    }
                    html += `</tr>`;

                html += `</tbody><tr>`;
                document.getElementById('marksGrid').innerHTML = html;
            };

            document.getElementById('loadMarksBtn').onclick = loadMarksGrid;
            document.getElementById('saveMarksBtn').onclick = async () => {
                const term = document.getElementById('marksTerm').value;
                const examType = document.getElementById('marksExam').value;
                const inputs = document.querySelectorAll('.mark-input');
                let success = 0, errors = 0;
                for (let inp of inputs) {
                    const studentId = inp.dataset.student;
                    const subject = inp.dataset.subject;
                    const raw = inp.value.trim();
                    if (raw === "") continue;
                    const score = parseInt(raw);
                    if (isNaN(score) || score < 0 || score > 100) {
                        errors++;
                        showToast(`Invalid score for ${subject} (0-100)`, true);
                        continue;
                    }
                    const grade = getGrade(score);
                    try {
                        await saveMark({ school_id: SCHOOL_ID, student_id: studentId, subject, score, grade, term, exam_type: examType });
                        success++;
                    } catch(e) { 
                        errors++;
                        console.error(e);
                        showToast(`Error saving ${subject}`, true);

            document.getElementById('genReportBtn').onclick = async () => {

                const student = students.find(s => s.id === studentId);

                await loadAll();
                let examsToShow = [];
                if (examTarget === 'Beginning of Term') examsToShow = ['Beginning of Term'];
                else if (examTarget === 'Mid Term') examsToShow = ['Beginning of Term', 'Mid Term'];
                else examsToShow = ['Beginning of Term', 'Mid Term', 'End of Term'];
                const studentMarks = marks.filter(m => m.student_id === studentId && m.term === term);
                let rows = '', totals = {}, pointsList = {};
                for (let sub of CORE_SUBJECTS) {
                    rows += `<tr><td class="p-2 font-bold">${sub}</td>`;
                    for (let ex of examsToShow) {
                        const m = studentMarks.find(m => m.subject === sub && m.exam_type === ex);
                        const score = m ? m.score : '-';
                        const grade = m ? m.grade : '-';
                        rows += `<td class="p-2 text-center">${score}<br><small>${grade}</small></td>`;
                        if (m) {
                            totals[ex] = (totals[ex] || 0) + m.score;
                            if (!pointsList[ex]) pointsList[ex] = [];
                            pointsList[ex].push(gradePoints(m.grade));
                        }
                    }
                    rows += `</tr>`;
                }
                let summary = `<tr class="bg-gray-100"><td class="p-2 font-bold">Total/Agg</td>`;
                for (let ex of examsToShow) {
                    let total = totals[ex] || 0;
                    let agg = 0;
                    if (pointsList[ex]) {
                        let sorted = [...pointsList[ex]].sort((a,b)=>a-b);
                        agg = sorted.slice(0,8).reduce((s,p)=>s+p,0);
                    }
                    summary += `<td class="p-2 text-center">${total}/400<br><small>Agg: ${agg}</small></td>`;
                }
                summary += `<tr><tr class="bg-gray-50"><td class="p-2 font-bold">Division</td>`;
                for (let ex of examsToShow) {
                    let agg = 0;
                    if (pointsList[ex]) {
                        let sorted = [...pointsList[ex]].sort((a,b)=>a-b);
                        agg = sorted.slice(0,8).reduce((s,p)=>s+p,0);
                    }
                    summary += `<td class="p-2 text-center">${getDivision(agg)}</td>`;
                }
                summary += `</tr>`;
                const photoHtml = student.photo_url ? `<img src="${student.photo_url}" width="70" style="border-radius:50%">` : '<div style="width:70px;height:70px;background:#eef;border-radius:50%;display:flex;align-items:center;justify-content:center;">📷</div>';
                const reportHtml = `
                    <div class="report-card">
                        <div class="report-header"><h2>${escapeHtml(currentSchool.name)}</h2><p>${currentSchool.address} | ${SCHOOL_CONTACTS.join(', ')}</p><p>${term} | ${examTarget} Cumulative Report</p></div>
                        <div class="flex gap-3 items-center mb-3">${photoHtml}<div><strong>${student.first_name} ${student.last_name}</strong><br>LIN: ${student.lin}<br>Class: ${student.class}</div></div>
                        <table class="w-full border"><thead><tr><th>Subject</th>${examsToShow.map(e=>`<th>${e}</th>`).join('')}</thead><tbody>${rows}${summary}</tbody>}结合
                        <div class="text-center text-xs mt-3">Generated: ${new Date().toLocaleString()}</div>
                    </div>
                `;
                document.getElementById('reportPreview').innerHTML = reportHtml;
            };
            document.getElementById('downloadReportBtn').onclick = () => {
                const preview = document.getElementById('reportPreview');
                if (!preview.innerHTML) return showToast("Generate a report first", true);
                const win = window.open('', '_blank');
                win.document.write(`<html><head><title>Report Card</title><style>body{font-family:Inter;padding:20px}table{border-collapse:collapse;width:100%}td,th{border:1px solid #ccc;padding:8px}</style></head><body>${preview.innerHTML}</body></html>`);
                win.document.close();
                win.print();
            };
            await loadMarksGrid();
        }

            else if (activeTab === 'fees') await renderFees();
            else if (activeTab === 'reports') await renderReports();
            else if (activeTab === 'idcards') await renderIdCards();
        }

        window.showSupportWhatsApp = () => { SUPPORT_CONTACTS.forEach(c => sendWhatsApp(c.whatsapp, `Support for ${currentSchool?.name}`)); };
        window.logout = logout;

        function renderLogin() {
            document.getElementById('app').innerHTML = `
                <div class="login-container">
                    <h2><i class="fas fa-school"></i> School Management</h2>
                    <form id="loginForm">
                        <input type="text" id="username" placeholder="Username" required>
                        <input type="password" id="password" placeholder="Password" required>
                        <button type="submit" class="btn w-full">Login</button>
                    </form>
                    <div class="text-center text-xs mt-3">admin/admin123 | teacher/teacher123 | finance/finance123</div>
                </div>
            `;
            document.getElementById('loginForm').onsubmit = (e) => {
                e.preventDefault();
                if (login(document.getElementById('username').value, document.getElementById('password').value)) init();
                else alert('Invalid credentials');
            };
        }

        async function init() {
            if (!checkAuth()) { renderLogin(); return; }
            try {
                const schools = await restFetch('schools', `id=eq.${SCHOOL_ID}`).catch(e => []);
                if (!schools.length) {
                    await restInsert('schools', { id: SCHOOL_ID, name: 'Progressive Mothers School', address: 'Gayaza-Kijabijjo', phone: '0779585035' });
                    currentSchool = { name: 'Progressive Mothers School', address: 'Gayaza-Kijabijjo', phone: '0779585035' };
                } else {
                    currentSchool = schools[0];
                }
                await renderMainApp();
            } catch(err) {
                document.getElementById('app').innerHTML = `<div class="bg-red-100 p-4 rounded-xl">Error: ${err.message}</div>`;
            }
        }
        init();
    })();
</script>
</body>
</html>
