<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>EUDES MEDIA | Recovery Portal</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #003366; color: white; text-align: center; padding: 50px; }
        .card { background: white; color: #333; padding: 30px; border-radius: 15px; display: inline-block; width: 350px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        .status-box { padding: 15px; margin: 20px 0; border-radius: 8px; font-weight: bold; background: #f0f0f0; border: 1px solid #ccc; }
        .btn { background: #003366; color: white; border: none; padding: 15px; border-radius: 8px; cursor: pointer; width: 100%; font-weight: bold; }
        #error-log { color: red; font-size: 11px; margin-top: 10px; text-align: left; }
    </style>
</head>
<body>

<div class="card">
    <h1 style="color:#003366; margin:0;">EUDES MEDIA</h1>
    <p style="color:#666;">Database Troubleshooter</p>
    
    <div id="status" class="status-box">⏳ INITIALIZING...</div>
    
    <button class="btn" id="regBtn" onclick="addStudent()">+ REGISTER STUDENT</button>

    <div id="error-log"></div>
    <p style="font-size: 11px; margin-top: 15px; color: #999;">Support: +256762992440</p>
</div>

<script>
    const S_URL = 'https://qtvkasgnrftajqrrcgsg.supabase.co/rest/v1/students';
    const S_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InF0dmthc2ducmZ0YWpxcnJjZ3NnIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzczMTM5ODksImV4cCI6MjA5Mjg4OTk4OX0.gw1-WKC2ccGRXl1O74v1TaHu2DzwSlVTCaQHv6bsYcg';
    
    const statusDiv = document.getElementById('status');
    const logDiv = document.getElementById('error-log');

    // 1. Check connection immediately
    async function checkConnection() {
        try {
            const response = await fetch(S_URL + '?select=count', {
                method: 'GET',
                headers: { 'apikey': S_KEY, 'Authorization': 'Bearer ' + S_KEY }
            });
            
            if (response.ok) {
                statusDiv.innerHTML = "✅ SYSTEM ONLINE";
                statusDiv.style.color = "green";
            } else {
                const err = await response.json();
                statusDiv.innerHTML = "❌ DB ERROR";
                logDiv.innerText = "Database said: " + (err.message || "Unknown Error");
            }
        } catch (e) {
            statusDiv.innerHTML = "❌ NETWORK BLOCKED";
            logDiv.innerText = "Your internet/browser is blocking the link to Supabase.";
        }
    }

    // 2. Add Student using Direct Fetch (No libraries needed)
    async function addStudent() {
        const name = prompt("Enter Student Full Name:");
        if (!name) return;

        statusDiv.innerText = "Saving...";
        
        try {
            const response = await fetch(S_URL, {
                method: 'POST',
                headers: {
                    'apikey': S_KEY,
                    'Authorization': 'Bearer ' + S_KEY,
                    'Content-Type': 'application/json',
                    'Prefer': 'return=minimal'
                },
                body: JSON.stringify({ 
                    name: name, 
                    lin: "LIN-" + Math.floor(1000 + Math.random() * 8999),
                    total_fees: 350000,
                    fees_paid: 0
                })
            });

            if (response.ok) {
                statusDiv.innerText = "✅ SAVED SUCCESSFULLY!";
                alert("Success! " + name + " has been added.");
                checkConnection(); 
            } else {
                const err = await response.json();
                alert("Failed to save: " + err.message);
            }
        } catch (e) {
            alert("Network Error: Could not reach the server.");
        }
    }

    // Start check
    checkConnection();
</script>

</body>
</html>
