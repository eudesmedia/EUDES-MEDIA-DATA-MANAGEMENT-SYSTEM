<!DOCTYPE html>
<html>
<head>
    <title>EUDES MEDIA DIAGNOSTIC</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { font-family: sans-serif; background: #003366; color: white; text-align: center; padding: 50px; }
        .card { background: white; color: #333; padding: 30px; border-radius: 10px; display: inline-block; width: 350px; }
        #status { font-weight: bold; padding: 15px; margin: 10px; border: 1px solid #ccc; background: #eee; }
        .btn { background: #003366; color: white; padding: 15px; width: 100%; border: none; border-radius: 5px; cursor: pointer; }
    </style>
</head>
<body>
    <div class="card">
        <h1>EUDES MEDIA</h1>
        <div id="status">Testing Connection...</div>
        <button class="btn" onclick="runTest()">CLICK TO REGISTER</button>
        <p id="msg" style="margin-top:15px; font-size:12px; color:red;"></p>
    </div>

    <script>
        const S_URL = 'https://qtvkasgnrftajqrrcgsg.supabase.co';
        const S_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InF0dmthc2ducmZ0YWpxcnJjZ3NnIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzczMTM5ODksImV4cCI6MjA5Mjg4OTk4OX0.gw1-WKC2ccGRXl1O74v1TaHu2DzwSlVTCaQHv6bsYcg';
        const supabase = window.supabase.createClient(S_URL, S_KEY);

        async function runTest() {
            const name = prompt("Enter Student Name:");
            if(!name) return;
            
            document.getElementById('status').innerText = "Trying to save...";
            
            try {
                const { error } = await supabase.from('students').insert([{ name: name, lin: "TEST-"+Math.floor(Math.random()*999) }]);
                if (error) {
                    document.getElementById('msg').innerText = "ERROR: " + error.message;
                    alert("Database said: " + error.message);
                } else {
                    document.getElementById('status').innerText = "✅ SAVED SUCCESSFULLY!";
                    alert("IT WORKS! Student saved.");
                }
            } catch (e) {
                alert("CRASH: " + e.message);
            }
        }
    </script>
</body>
</html>
