<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EUDES MEDIA | School Management System</title>
    <style>
        :root { --primary: #003366; --accent: #D4A017; --white: #ffffff; --bg: #f0f4f8; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: var(--bg); margin: 0; padding: 0; color: #333; }
        
        /* Brand Header */
        .header { background: var(--primary); color: var(--white); padding: 25px; text-align: center; box-shadow: 0 4px 15px rgba(0,0,0,0.2); }
        .header h1 { margin: 0; letter-spacing: 2px; font-size: 30px; text-transform: uppercase; }
        .header p { margin: 8px 0 0; opacity: 0.9; font-weight: bold; }

        .container { max-width: 1200px; margin: 30px auto; padding: 0 20px; }
        
        /* Stats Section */
        .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 20px; margin-bottom: 30px; }
        .stat-card { background: var(--white); padding: 20px; border-radius: 15px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); border-left: 6px solid var(--accent); text-align: center; }
        .stat-val { font-size: 28px; font-weight: bold; color: var(--primary); display: block; }
        .stat-label { font-size: 13px; color: #666; text-transform: uppercase; margin-top: 5px; }

        /* Actions Bar */
        .actions-bar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .btn { padding: 12px 25px; border-radius: 8px; border: none; cursor: pointer; font-weight: bold; transition: 0.3s; display: flex; align-items: center; gap: 8px; }
        .btn-add { background: var(--primary); color: var(--white); }
        .btn-add:hover { background: #004a94; transform: translateY(-2px); }
        .btn-del { background: #ff4d4d; color: white; padding: 6px 12px; font-size: 12px; }

        /* Full Registration Form (Modal) */
        .modal { display: none; position: fixed; z-index: 1000; left: 0; top: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.6); overflow-y: auto; }
        .modal-content { background: var(--white); margin: 5% auto; padding: 30px; border-radius: 15px; width: 90%; max-width: 600px; }
        .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        .form-group { margin-bottom: 15px; }
        .form-group label { display: block; margin-bottom: 5px; font-weight: bold; font-size: 14px; }
        .form-group input, .form-group select { width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 6px; box-sizing: border-box; }
        .full-width { grid-column: span 2; }

        /* Table Design */
        .table-card { background: var(--white); border-radius: 15px; overflow-x: auto; box-shadow: 0 10px 30px rgba(0,0,0,0.05); }
        table { width: 100%; border-collapse: collapse; min-width: 900px; }
        th { background: #f8f9fa; padding: 18px; text-align: left; font-size: 13px; color: #555; border-bottom: 2px solid #eee; }
        td { padding: 18px; border-bottom: 1px solid #eee; font-size: 14px; }
        .lin-code { font-family: 'Courier New', Courier, monospace; color: var(--accent); font-weight: bold; }
        
        .footer { text-align: center; margin-top: 40px; padding: 20px; color: #777; font-size: 13px; }
    </style>
</head>
<body>

<div class="header">
    <h1>EUDES MEDIA</h1>
    <p>SCHOOL DATA MANAGEMENT SYSTEM | +256762992440</p>
</div>

<div class="container">
    <div class="stats-grid">
        <div class="stat-card"><span class="stat-val" id="total-students">0</span><span class="stat-label">Total Enrollment</span></div>
        <div class="stat-card"><span class="stat-val" id="total-fees">0</span><span class="stat-label">Total Fees (UGX)</span></div>
        <div class="stat-card"><span class="stat-val" id="total-debt" style="color:#d90429">0</span><span class="stat-label">Total Outstanding</span></div>
    </div>

    <div class="actions-bar">
        <h2 style="color: var(--primary); margin: 0;">Student Records</h2>
        <button class="btn btn-add" onclick="toggleModal(true)">+ REGISTER NEW STUDENT</button>
    </div>

    <div class="table-card">
        <table>
            <thead>
                <tr>
                    <th>LIN</th>
                    <th>NAME</th>
                    <th>CLASS</th>
                    <th>AGE/DOB</th>
                    <th>LOCATION</th>
                    <th>HEALTH</th>
                    <th>DEBT (UGX)</th>
                    <th>ACTION</th>
                </tr>
            </thead>
            <tbody id="studentBody">
                <tr><td colspan="8" style="text-align:center; padding:40px;">Syncing school records...</td></tr>
            </tbody>
        </table>
    </div>
</div>

<div class="footer">
    &copy; 2026 EUDES MEDIA | ALL RIGHTS RESERVED | +256762992440
</div>

<div id="regModal" class="modal">
    <div class="modal-content">
        <h2 style="color:var(--primary); margin-top:0;">Student Registration</h2>
        <hr style="margin-bottom:20px; opacity:0.2;">
        <form id="regForm" onsubmit="saveStudent(event)">
            <div class="form-grid">
                <div class="form-group full-width">
                    <label>Full Name</label>
                    <input type="text" id="name" required placeholder="Enter student name">
                </div>
                <div class="form-group">
                    <label>Class</label>
                    <input type="text" id="class" required placeholder="e.g. P.7">
                </div>
                <div class="form-group">
                    <label>Contact Number</label>
                    <input type="text" id="contact" placeholder="+256...">
                </div>
                <div class="form-group">
                    <label>Age</label>
                    <input type="number" id="age">
                </div>
                <div class="form-group">
                    <label>Date of Birth</label>
                    <input type="date" id="dob">
                </div>
                <div class="form-group full-width">
                    <label>Physical Location (Address)</label>
                    <input type="text" id="location" placeholder="Where they stay">
                </div>
                <div class="form-group full-width">
                    <label>Health Status</label>
                    <input type="text" id="health" placeholder="Any medical conditions?">
                </div>
                <div class="form-group">
                    <label>Total Fees (UGX)</label>
                    <input type="number" id="total_fees" value="350000">
                </div>
                <div class="form-group">
                    <label>Initial Payment</label>
                    <input type="number" id="fees_paid" value="0">
                </div>
            </div>
            <div style="display:flex; gap:10px; margin-top:20px;">
                <button type="submit" class="btn btn-add" style="flex:1; justify-content:center;">SAVE RECORD</button>
                <button type="button" class="btn" onclick="toggleModal(false)" style="background:#eee;">CANCEL</button>
            </div>
        </form>
    </div>
</div>

<script>
    const API_URL = 'https://qtvkasgnrftajqrrcgsg.supabase.co/rest/v1/students';
    const API_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InF0dmthc2ducmZ0YWpxcnJjZ3NnIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzczMTM5ODksImV4cCI6MjA5Mjg4OTk4OX0.gw1-WKC2ccGRXl1O74v1TaHu2DzwSlVTCaQHv6bsYcg';

    function toggleModal(show) {
        document.getElementById('regModal').style.display = show ? 'block' : 'none';
    }

    async function loadData() {
        try {
            const res = await fetch(API_URL + '?select=*&order=name', {
                headers: { 'apikey': API_KEY, 'Authorization': 'Bearer ' + API_KEY }
            });
            const data = await res.json();
            renderTable(data);
        } catch (e) { console.error("Load failed", e); }
    }

    function renderTable(students) {
        const body = document.getElementById('studentBody');
        let paidTotal = 0, debtTotal = 0;

        body.innerHTML = students.map(s => {
            const debt = (s.total_fees || 0) - (s.fees_paid || 0);
            paidTotal += (s.fees_paid || 0);
            debtTotal += debt;
            return `
                <tr>
                    <td class="lin-code">${s.lin}</td>
                    <td><b>${s.name.toUpperCase()}</b></td>
                    <td>${s.class || '-'}</td>
                    <td>${s.age || '?' } yrs / ${s.dob || '-'}</td>
                    <td>${s.location || 'Unknown'}</td>
                    <td style="font-size:12px; color:#666;">${s.health || 'Normal'}</td>
                    <td style="color:${debt > 0 ? 'red' : 'green'}">${debt.toLocaleString()}</td>
                    <td><button class="btn btn-del" onclick="deleteStudent('${s.id}')">Delete</button></td>
                </tr>
            `;
        }).join('');

        document.getElementById('total-students').innerText = students.length;
        document.getElementById('total-fees').innerText = paidTotal.toLocaleString();
        document.getElementById('total-debt').innerText = debtTotal.toLocaleString();
    }

    async function saveStudent(e) {
        e.preventDefault();
        const student = {
            name: document.getElementById('name').value,
            class: document.getElementById('class').value,
            contact: document.getElementById('contact').value,
            age: document.getElementById('age').value,
            dob: document.getElementById('dob').value,
            location: document.getElementById('location').value,
            health: document.getElementById('health').value,
            total_fees: parseInt(document.getElementById('total_fees').value),
            fees_paid: parseInt(document.getElementById('fees_paid').value),
            lin: "LIN-" + Math.floor(1000 + Math.random() * 8999)
        };

        const res = await fetch(API_URL, {
            method: 'POST',
            headers: {
                'apikey': API_KEY, 'Authorization': 'Bearer ' + API_KEY,
                'Content-Type': 'application/json', 'Prefer': 'return=minimal'
            },
            body: JSON.stringify(student)
        });

        if (res.ok) {
            toggleModal(false);
            document.getElementById('regForm').reset();
            loadData();
        }
    }

    async function deleteStudent(id) {
        if (!confirm("Are you sure you want to delete this student?")) return;
        await fetch(API_URL + '?id=eq.' + id, {
            method: 'DELETE',
            headers: { 'apikey': API_KEY, 'Authorization': 'Bearer ' + API_KEY }
        });
        loadData();
    }

    loadData();
</script>
</body>
</html>
